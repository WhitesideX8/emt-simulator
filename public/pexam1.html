let currentLevel = 80;
let questionNumber = 0;
let score = 0;
let partialScore = 0;
let maxQuestions = 60;
let currentQuestion;
let usedQuestions = [];

function shuffleArray(array) {
  return array
    .map(value => ({ value, sort: Math.random() }))
    .sort((a, b) => a.sort - b.sort)
    .map(({ value }) => value);
}

function getQuestionByLevel(level) {
  let available = questions.filter(q =>
    q.level === level && !usedQuestions.includes(q.question)
  );

  if (available.length === 0) {
    available = questions.filter(q => !usedQuestions.includes(q.question));
  }

  if (available.length === 0) {
    finishExam();
    return null;
  }

  return available[Math.floor(Math.random() * available.length)];
}

function loadQuestion() {
  if (questionNumber >= maxQuestions) {
    finishExam();
    return;
  }

  currentQuestion = getQuestionByLevel(currentLevel);
  if (!currentQuestion) return;

  usedQuestions.push(currentQuestion.question);

  document.getElementById("status").innerText =
    "Question " + (questionNumber + 1) +
    " of " + maxQuestions +
    " | Difficulty Level: " + currentLevel +
    " | Score: " + score +
    " | Partially Correct: " + partialScore;

  document.getElementById("question").innerHTML =
    "<strong>" + currentQuestion.question + "</strong>";

  document.getElementById("answers").innerHTML = "";
  document.getElementById("feedback").style.display = "none";
  document.getElementById("nextBtn").style.display = "none";
  document.getElementById("restartBtn").style.display = "none";
  document.getElementById("submitBtn").style.display = "none";

  if (currentQuestion.type === "single") {
    loadSingleQuestion();
  } else if (currentQuestion.type === "multi") {
    loadMultiQuestion();
  } else if (currentQuestion.type === "matching") {
    loadMatchingQuestion();
  }
}

function loadSingleQuestion() {
  const answersDiv = document.getElementById("answers");

  const shuffledAnswers = shuffleArray(
    currentQuestion.answers.map((answer, index) => ({
      text: answer,
      originalIndex: index
    }))
  );

  shuffledAnswers.forEach(answerObj => {
    answersDiv.innerHTML += `
      <button onclick="checkSingleAnswer(${answerObj.originalIndex}, this)">
        ${answerObj.text}
      </button>
    `;
  });
}

function loadMultiQuestion() {
  const answersDiv = document.getElementById("answers");

  const shuffledAnswers = shuffleArray(
    currentQuestion.answers.map((answer, index) => ({
      text: answer,
      originalIndex: index
    }))
  );

  shuffledAnswers.forEach(answerObj => {
    answersDiv.innerHTML += `
      <label class="checkbox-answer">
        <input type="checkbox" value="${answerObj.originalIndex}">
        ${answerObj.text}
      </label>
    `;
  });

  document.getElementById("submitBtn").style.display = "block";
}

function loadMatchingQuestion() {
  const answersDiv = document.getElementById("answers");

  currentQuestion.leftItems.forEach((leftItem, leftIndex) => {
    const shuffledOptions = shuffleArray(
      currentQuestion.rightItems.map((rightItem, rightIndex) => ({
        text: rightItem,
        originalIndex: rightIndex
      }))
    );

    let options = `<option value="">Choose match</option>`;

    shuffledOptions.forEach(option => {
      options += `
        <option value="${option.originalIndex}">
          ${option.text}
        </option>
      `;
    });

    answersDiv.innerHTML += `
      <div class="matching-row">
        <div class="matching-left">${leftItem}</div>
        <select data-left-index="${leftIndex}">
          ${options}
        </select>
      </div>
    `;
  });

  document.getElementById("submitBtn").style.display = "block";
}

function checkSingleAnswer(selected, clickedButton) {
  const feedback = document.getElementById("feedback");
  const buttons = document.querySelectorAll("#answers button");

  buttons.forEach(button => {
    button.disabled = true;
  });

  if (selected === currentQuestion.bestCorrect) {
    score++;
    clickedButton.style.background = "darkgreen";

    feedback.innerHTML =
      "<strong>Most Correct Answer.</strong><br><br>" +
      "<strong>Reason:</strong> " +
      currentQuestion.reasonBest;
  } else if (selected === currentQuestion.partialCorrect) {
    partialScore++;
    clickedButton.style.background = "orange";

    buttons.forEach(button => {
      if (button.innerText.trim() === currentQuestion.answers[currentQuestion.bestCorrect]) {
        button.style.background = "darkgreen";
      }
    });

    feedback.innerHTML =
      "<strong>Partially Correct, but not the most correct.</strong><br><br>" +
      currentQuestion.feedbackPartial +
      "<br><br><strong>Most correct answer:</strong> " +
      currentQuestion.answers[currentQuestion.bestCorrect] +
      "<br><br><strong>Reason:</strong> " +
      currentQuestion.reasonBest;
  } else {
    clickedButton.style.background = "darkred";

    buttons.forEach(button => {
      if (button.innerText.trim() === currentQuestion.answers[currentQuestion.bestCorrect]) {
        button.style.background = "darkgreen";
      }

      if (button.innerText.trim() === currentQuestion.answers[currentQuestion.partialCorrect]) {
        button.style.background = "orange";
      }
    });

    feedback.innerHTML =
      "<strong>Incorrect.</strong><br><br>" +
      currentQuestion.feedbackWrong +
      "<br><br><strong>Most correct answer:</strong> " +
      currentQuestion.answers[currentQuestion.bestCorrect] +
      "<br><br><strong>Reason this is most correct:</strong> " +
      currentQuestion.reasonBest +
      "<br><br><strong>Partially correct answer:</strong> " +
      currentQuestion.answers[currentQuestion.partialCorrect];
  }

  feedback.style.display = "block";
  document.getElementById("nextBtn").style.display = "block";
}

function submitAnswer() {
  if (currentQuestion.type === "multi") {
    checkMultiAnswer();
  } else if (currentQuestion.type === "matching") {
    checkMatchingAnswer();
  }
}

function checkMultiAnswer() {
  const checked = Array.from(
    document.querySelectorAll('#answers input[type="checkbox"]:checked')
  ).map(cb => Number(cb.value));

  const correct =
    checked.length === currentQuestion.correct.length &&
    checked.every(value => currentQuestion.correct.includes(value));

  const feedback = document.getElementById("feedback");
  const checkboxes = document.querySelectorAll('#answers input[type="checkbox"]');

  checkboxes.forEach(cb => {
    cb.disabled = true;
  });

  if (correct) {
    score++;
    feedback.innerHTML =
      "<strong>Correct.</strong><br><br>" +
      currentQuestion.feedback;
  } else {
    const correctAnswers = currentQuestion.correct
      .map(index => currentQuestion.answers[index])
      .join(", ");

    feedback.innerHTML =
      "<strong>Incorrect.</strong><br><br>" +
      "<strong>Correct answers:</strong> " +
      correctAnswers +
      "<br><br>" +
      currentQuestion.feedback;
  }

  feedback.style.display = "block";
  document.getElementById("submitBtn").style.display = "none";
  document.getElementById("nextBtn").style.display = "block";
}

function checkMatchingAnswer() {
  const selects = document.querySelectorAll("#answers select");
  const selectedAnswers = Array.from(selects).map(select => Number(select.value));

  const allAnswered = selectedAnswers.every(answer => !Number.isNaN(answer));

  const correct =
    allAnswered &&
    selectedAnswers.length === currentQuestion.correct.length &&
    selectedAnswers.every((value, index) => value === currentQuestion.correct[index]);

  const feedback = document.getElementById("feedback");

  selects.forEach(select => {
    select.disabled = true;
  });

  if (correct) {
    score++;
    feedback.innerHTML =
      "<strong>Correct.</strong><br><br>" +
      currentQuestion.feedback;
  } else {
    let correctText = "";

    currentQuestion.leftItems.forEach((item, index) => {
      correctText +=
        item +
        " = " +
        currentQuestion.rightItems[currentQuestion.correct[index]] +
        "<br>";
    });

    feedback.innerHTML =
      "<strong>Incorrect.</strong><br><br>" +
      "<strong>Correct matches:</strong><br>" +
      correctText +
      "<br>" +
      currentQuestion.feedback;
  }

  feedback.style.display = "block";
  document.getElementById("submitBtn").style.display = "none";
  document.getElementById("nextBtn").style.display = "block";
}

function nextQuestion() {
  questionNumber++;
  loadQuestion();
}

function finishExam() {
  document.getElementById("question").innerHTML =
    "<h2>Exam Complete</h2>";

  document.getElementById("answers").innerHTML = "";

  let result = "";

  if (score >= 51) {
    result = "Excellent. You handled Level 80 EMT assessment, anatomy, airway, cardiology, and medical/legal questions well.";
  } else if (score >= 42) {
    result = "Good. Continue reviewing assessment sequence, airway management, cardiology, medical/legal issues, anatomy, physiology, and most-correct decision making.";
  } else {
    result = "Needs remediation. Focus on ABCs, airway positioning, suctioning, ventilation, perfusion, oxygenation, shock, cardiac chest pain, nitroglycerin contraindications, AED/CPR sequence, consent, refusal, documentation, and confidentiality.";
  }

  document.getElementById("feedback").style.display = "block";
  document.getElementById("feedback").innerHTML =
    "<strong>Final Score:</strong> " + score + " / " + maxQuestions +
    "<br><br><strong>Partially Correct Answers:</strong> " + partialScore +
    "<br><br><strong>Difficulty Level:</strong> " + currentLevel +
    "<br><br>" + result;

  document.getElementById("status").innerText =
    "Level 80 Assessment, A&P, Airway, Cardiology, and Medical/Legal Exam Finished";

  document.getElementById("submitBtn").style.display = "none";
  document.getElementById("nextBtn").style.display = "none";
  document.getElementById("restartBtn").style.display = "block";
}

function restartExam() {
  currentLevel = 80;
  questionNumber = 0;
  score = 0;
  partialScore = 0;
  usedQuestions = [];
  loadQuestion();
}

loadQuestion();
</script>
