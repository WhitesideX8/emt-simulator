<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EMT Patient Simulation</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 40px;
    }

    textarea {
      width: 500px;
      height: 100px;
      padding: 8px;
      display: block;
      margin-bottom: 15px;
    }

    button {
      padding: 8px 12px;
      margin-right: 10px;
      cursor: pointer;
    }

    #chatBox {
      border: 1px solid #999;
      padding: 10px;
      width: 700px;
      min-height: 150px;
      margin: 20px 0;
      background-color: #f5f5f5;
    }

    #feedback {
      white-space: pre-wrap;
      margin-top: 15px;
    }
  </style>
</head>

<body>
  <h1>EMT Patient Simulation</h1>

  <p>
    <strong>Scenario:</strong> 58-year-old male with chest pain. Pale and sweaty.
  </p>

  <div id="chatBox">
    <strong>Patient:</strong> I don’t feel right. My chest hurts.
  </div>

  <textarea id="question" placeholder="Ask the patient a question..."></textarea>

  <button onclick="askPatient()">Ask Patient</button>
  <button onclick="gradeScenario()">Submit for Grading</button>

  <h2>Feedback:</h2>
  <div id="feedback"></div>

  <script>
    let history = "Patient: I don’t feel right. My chest hurts.\n";

    async function askPatient() {
      const questionBox = document.getElementById("question");
      const question = questionBox.value.trim();

      if (question === "") {
        return;
      }

      const chatBox = document.getElementById("chatBox");

      chatBox.innerHTML += "<br><br><strong>Student:</strong> " + question;

      history += "Student: " + question + "\n";

      questionBox.value = "";

      try {
        const response = await fetch("/ask", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            studentQuestion: question,
            history: history
          })
        });

        const data = await response.json();

        chatBox.innerHTML += "<br><strong>Patient:</strong> " + data.reply;

        history += "Patient: " + data.reply + "\n";
      } catch (error) {
        chatBox.innerHTML += "<br><strong>Patient:</strong> Error getting patient response.";
      }
    }

    async function gradeScenario() {
      try {
        const response = await fetch("/grade", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            studentAnswer: history
          })
        });

        const data = await response.json();

        document.getElementById("feedback").innerText = data.feedback;
      } catch (error) {
        document.getElementById("feedback").innerText = "Error getting feedback.";
      }
    }
  </script>
</body>
</html>
