<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EMT Patient Simulation</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: url('https://raw.githubusercontent.com/WhitesideX8/emt-simulator/main/public/IMG_0989.jpg') no-repeat center center fixed;
      background-size: cover;
      display: flex;
      justify-content: center;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.45);
      z-index: 0;
    }

    .container {
      text-align: center;
      width: 95%;
      max-width: 900px;
      margin: 10px auto;
      position: relative;
      z-index: 1;
    }

    h1 {
      margin: 15px 0 5px;
      font-size: 30px;
      color: white;
    }

    h2 {
      margin: 8px 0;
      font-size: 24px;
      color: white;
    }

    h3 {
      margin: 8px 0 5px;
      font-size: 18px;
      color: white;
    }

    label,
    strong {
      color: white;
      font-size: 18px;
    }

    select,
    textarea,
    button {
      font-size: 16px;
      padding: 8px;
      margin-top: 5px;
    }

    select {
      width: 230px;
      border-radius: 4px;
      border: none;
    }

    textarea {
      width: 65%;
      height: 80px;
      margin: 8px auto;
      display: block;
      box-sizing: border-box;
      resize: vertical;
      border-radius: 4px;
      border: 1px solid #ccc;
    }

    #treatmentPlan {
      width: 65%;
      height: 80px;
      background-color: #eefbea;
      border: 2px solid green;
    }

    button {
      background: green;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      margin: 4px;
    }

    button:hover {
      background: darkgreen;
    }

    .box {
      width: 65%;
      margin: 8px auto;
      min-height: 45px;
      max-height: 90px;
      overflow-y: auto;
      border: 1px solid #ccc;
      background: rgba(255, 255, 255, 0.9);
      padding: 8px;
      white-space: pre-wrap;
      text-align: left;
      box-sizing: border-box;
      border-radius: 6px;
      font-size: 16px;
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>EMT Patient Simulation</h1>

    <label><strong>Select Scenario:</strong></label><br />

    <select id="scenarioSelect" onchange="resetScenario()">
      <option value="chestPain">Chest Pain</option>
      <option value="shortnessOfBreath">Shortness of Breath</option>
      <option value="stroke">Stroke</option>
      <option value="diabetic">Diabetic Emergency</option>
    </select>

    <h2 id="scenarioTitle">Chest Pain Scenario</h2>

    <h3>Scenario Information:</h3>
    <div id="scenarioInfo" class="box">Scenario information will appear here.</div>

    <textarea id="studentQuestion" placeholder="Ask the patient or instructor a question..."></textarea>

    <div>
      <button onclick="askPatient()">Ask Patient</button>
      <button onclick="askInstructor()">Ask Instructor</button>
      <button onclick="gradeStudent()">Submit for Grading</button>
      <button onclick="resetScenario()">Reset</button>
    </div>

    <h3>Patient Response:</h3>
    <div id="patientResponse" class="box">Patient response will appear here.</div>

    <h3>Instructor Response:</h3>
    <div id="instructorResponse" class="box">Instructor answer will appear here.</div>

    <h3>EMT Treatment Plan:</h3>
    <textarea
      id="treatmentPlan"
      placeholder="Student enters EMT treatment plan here..."
    ></textarea>

    <h3>Feedback:</h3>
    <div id="feedback" class="box">Feedback will appear here.</div>
  </div>

  <script>
    let history = "";

    const scenarioDetails = {
      chestPain: {
        title: "Chest Pain Scenario",
        info: "58-year-old male with chest pain. Pale and sweaty. Pressure radiating to left arm."
      },
      shortnessOfBreath: {
        title: "Shortness of Breath Scenario",
        info: "67-year-old female with COPD. Difficulty breathing, speaking in short sentences."
      },
      stroke: {
        title: "Stroke Scenario",
        info: "72-year-old male with slurred speech and right-sided weakness."
      },
      diabetic: {
        title: "Diabetic Emergency Scenario",
        info: "45-year-old diabetic, shaky, sweaty, confused. Took insulin, skipped meal."
      }
    };

    function resetScenario() {
      history = "";

      const scenario = document.getElementById("scenarioSelect").value;
      const selected = scenarioDetails[scenario];

      document.getElementById("scenarioTitle").innerText = selected.title;
      document.getElementById("scenarioInfo").innerText = selected.info;

      document.getElementById("patientResponse").innerText = "Patient response will appear here.";
      document.getElementById("instructorResponse").innerText = "Instructor answer will appear here.";
      document.getElementById("feedback").innerText = "Feedback will appear here.";

      document.getElementById("studentQuestion").value = "";
      document.getElementById("treatmentPlan").value = "";
    }

    async function askPatient() {
      const question = document.getElementById("studentQuestion").value.trim();
      const scenario = document.getElementById("scenarioSelect").value;

      if (!question) {
        document.getElementById("patientResponse").innerText = "Ask a question first.";
        return;
      }

      try {
        const res = await fetch("/ask", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            studentQuestion: question,
            history: history,
            scenario: scenario
          })
        });

        const data = await res.json();

        history += `Student: ${question}\n`;
        history += `Patient: ${data.reply}\n\n`;

        document.getElementById("patientResponse").innerText = data.reply;
        document.getElementById("studentQuestion").value = "";
      } catch (err) {
        document.getElementById("patientResponse").innerText = "Error contacting server.";
      }
    }

    async function askInstructor() {
      const question = document.getElementById("studentQuestion").value.trim();
      const scenario = document.getElementById("scenarioSelect").value;

      if (!question) {
        document.getElementById("instructorResponse").innerText = "Ask a question first.";
        return;
      }

      try {
        const res = await fetch("/instructor", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            studentQuestion: question,
            scenario: scenario
          })
        });

        const data = await res.json();

        document.getElementById("instructorResponse").innerText = data.reply;
      } catch (err) {
        document.getElementById("instructorResponse").innerText = "Error contacting instructor.";
      }
    }

    async function gradeStudent() {
      const scenario = document.getElementById("scenarioSelect").value;
      const treatmentPlan = document.getElementById("treatmentPlan").value.trim();

      if (!history && !treatmentPlan) {
        document.getElementById("feedback").innerText =
          "Ask patient questions or enter a treatment plan first.";
        return;
      }

      try {
        const res = await fetch("/grade", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            studentAnswer: history,
            treatmentPlan: treatmentPlan,
            scenario: scenario
          })
        });

        const data = await res.json();

        document.getElementById("feedback").innerText = data.feedback;
      } catch (err) {
        document.getElementById("feedback").innerText = "Error grading.";
      }
    }

    window.addEventListener("DOMContentLoaded", resetScenario);
  </script>
</body>
</html>
