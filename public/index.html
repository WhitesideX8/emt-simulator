<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>EMT Patient Simulation</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 40px;
    }

    h1 {
      margin-bottom: 10px;
    }

    textarea {
      width: 100%;
      height: 100px;
      margin-top: 10px;
      padding: 10px;
    }

    button {
      margin-top: 10px;
      padding: 10px 15px;
      cursor: pointer;
      background-color: green;
      color: white;
      border: none;
      border-radius: 5px;
      margin-right: 10px;
    }

    button:hover {
      background-color: darkgreen;
    }

    #chatBox {
      border: 1px solid #ccc;
      padding: 10px;
      margin-top: 20px;
      height: 200px;
      overflow-y: auto;
      background: #f9f9f9;
    }

    .patient {
      color: blue;
      margin-bottom: 10px;
    }

    .student {
      color: black;
      margin-bottom: 10px;
    }

    #feedback {
      margin-top: 20px;
      white-space: pre-wrap;
    }
  </style>
</head>

<body>

  <h1>EMT Patient Simulation</h1>
  <p><strong>Scenario:</strong> 58-year-old male with chest pain. Pale and sweaty.</p>

  <!-- Chat Box -->
  <div id="chatBox"></div>

  <!-- Question Input -->
  <textarea id="question" placeholder="Ask the patient..."></textarea>

  <br>

  <button onclick="askPatient()">Ask Patient</button>
  <button onclick="gradeResponse()">Submit for Grading</button>

  <!-- Feedback -->
  <h2>Feedback:</h2>
  <div id="feedback"></div>

  <script>
    let history = "";

    async function askPatient() {
      const questionInput = document.getElementById("question");
      const question = questionInput.value.trim();

      if (!question) return;

      // Add student question to chat
      appendMessage("You", question, "student");

      // Update history
      history += `Student: ${question}\n`;

      questionInput.value = "";

      const res = await fetch("/ask", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          studentQuestion: question,
          history: history
        })
      });

      const data = await res.json();

      // Add patient reply to chat
      appendMessage("Patient", data.reply, "patient");

      // Update history
      history += `Patient: ${data.reply}\n`;
    }

    function appendMessage(sender, text, className) {
      const chatBox = document.getElementById("chatBox");

      const msg = document.createElement("div");
      msg.className = className;
      msg.innerHTML = `<strong>${sender}:</strong> ${text}`;

      chatBox.appendChild(msg);
      chatBox.scrollTop = chatBox.scrollHeight;
    }

    async function gradeResponse() {
      const res = await fetch("/grade", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          studentAnswer: history
        })
      });

      const data = await res.json();
      document.getElementById("feedback").innerText = data.feedback;
    }
  </script>

</body>
</html>
