<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EMT Patient Simulation</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background-color: #f4f7fb;
      display: flex;
      justify-content: center;
    }

    .container {
      text-align: center;
      width: 95%;
      max-width: 900px;
      margin: 15px auto;
    }

    h1 {
      margin: 8px 0;
      font-size: 28px;
    }

    h2 {
      margin: 8px 0;
      font-size: 20px;
    }

    h3 {
      margin: 8px 0 4px;
      font-size: 16px;
    }

    select,
    textarea,
    button {
      font-size: 14px;
      padding: 8px;
      margin-top: 6px;
    }

    select {
      width: 250px;
    }

    textarea {
      width: 100%;
      height: 90px;
      display: block;
      margin: 8px auto;
      box-sizing: border-box;
    }

    button {
      background: green;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      margin: 4px;
    }

    button:hover {
      background: darkgreen;
    }

    .box {
      width: 100%;
      min-height: 55px;
      max-height: 110px;
      overflow-y: auto;
      border: 1px solid #ccc;
      background: #f7f7f7;
      padding: 10px;
      margin-top: 6px;
      white-space: pre-wrap;
      text-align: left;
      box-sizing: border-box;
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>EMT Patient Simulation</h1>

    <label><strong>Select Scenario:</strong></label><br />

    <select id="scenarioSelect" onchange="resetScenario()">
      <option value="chestPain">Chest Pain</option>
      <option value="shortnessOfBreath">Shortness of Breath</option>
      <option value="stroke">Stroke</option>
      <option value="diabetic">Diabetic Emergency</option>
    </select>

    <h2 id="scenarioTitle">Chest Pain Scenario</h2>

    <h3>Scenario Information:</h3>
    <div id="scenarioInfo" class="box"></div>

    <textarea id="studentQuestion" placeholder="Ask the patient a question..."></textarea>

    <div>
      <button onclick="askPatient()">Ask Patient</button>
      <button onclick="gradeStudent()">Submit for Grading</button>
      <button onclick="resetScenario()">Reset Scenario</button>
    </div>

    <h2>Patient Response:</h2>
    <div id="patientResponse" class="box"></div>

    <h2>Feedback:</h2>
    <div id="feedback" class="box"></div>
  </div>

  <script>
    let history = "";

    const scenarioDetails = {
      chestPain: {
        title: "Chest Pain Scenario",
        info: "58-year-old male with chest pain. Pale and sweaty. Chest pressure started 30 minutes ago and radiates to the left arm."
      },
      shortnessOfBreath: {
        title: "Shortness of Breath Scenario",
        info: "67-year-old female having trouble breathing. Sitting upright and speaking in short sentences. History of COPD and uses an inhaler."
      },
      stroke: {
        title: "Stroke Scenario",
        info: "72-year-old male with sudden right-sided weakness and slurred speech. Symptoms started about 20 minutes ago."
      },
      diabetic: {
        title: "Diabetic Emergency Scenario",
        info: "45-year-old female who feels weak, shaky, sweaty, and confused. Took insulin this morning but skipped breakfast."
      }
    };

    function resetScenario() {
      history = "";

      const scenario = document.getElementById("scenarioSelect").value;
      const selected = scenarioDetails[scenario];

      document.getElementById("scenarioTitle").innerText = selected.title;
      document.getElementById("scenarioInfo").innerText = selected.info;
      document.getElementById("patientResponse").innerText = "";
      document.getElementById("feedback").innerText = "";
      document.getElementById("studentQuestion").value = "";
    }

    async function askPatient() {
      const studentQuestion = document.getElementById("studentQuestion").value.trim();
      const scenario = document.getElementById("scenarioSelect").value;

      if (!studentQuestion) {
        document.getElementById("patientResponse").innerText = "Please type a question first.";
        return;
      }

      const response = await fetch("/ask", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          studentQuestion,
          history,
          scenario
        })
      });

      const data = await response.json();

      history += `Student: ${studentQuestion}\n`;
      history += `Patient: ${data.reply}\n\n`;

      document.getElementById("patientResponse").innerText = data.reply;
      document.getElementById("studentQuestion").value = "";
    }

    async function gradeStudent() {
      const scenario = document.getElementById("scenarioSelect").value;

      if (!history) {
        document.getElementById("feedback").innerText = "Ask the patient some questions first.";
        return;
      }

      const response = await fetch("/grade", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          studentAnswer: history,
          scenario
        })
      });

      const data = await response.json();

      document.getElementById("feedback").innerText = data.feedback;
    }

    window.addEventListener("DOMContentLoaded", resetScenario);
  </script>
</body>
</html>
