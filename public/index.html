<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>EMT Patient Simulation</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 40px;
    }

    textarea {
      width: 600px;
      height: 100px;
      padding: 10px;
      margin-top: 10px;
    }

    button {
      padding: 10px 15px;
      margin-top: 10px;
      margin-right: 10px;
      cursor: pointer;
      background-color: green;
      color: white;
      border: none;
      border-radius: 5px;
    }

    button:hover {
      background-color: darkgreen;
    }

    #chatBox {
      border: 1px solid #ccc;
      padding: 10px;
      width: 700px;
      min-height: 200px;
      background: #f9f9f9;
      margin-top: 20px;
      overflow-y: auto;
    }

    .patient {
      color: blue;
      margin-bottom: 10px;
    }

    .student {
      color: black;
      margin-bottom: 10px;
    }

    select {
      padding: 8px;
      margin-top: 10px;
    }

    #feedback {
      margin-top: 20px;
      white-space: pre-wrap;
    }
  </style>
</head>

<body>

  <h1>EMT Patient Simulation</h1>

  <label><strong>Select Scenario:</strong></label><br>
  <select id="scenario" onchange="resetScenario()">
    <option value="chestPain">Chest Pain</option>
    <option value="shortnessOfBreath">Shortness of Breath</option>
    <option value="stroke">Stroke</option>
    <option value="diabetic">Diabetic Emergency</option>
  </select>

  <!-- Chat -->
  <div id="chatBox"></div>

  <!-- Input -->
  <textarea id="question" placeholder="Ask the patient a question..."></textarea>

  <br>

  <button onclick="askPatient()">Ask Patient</button>
  <button onclick="gradeScenario()">Submit for Grading</button>

  <!-- Feedback -->
  <h2>Feedback:</h2>
  <div id="feedback"></div>

  <script>
    let history = "";

    function resetScenario() {
      history = "";
      document.getElementById("chatBox").innerHTML = "";
      document.getElementById("feedback").innerText = "";
    }

    async function askPatient() {
      const questionBox = document.getElementById("question");
      const question = questionBox.value.trim();
      const scenario = document.getElementById("scenario").value;

      if (!question) return;

      appendMessage("You", question, "student");
      history += `Student: ${question}\n`;

      questionBox.value = "";

      try {
        const res = await fetch("/ask", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            studentQuestion: question,
            history: history,
            scenario: scenario
          })
        });

        const data = await res.json();

        appendMessage("Patient", data.reply, "patient");
        history += `Patient: ${data.reply}\n`;

      } catch (err) {
        appendMessage("Patient", "Error getting patient response.", "patient");
      }
    }

    function appendMessage(sender, text, className) {
      const chatBox = document.getElementById("chatBox");

      const msg = document.createElement("div");
      msg.className = className;
      msg.innerHTML = `<strong>${sender}:</strong> ${text}`;

      chatBox.appendChild(msg);
      chatBox.scrollTop = chatBox.scrollHeight;
    }

    async function gradeScenario() {
      const scenario = document.getElementById("scenario").value;

      try {
        const res = await fetch("/grade", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            studentAnswer: history,
            scenario: scenario
          })
        });

        const data = await res.json();
        document.getElementById("feedback").innerText = data.feedback;

      } catch (err) {
        document.getElementById("feedback").innerText = "Error getting feedback.";
      }
    }
  </script>

</body>
</html>
