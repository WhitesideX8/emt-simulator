<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Adaptive EMT Neurological Emergencies Exam</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #222;
      color: white;
      padding: 20px;
    }

    .container {
      max-width: 900px;
      margin: auto;
      background: #333;
      padding: 25px;
      border-radius: 10px;
    }

    h1, h2 {
      text-align: center;
    }

    .question-box {
      background: #d9d9d9;
      color: black;
      padding: 20px;
      border-radius: 8px;
      margin-top: 20px;
    }

    button {
      display: block;
      width: 100%;
      margin: 8px 0;
      padding: 12px;
      font-size: 16px;
      background: green;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      text-align: left;
    }

    button:hover {
      background: darkgreen;
    }

    #submitBtn, #nextBtn, #restartBtn {
      background: #0066cc;
      text-align: center;
      display: none;
    }

    #feedback {
      margin-top: 15px;
      padding: 15px;
      background: white;
      color: black;
      border-radius: 6px;
      display: none;
    }

    #status {
      text-align: center;
      margin-top: 15px;
      font-size: 18px;
    }

    .checkbox-answer {
      display: block;
      background: #eeeeee;
      color: black;
      padding: 12px;
      margin: 8px 0;
      border-radius: 6px;
      font-size: 16px;
      cursor: pointer;
    }

    .checkbox-answer input {
      margin-right: 10px;
      transform: scale(1.2);
    }

    .matching-row {
      display: flex;
      align-items: center;
      gap: 15px;
      margin: 12px 0;
      background: #eeeeee;
      padding: 12px;
      border-radius: 6px;
    }

    .matching-left {
      flex: 1;
      font-weight: bold;
    }

    .matching-row select {
      flex: 1;
      padding: 10px;
      font-size: 16px;
      border-radius: 6px;
    }
  </style>
</head>

<body>

<div class="container">
  <h1>EMT Neurological Emergencies Exam</h1>
  <h2>Most-Correct EMT Style Questions</h2>

  <div id="status"></div>

  <div class="question-box">
    <div id="question"></div>
    <div id="answers"></div>

    <button id="submitBtn" onclick="submitAnswer()">Submit Answer</button>

    <div id="feedback"></div>

    <button id="nextBtn" onclick="nextQuestion()">Next Question</button>
    <button id="restartBtn" onclick="restartExam()">Restart Exam</button>
  </div>
</div>

<script>
const questions = [

{
  level: 1,
  type: "single",
  question: "A patient is awake but confused and not answering questions appropriately. What is the MOST accurate description of this finding?",
  answers: [
    "Altered mental status",
    "Normal orientation",
    "Cardiac arrest",
    "Respiratory arrest"
  ],
  correct: 0,
  feedback: "Altered mental status means the patient is not at their normal level of awareness or orientation."
},

{
  level: 1,
  type: "single",
  question: "You are assessing a confused patient. Which tool is MOST appropriate for quickly checking level of consciousness?",
  answers: [
    "AVPU",
    "OPQRST",
    "APGAR",
    "Rule of nines"
  ],
  correct: 0,
  feedback: "AVPU is used to rapidly assess whether a patient is Alert, responsive to Verbal stimulus, responsive to Pain, or Unresponsive."
},

{
  level: 1,
  type: "single",
  question: "A patient opens their eyes only when you speak loudly to them. Which AVPU category is MOST correct?",
  answers: [
    "Alert",
    "Verbal",
    "Pain",
    "Unresponsive"
  ],
  correct: 1,
  feedback: "A patient who responds to your voice is classified as responsive to Verbal stimulus."
},

{
  level: 1,
  type: "multi",
  question: "Which findings are MOST concerning for a neurological emergency? Select all that apply.",
  answers: [
    "Sudden slurred speech",
    "New confusion",
    "Seizure activity",
    "Alert and oriented with no complaint"
  ],
  correct: [0, 1, 2],
  feedback: "Sudden speech problems, confusion, and seizure activity may indicate a neurological emergency."
},

{
  level: 1,
  type: "matching",
  question: "Match the AVPU category with the MOST correct description.",
  leftItems: ["Alert", "Verbal", "Pain"],
  rightItems: [
    "Awake and appropriately responsive",
    "Responds when spoken to",
    "Responds only to painful stimulus"
  ],
  correct: [0, 1, 2],
  feedback: "AVPU helps quickly determine mental status."
},

{
  level: 2,
  type: "single",
  question: "A patient is actively seizing on the floor. What is the MOST appropriate EMT action?",
  answers: [
    "Protect the patient from injury and maintain the airway as able",
    "Hold the patient down to stop the seizure",
    "Place an object in the patient's mouth",
    "Immediately give the patient water"
  ],
  correct: 0,
  feedback: "During a seizure, protect the patient from injury, move hazards away, and manage the airway when possible."
},

{
  level: 2,
  type: "single",
  question: "A seizure has stopped and the patient is confused and sleepy. What is the MOST likely explanation?",
  answers: [
    "Postictal state",
    "Normal baseline mental status",
    "Cardiac arrest",
    "Respiratory arrest"
  ],
  correct: 0,
  feedback: "The postictal state is the period of confusion or sleepiness after a seizure."
},

{
  level: 2,
  type: "single",
  question: "A bystander says a patient had a seizure for about 30 seconds and is now breathing adequately but confused. What should the EMT do FIRST?",
  answers: [
    "Assess airway, breathing, circulation, and protect privacy",
    "Give oral fluids immediately",
    "Restrain the patient to prevent movement",
    "Place a bite block in the mouth"
  ],
  correct: 0,
  feedback: "After a seizure, reassess ABCs, protect the patient, and continue monitoring."
},

{
  level: 2,
  type: "multi",
  question: "Which actions are MOST appropriate during seizure care? Select all that apply.",
  answers: [
    "Protect the head",
    "Move hazards away",
    "Time the seizure",
    "Force the mouth open"
  ],
  correct: [0, 1, 2],
  feedback: "The EMT should protect the patient, remove hazards, and time the seizure. Never force the mouth open."
},

{
  level: 2,
  type: "matching",
  question: "Match the seizure term with the MOST correct description.",
  leftItems: ["Aura", "Tonic-clonic seizure", "Postictal"],
  rightItems: [
    "Warning before seizure",
    "Stiffening and jerking movements",
    "Confused recovery period"
  ],
  correct: [0, 1, 2],
  feedback: "Seizures may include warning signs, active seizure activity, and postictal recovery."
},

{
  level: 3,
  type: "single",
  question: "A patient suddenly develops facial droop and slurred speech. What is the MOST appropriate EMT action?",
  answers: [
    "Perform a stroke assessment and determine last known well time",
    "Wait to see if the symptoms resolve",
    "Give the patient food or drink",
    "Have the patient walk to test balance"
  ],
  correct: 0,
  feedback: "A stroke assessment and last known well time are critical for suspected stroke care."
},

{
  level: 3,
  type: "single",
  question: "A patient has sudden right arm weakness and trouble speaking. Which finding is MOST important to obtain from family?",
  answers: [
    "Last known well time",
    "Favorite food",
    "Shoe size",
    "Past childhood illnesses only"
  ],
  correct: 0,
  feedback: "Last known well time helps determine eligibility for hospital stroke treatment."
},

{
  level: 3,
  type: "single",
  question: "A stroke patient is awake, breathing adequately, and has no airway compromise. What is the BEST next step?",
  answers: [
    "Perform a stroke screen and prepare for rapid transport",
    "Delay transport until symptoms improve",
    "Give oral glucose without assessment",
    "Allow the patient to sleep without monitoring"
  ],
  correct: 0,
  feedback: "Stroke care includes stroke screening, determining last known well, monitoring ABCs, and rapid transport."
},

{
  level: 3,
  type: "multi",
  question: "Which findings are MOST consistent with a possible stroke? Select all that apply.",
  answers: [
    "Facial droop",
    "Arm drift",
    "Slurred speech",
    "Equal grip strength and clear speech"
  ],
  correct: [0, 1, 2],
  feedback: "Facial droop, arm drift, and slurred speech are classic stroke screen findings."
},

{
  level: 3,
  type: "matching",
  question: "Match the stroke assessment finding with what it MOST directly evaluates.",
  leftItems: ["Facial droop", "Arm drift", "Speech abnormality"],
  rightItems: [
    "Facial muscle weakness",
    "One-sided arm weakness",
    "Language or speech problem"
  ],
  correct: [0, 1, 2],
  feedback: "Stroke screens assess face, arm strength, and speech."
},

{
  level: 4,
  type: "single",
  question: "A diabetic patient is confused, sweaty, and has slurred speech. What is the MOST appropriate EMT consideration?",
  answers: [
    "Hypoglycemia can mimic stroke and blood glucose should be checked if available",
    "The patient should be allowed to sleep",
    "Stroke can be ruled out immediately",
    "The patient should walk around to improve circulation"
  ],
  correct: 0,
  feedback: "Hypoglycemia can mimic stroke. Blood glucose should be checked if available while continuing appropriate assessment."
},

{
  level: 4,
  type: "single",
  question: "A suspected stroke patient suddenly becomes unable to control secretions. What is the EMT's priority?",
  answers: [
    "Manage the airway and suction as needed",
    "Continue only with the stroke screen",
    "Give oral fluids",
    "Place the patient flat without monitoring"
  ],
  correct: 0,
  feedback: "Airway management takes priority when the patient cannot protect their airway."
},

{
  level: 4,
  type: "single",
  question: "A patient has a severe headache, vomiting, and decreasing mental status after a head injury. What is MOST concerning?",
  answers: [
    "Increasing intracranial pressure",
    "Minor anxiety",
    "Simple dehydration only",
    "Normal recovery"
  ],
  correct: 0,
  feedback: "Worsening mental status, vomiting, and severe headache after head injury may indicate increased intracranial pressure."
},

{
  level: 4,
  type: "multi",
  question: "Which information is MOST important for a suspected stroke patient? Select all that apply.",
  answers: [
    "Last known well time",
    "Blood glucose if available",
    "Use of blood thinners",
    "Favorite television show"
  ],
  correct: [0, 1, 2],
  feedback: "Last known well time, glucose level, and blood thinner use are important for suspected stroke."
},

{
  level: 4,
  type: "matching",
  question: "Match the condition with the MOST likely presentation.",
  leftItems: ["Stroke", "Hypoglycemia", "Seizure"],
  rightItems: [
    "Sudden one-sided weakness",
    "Confusion, sweating, possible stroke-like symptoms",
    "Postictal confusion after abnormal movements"
  ],
  correct: [0, 1, 2],
  feedback: "Different neurological and metabolic emergencies can look similar and require careful assessment."
},

{
  level: 5,
  type: "single",
  question: "A patient has been seizing continuously for more than 5 minutes. What is the MOST appropriate concern?",
  answers: [
    "Status epilepticus",
    "Normal postictal period",
    "Simple fainting episode",
    "Resolved seizure"
  ],
  correct: 0,
  feedback: "A seizure lasting longer than 5 minutes is concerning for status epilepticus and requires urgent care."
},

{
  level: 5,
  type: "single",
  question: "A suspected stroke patient is becoming less responsive and breathing shallowly. What should the EMT do FIRST?",
  answers: [
    "Support airway and breathing",
    "Complete all paperwork before treatment",
    "Give food or drink",
    "Delay care until the patient becomes alert"
  ],
  correct: 0,
  feedback: "Airway and breathing are the priority when a neurological patient deteriorates."
},

{
  level: 5,
  type: "single",
  question: "A head injury patient has unequal pupils, vomiting, and worsening confusion. What is the MOST appropriate EMT action?",
  answers: [
    "Maintain airway, support breathing, and transport rapidly",
    "Allow the patient to sleep",
    "Give oral fluids",
    "Ignore the pupils if the patient can talk"
  ],
  correct: 0,
  feedback: "Unequal pupils, vomiting, and worsening confusion may indicate serious brain injury."
},

{
  level: 5,
  type: "multi",
  question: "Which findings are MOST concerning in a neurological patient? Select all that apply.",
  answers: [
    "Repeated seizures",
    "Unequal pupils",
    "Decreasing level of consciousness",
    "Normal orientation and no complaint"
  ],
  correct: [0, 1, 2],
  feedback: "Repeated seizures, unequal pupils, and decreasing mental status suggest serious neurological compromise."
},

{
  level: 5,
  type: "matching",
  question: "Match the neurological emergency with the MOST appropriate EMT priority.",
  leftItems: ["Stroke", "Seizure", "Altered mental status", "Head injury"],
  rightItems: [
    "Determine last known well and transport rapidly",
    "Protect from injury and manage airway",
    "Assess ABCs and consider reversible causes",
    "Monitor for worsening mental status"
  ],
  correct: [0, 1, 2, 3],
  feedback: "Neurological emergencies require rapid assessment, airway support, recognition of time-sensitive conditions, and transport."
}

];

let currentLevel = 2;
let questionNumber = 0;
let score = 0;
let maxQuestions = 25;
let currentQuestion;
let usedQuestions = [];

function shuffleArray(array) {
  return array
    .map(value => ({ value, sort: Math.random() }))
    .sort((a, b) => a.sort - b.sort)
    .map(({ value }) => value);
}

function getQuestionByLevel(level) {
  let available = questions.filter(q =>
    q.level === level && !usedQuestions.includes(q.question)
  );

  if (available.length === 0) {
    available = questions.filter(q => !usedQuestions.includes(q.question));
  }

  if (available.length === 0) {
    finishExam();
    return null;
  }

  return available[Math.floor(Math.random() * available.length)];
}

function loadQuestion() {
  if (questionNumber >= maxQuestions) {
    finishExam();
    return;
  }

  currentQuestion = getQuestionByLevel(currentLevel);

  if (!currentQuestion) return;

  usedQuestions.push(currentQuestion.question);

  document.getElementById("status").innerText =
    "Question " + (questionNumber + 1) +
    " of " + maxQuestions +
    " | Current Difficulty Level: " + currentLevel +
    " | Score: " + score;

  document.getElementById("question").innerHTML =
    "<strong>" + currentQuestion.question + "</strong>";

  document.getElementById("answers").innerHTML = "";
  document.getElementById("feedback").style.display = "none";
  document.getElementById("nextBtn").style.display = "none";
  document.getElementById("restartBtn").style.display = "none";
  document.getElementById("submitBtn").style.display = "none";

  if (currentQuestion.type === "single") {
    loadSingleQuestion();
  } else if (currentQuestion.type === "multi") {
    loadMultiQuestion();
  } else if (currentQuestion.type === "matching") {
    loadMatchingQuestion();
  }
}

function loadSingleQuestion() {
  const answersDiv = document.getElementById("answers");

  currentQuestion.answers.forEach((answer, index) => {
    answersDiv.innerHTML += `
      <button onclick="checkSingleAnswer(${index})">
        ${answer}
      </button>
    `;
  });
}

function loadMultiQuestion() {
  const answersDiv = document.getElementById("answers");

  currentQuestion.answers.forEach((answer, index) => {
    answersDiv.innerHTML += `
      <label class="checkbox-answer">
        <input type="checkbox" value="${index}">
        ${answer}
      </label>
    `;
  });

  document.getElementById("submitBtn").style.display = "block";
}

function loadMatchingQuestion() {
  const answersDiv = document.getElementById("answers");

  currentQuestion.leftItems.forEach((leftItem, leftIndex) => {

    const shuffledOptions = shuffleArray(
      currentQuestion.rightItems.map((rightItem, rightIndex) => ({
        text: rightItem,
        originalIndex: rightIndex
      }))
    );

    let options = `<option value="">Choose match</option>`;

    shuffledOptions.forEach(option => {
      options += `
        <option value="${option.originalIndex}">
          ${option.text}
        </option>
      `;
    });

    answersDiv.innerHTML += `
      <div class="matching-row">
        <div class="matching-left">${leftItem}</div>
        <select data-left-index="${leftIndex}">
          ${options}
        </select>
      </div>
    `;
  });

  document.getElementById("submitBtn").style.display = "block";
}

function checkSingleAnswer(selected) {

  const feedback = document.getElementById("feedback");
  const buttons = document.querySelectorAll("#answers button");

  buttons.forEach(button => {
    button.disabled = true;
  });

  if (selected === currentQuestion.correct) {

    score++;
    currentLevel++;

    if (currentLevel > 5) currentLevel = 5;

    buttons[selected].style.background = "darkgreen";

    feedback.innerHTML =
      "<strong>Correct.</strong><br>" +
      currentQuestion.feedback +
      "<br><br>Difficulty will increase.";

  } else {

    currentLevel--;

    if (currentLevel < 1) currentLevel = 1;

    buttons[selected].style.background = "darkred";
    buttons[currentQuestion.correct].style.background = "darkgreen";

    feedback.innerHTML =
      "<strong>Incorrect.</strong><br>" +
      "Most correct answer: <strong>" +
      currentQuestion.answers[currentQuestion.correct] +
      "</strong><br><br>" +
      currentQuestion.feedback +
      "<br><br>Difficulty will decrease.";
  }

  feedback.style.display = "block";
  document.getElementById("nextBtn").style.display = "block";
}

function submitAnswer() {

  if (currentQuestion.type === "multi") {
    checkMultiAnswer();
  }

  else if (currentQuestion.type === "matching") {
    checkMatchingAnswer();
  }
}

function checkMultiAnswer() {

  const checked = Array.from(
    document.querySelectorAll('#answers input[type="checkbox"]:checked')
  ).map(cb => Number(cb.value));

  const correct =
    checked.length === currentQuestion.correct.length &&
    checked.every(value => currentQuestion.correct.includes(value));

  const feedback = document.getElementById("feedback");

  const checkboxes = document.querySelectorAll('#answers input[type="checkbox"]');

  checkboxes.forEach(cb => {
    cb.disabled = true;
  });

  if (correct) {

    score++;
    currentLevel++;

    if (currentLevel > 5) currentLevel = 5;

    feedback.innerHTML =
      "<strong>Correct.</strong><br>" +
      currentQuestion.feedback +
      "<br><br>Difficulty will increase.";

  } else {

    currentLevel--;

    if (currentLevel < 1) currentLevel = 1;

    const correctAnswers = currentQuestion.correct
      .map(index => currentQuestion.answers[index])
      .join(", ");

    feedback.innerHTML =
      "<strong>Incorrect.</strong><br>" +
      "Most correct answers: <strong>" +
      correctAnswers +
      "</strong><br><br>" +
      currentQuestion.feedback +
      "<br><br>Difficulty will decrease.";
  }

  feedback.style.display = "block";
  document.getElementById("submitBtn").style.display = "none";
  document.getElementById("nextBtn").style.display = "block";
}

function checkMatchingAnswer() {

  const selects = document.querySelectorAll("#answers select");

  const selectedAnswers = Array.from(selects).map(select =>
    Number(select.value)
  );

  const allAnswered = selectedAnswers.every(answer =>
    !Number.isNaN(answer)
  );

  const correct =
    allAnswered &&
    selectedAnswers.length === currentQuestion.correct.length &&
    selectedAnswers.every((value, index) =>
      value === currentQuestion.correct[index]
    );

  const feedback = document.getElementById("feedback");

  selects.forEach(select => {
    select.disabled = true;
  });

  if (correct) {

    score++;
    currentLevel++;

    if (currentLevel > 5) currentLevel = 5;

    feedback.innerHTML =
      "<strong>Correct.</strong><br>" +
      currentQuestion.feedback +
      "<br><br>Difficulty will increase.";

  } else {

    currentLevel--;

    if (currentLevel < 1) currentLevel = 1;

    let correctText = "";

    currentQuestion.leftItems.forEach((item, index) => {

      correctText +=
        item +
        " = " +
        currentQuestion.rightItems[currentQuestion.correct[index]] +
        "<br>";
    });

    feedback.innerHTML =
      "<strong>Incorrect.</strong><br>" +
      "<br><strong>Most correct matches:</strong><br>" +
      correctText +
      "<br>" +
      currentQuestion.feedback +
      "<br><br>Difficulty will decrease.";
  }

  feedback.style.display = "block";
  document.getElementById("submitBtn").style.display = "none";
  document.getElementById("nextBtn").style.display = "block";
}

function nextQuestion() {
  questionNumber++;
  loadQuestion();
}

function finishExam() {

  document.getElementById("question").innerHTML =
    "<h2>Exam Complete</h2>";

  document.getElementById("answers").innerHTML = "";

  let result = "";

  if (score >= 20) {
    result = "Strong neurological emergency performance.";
  }

  else if (score >= 15) {
    result = "Borderline performance. Review stroke assessment, seizure care, altered mental status, hypoglycemia, and airway priorities.";
  }

  else {
    result = "Needs remediation. Focus on AVPU, stroke signs, last known well time, seizure safety, hypoglycemia as a stroke mimic, head injury warning signs, and airway management.";
  }

  document.getElementById("feedback").style.display = "block";

  document.getElementById("feedback").innerHTML =
    "<strong>Final Score:</strong> " + score + " / " + maxQuestions +
    "<br><br><strong>Final Difficulty Level:</strong> " + currentLevel +
    "<br><br>" + result;

  document.getElementById("status").innerText =
    "Adaptive Exam Finished";

  document.getElementById("submitBtn").style.display = "none";
  document.getElementById("nextBtn").style.display = "none";
  document.getElementById("restartBtn").style.display = "block";
}

function restartExam() {
  currentLevel = 2;
  questionNumber = 0;
  score = 0;
  usedQuestions = [];
  loadQuestion();
}

loadQuestion();

</script>

</body>
</html>
