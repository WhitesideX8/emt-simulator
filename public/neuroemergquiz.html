<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Level 11-12 Adaptive EMT Neurological Emergencies Exam</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #222;
      color: white;
      padding: 20px;
    }

    .container {
      max-width: 900px;
      margin: auto;
      background: #333;
      padding: 25px;
      border-radius: 10px;
    }

    h1, h2 {
      text-align: center;
    }

    .question-box {
      background: #d9d9d9;
      color: black;
      padding: 20px;
      border-radius: 8px;
      margin-top: 20px;
    }

    button {
      display: block;
      width: 100%;
      margin: 8px 0;
      padding: 12px;
      font-size: 16px;
      background: green;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      text-align: left;
    }

    button:hover {
      background: darkgreen;
    }

    #submitBtn, #nextBtn, #restartBtn {
      background: #0066cc;
      text-align: center;
      display: none;
    }

    #feedback {
      margin-top: 15px;
      padding: 15px;
      background: white;
      color: black;
      border-radius: 6px;
      display: none;
    }

    #status {
      text-align: center;
      margin-top: 15px;
      font-size: 18px;
    }

    .checkbox-answer {
      display: block;
      background: #eeeeee;
      color: black;
      padding: 12px;
      margin: 8px 0;
      border-radius: 6px;
      font-size: 16px;
      cursor: pointer;
    }

    .checkbox-answer input {
      margin-right: 10px;
      transform: scale(1.2);
    }

    .matching-row {
      display: flex;
      align-items: center;
      gap: 15px;
      margin: 12px 0;
      background: #eeeeee;
      padding: 12px;
      border-radius: 6px;
    }

    .matching-left {
      flex: 1;
      font-weight: bold;
    }

    .matching-row select {
      flex: 1;
      padding: 10px;
      font-size: 16px;
      border-radius: 6px;
    }
  </style>
</head>

<body>

<div class="container">
  <h1>EMT Neurological Emergencies Exam</h1>
  <h2>Level 11-12 LC-Ready / NREMT Style</h2>

  <div id="status"></div>

  <div class="question-box">
    <div id="question"></div>
    <div id="answers"></div>

    <button id="submitBtn" onclick="submitAnswer()">Submit Answer</button>

    <div id="feedback"></div>

    <button id="nextBtn" onclick="nextQuestion()">Next Question</button>
    <button id="restartBtn" onclick="restartExam()">Restart Exam</button>
  </div>
</div>

<script>
const questions = [
  {
    level: 11,
    type: "single",
    question: "A 67-year-old has sudden slurred speech and right arm weakness. He is awake, breathing adequately, and his blood glucose is normal. His symptoms started 45 minutes ago. What is the MOST appropriate EMT action?",
    answers: [
      "Perform a stroke screen, determine last known well time, notify receiving facility, and rapidly transport",
      "Complete a full neurological history before deciding on transport priority",
      "Allow the patient to rest quietly and reassess for improvement before transport",
      "Give oral fluids because dehydration can worsen neurological symptoms"
    ],
    correct: 0,
    feedback: "Suspected stroke is time-sensitive. Last known well time, stroke screen, notification, and rapid transport are priorities."
  },
  {
    level: 11,
    type: "single",
    question: "A patient had a seizure and is now confused, combative, and slowly improving. Family wants to hold him down so you can check vital signs. What is the BEST EMT action?",
    answers: [
      "Maintain scene safety, protect the patient from injury, avoid unnecessary restraint, and reassess ABCs as able",
      "Physically restrain the patient immediately so a complete set of vitals can be obtained",
      "Delay reassessment until the patient is fully alert and cooperative",
      "Place an oral airway immediately because confusion after a seizure is abnormal"
    ],
    correct: 0,
    feedback: "Postictal confusion can occur after a seizure. Safety and ABC reassessment are priorities. Restraint should not be routine."
  },
  {
    level: 11,
    type: "single",
    question: "A suspected stroke patient suddenly becomes less responsive and begins drooling. Respirations are shallow but present. What should the EMT do FIRST?",
    answers: [
      "Manage the airway, suction as needed, and support breathing if inadequate",
      "Continue the stroke screen to document worsening neurological findings",
      "Ask family to clarify the exact last known well time before intervening",
      "Place the patient flat and reassess speech in several minutes"
    ],
    correct: 0,
    feedback: "Airway and breathing override the stroke assessment when the patient deteriorates."
  },
  {
    level: 11,
    type: "single",
    question: "A diabetic patient has sudden confusion, sweating, and slurred speech. A family member says this looks like a stroke. Blood glucose is available on your unit. What is the MOST appropriate action?",
    answers: [
      "Check blood glucose while continuing stroke assessment and transport decision-making",
      "Rule out stroke immediately because the patient is diabetic",
      "Give oral glucose before assessing the patient's ability to swallow",
      "Delay transport until the symptoms clearly identify one diagnosis"
    ],
    correct: 0,
    feedback: "Hypoglycemia can mimic stroke. Check glucose if available, but do not ignore stroke possibilities or airway safety."
  },
  {
    level: 11,
    type: "single",
    question: "A head injury patient initially answers questions appropriately. During reassessment, he becomes slower to respond, vomits once, and develops unequal pupils. What is the MOST appropriate EMT action?",
    answers: [
      "Reassess ABCs, support breathing as needed, protect the airway, and rapidly transport",
      "Continue the original treatment plan because he was initially alert",
      "Give oral fluids because vomiting may cause dehydration",
      "Allow him to sleep because drowsiness is expected after stress"
    ],
    correct: 0,
    feedback: "Worsening mental status, vomiting, and unequal pupils suggest serious brain injury or increased intracranial pressure."
  },
  {
    level: 11,
    type: "multi",
    question: "Which findings suggest a neurological patient may be deteriorating? Select all that apply.",
    answers: [
      "Decreasing level of consciousness",
      "New inability to handle secretions",
      "Worsening speech or weakness",
      "Repeated vomiting after head injury",
      "Stable orientation with clear speech",
      "Symptoms improving with no airway concern"
    ],
    correct: [0, 1, 2, 3],
    feedback: "Deterioration is shown by worsening mental status, airway risk, neurological deficits, or signs of increased intracranial pressure."
  },
  {
    level: 11,
    type: "multi",
    question: "Which actions are appropriate for a suspected stroke patient who is awake and breathing adequately? Select all that apply.",
    answers: [
      "Perform a stroke screen",
      "Determine last known well time",
      "Check blood glucose if available",
      "Rapidly transport to an appropriate receiving facility",
      "Give food or drink to improve energy",
      "Wait on scene to see if symptoms resolve"
    ],
    correct: [0, 1, 2, 3],
    feedback: "Stroke care includes stroke screening, glucose check if available, last known well time, and rapid transport."
  },
  {
    level: 11,
    type: "matching",
    question: "Match the neurological clue with the most likely concern.",
    leftItems: [
      "Sudden arm drift and slurred speech",
      "Confusion and sweating with stroke-like symptoms",
      "Post-seizure confusion that gradually improves",
      "Vomiting and unequal pupils after head injury"
    ],
    rightItems: [
      "Possible stroke",
      "Possible hypoglycemia mimic",
      "Postictal state",
      "Possible increased intracranial pressure"
    ],
    correct: [0, 1, 2, 3],
    feedback: "Advanced neurological questions require recognizing similar presentations and prioritizing assessment."
  },

  {
    level: 12,
    type: "single",
    question: "You are transporting a suspected stroke patient with right-sided weakness. Ten minutes into transport, he becomes less responsive, has noisy respirations, and can no longer control secretions. What is the MOST appropriate action?",
    answers: [
      "Suction as needed, manage the airway, support ventilations if inadequate, and continue rapid transport",
      "Complete another stroke scale before changing treatment priorities",
      "Place the patient supine and continue monitoring until arrival",
      "Obtain a more detailed medication list because stroke treatment depends on medications"
    ],
    correct: 0,
    feedback: "Airway and breathing take priority when a stroke patient deteriorates."
  },
  {
    level: 12,
    type: "single",
    question: "A patient has been seizing for approximately 6 minutes. Bystanders are yelling conflicting information, furniture is nearby, and the patient is cyanotic around the lips. What should the EMT do FIRST?",
    answers: [
      "Ensure scene safety, protect the patient from injury, manage airway and oxygenation as soon as possible",
      "Hold the patient still to stop the seizure faster",
      "Place something soft between the teeth to prevent tongue injury",
      "Ask bystanders for a complete seizure history before intervening"
    ],
    correct: 0,
    feedback: "A prolonged seizure is a high-risk emergency. Protect from injury and manage airway/oxygenation as soon as possible."
  },
  {
    level: 12,
    type: "single",
    question: "A confused patient with suspected stroke refuses transport. He cannot repeat the risks of staying home, has worsening speech, and family says this is not his normal behavior. What is the BEST interpretation?",
    answers: [
      "The refusal may not be valid because decision-making capacity is impaired",
      "The refusal is valid because the patient is awake and speaking",
      "Family can sign a refusal because they know his baseline",
      "Transport should be delayed until symptoms completely resolve"
    ],
    correct: 0,
    feedback: "A valid refusal requires decision-making capacity. Worsening neurological status can impair capacity."
  },
  {
    level: 12,
    type: "single",
    question: "A patient with head trauma becomes bradycardic, hypertensive, and irregular in respirations. Your partner says the blood pressure looks good. What is the MOST accurate interpretation?",
    answers: [
      "This pattern may indicate increased intracranial pressure and impending herniation",
      "The patient is improving because blood pressure is elevated",
      "The head injury is minor because the pulse is slow",
      "Transport can be delayed for a more complete history"
    ],
    correct: 0,
    feedback: "Hypertension, bradycardia, and irregular respirations may suggest increased intracranial pressure and serious brain injury."
  },
  {
    level: 12,
    type: "single",
    question: "A patient has sudden facial droop and arm weakness. Family reports the symptoms began 20 minutes ago. During assessment, the patient vomits and becomes drowsy. What should happen NEXT?",
    answers: [
      "Protect the airway, reassess breathing, continue rapid transport, and update the receiving facility",
      "Finish the stroke screen before addressing the vomiting",
      "Give oral glucose because vomiting suggests low blood sugar",
      "Delay transport until the patient becomes more alert"
    ],
    correct: 0,
    feedback: "The patient is deteriorating. Airway protection and rapid transport are priorities."
  },
  {
    level: 12,
    type: "multi",
    question: "Which features make a neurological question Level 12 difficulty? Select all that apply.",
    answers: [
      "The patient's condition changes during transport",
      "Airway problems develop during a suspected stroke",
      "Capacity/refusal conflict occurs with altered mental status",
      "Multiple possible causes of altered mental status must be considered",
      "The question only asks for the definition of AVPU",
      "The patient is stable with no neurological complaint"
    ],
    correct: [0, 1, 2, 3],
    feedback: "Level 12 questions involve changing conditions, competing priorities, legal issues, and multiple possible causes."
  },
  {
    level: 12,
    type: "multi",
    question: "A suspected stroke patient becomes less responsive and can no longer manage secretions. Which actions are MOST appropriate? Select all that apply.",
    answers: [
      "Suction the airway as needed",
      "Assess breathing adequacy",
      "Assist ventilations if inadequate",
      "Continue rapid transport and update the receiving facility",
      "Give oral fluids to clear secretions",
      "Delay airway care until the stroke screen is complete"
    ],
    correct: [0, 1, 2, 3],
    feedback: "Airway and breathing priorities override completion of the stroke screen."
  },
  {
    level: 12,
    type: "matching",
    question: "Match the Level 12 neurological scenario with the highest EMT priority.",
    leftItems: [
      "Stroke patient becomes unable to control secretions",
      "Seizure lasting longer than 5 minutes",
      "Head injury with vomiting and unequal pupils",
      "Confused stroke patient refusing transport"
    ],
    rightItems: [
      "Suction and airway management",
      "Protect from injury and manage oxygenation",
      "Rapid transport for possible increased intracranial pressure",
      "Assess decision-making capacity and follow protocol"
    ],
    correct: [0, 1, 2, 3],
    feedback: "The highest priority is the action that prevents death or protects the patient's legal and medical safety."
  }
];

let currentLevel = 11;
let questionNumber = 0;
let score = 0;
let maxQuestions = 25;
let currentQuestion;
let usedQuestions = [];

function shuffleArray(array) {
  return array
    .map(value => ({ value, sort: Math.random() }))
    .sort((a, b) => a.sort - b.sort)
    .map(({ value }) => value);
}

function getQuestionByLevel(level) {
  let available = questions.filter(q =>
    q.level === level && !usedQuestions.includes(q.question)
  );

  if (available.length === 0) {
    available = questions.filter(q => !usedQuestions.includes(q.question));
  }

  if (available.length === 0) {
    usedQuestions = [];
    available = questions.filter(q => q.level === level);
  }

  return available[Math.floor(Math.random() * available.length)];
}

function loadQuestion() {
  if (questionNumber >= maxQuestions) {
    finishExam();
    return;
  }

  currentQuestion = getQuestionByLevel(currentLevel);

  if (!currentQuestion) return;

  usedQuestions.push(currentQuestion.question);

  document.getElementById("status").innerText =
    "Question " + (questionNumber + 1) +
    " of " + maxQuestions +
    " | Current Difficulty Level: " + currentLevel +
    " | Score: " + score;

  document.getElementById("question").innerHTML =
    "<strong>" + currentQuestion.question + "</strong>";

  document.getElementById("answers").innerHTML = "";
  document.getElementById("feedback").style.display = "none";
  document.getElementById("nextBtn").style.display = "none";
  document.getElementById("restartBtn").style.display = "none";
  document.getElementById("submitBtn").style.display = "none";

  if (currentQuestion.type === "single") {
    loadSingleQuestion();
  } else if (currentQuestion.type === "multi") {
    loadMultiQuestion();
  } else if (currentQuestion.type === "matching") {
    loadMatchingQuestion();
  }
}

function loadSingleQuestion() {
  const answersDiv = document.getElementById("answers");

  const shuffledAnswers = shuffleArray(
    currentQuestion.answers.map((answer, index) => ({
      text: answer,
      originalIndex: index
    }))
  );

  currentQuestion.shuffledSingleAnswers = shuffledAnswers;

  shuffledAnswers.forEach((answer, index) => {
    answersDiv.innerHTML += `
      <button onclick="checkSingleAnswer(${index})">
        ${answer.text}
      </button>
    `;
  });
}

function loadMultiQuestion() {
  const answersDiv = document.getElementById("answers");

  const correctAnswers = currentQuestion.correct.map(index => ({
    text: currentQuestion.answers[index],
    isCorrect: true
  }));

  const incorrectAnswers = currentQuestion.answers
    .map((answer, index) => ({
      text: answer,
      isCorrect: false,
      originalIndex: index
    }))
    .filter(answer => !currentQuestion.correct.includes(answer.originalIndex));

  const twoIncorrectAnswers = shuffleArray(incorrectAnswers).slice(0, 2);

  const finalAnswers = shuffleArray([
    ...correctAnswers,
    ...twoIncorrectAnswers
  ]);

  currentQuestion.shuffledAnswers = finalAnswers;

  currentQuestion.shuffledCorrect = finalAnswers
    .map((answer, index) => answer.isCorrect ? index : null)
    .filter(index => index !== null);

  finalAnswers.forEach((answer, index) => {
    answersDiv.innerHTML += `
      <label class="checkbox-answer">
        <input type="checkbox" value="${index}">
        ${answer.text}
      </label>
    `;
  });

  document.getElementById("submitBtn").style.display = "block";
}

function loadMatchingQuestion() {
  const answersDiv = document.getElementById("answers");

  currentQuestion.leftItems.forEach((leftItem, leftIndex) => {
    const shuffledOptions = shuffleArray(
      currentQuestion.rightItems.map((rightItem, rightIndex) => ({
        text: rightItem,
        originalIndex: rightIndex
      }))
    );

    let options = `<option value="">Choose match</option>`;

    shuffledOptions.forEach(option => {
      options += `
        <option value="${option.originalIndex}">
          ${option.text}
        </option>
      `;
    });

    answersDiv.innerHTML += `
      <div class="matching-row">
        <div class="matching-left">${leftItem}</div>
        <select data-left-index="${leftIndex}">
          ${options}
        </select>
      </div>
    `;
  });

  document.getElementById("submitBtn").style.display = "block";
}

function checkSingleAnswer(selected) {
  const feedback = document.getElementById("feedback");
  const buttons = document.querySelectorAll("#answers button");

  buttons.forEach(button => {
    button.disabled = true;
  });

  const selectedOriginalIndex =
    currentQuestion.shuffledSingleAnswers[selected].originalIndex;

  const correctShuffledIndex =
    currentQuestion.shuffledSingleAnswers.findIndex(
      answer => answer.originalIndex === currentQuestion.correct
    );

  if (selectedOriginalIndex === currentQuestion.correct) {
    score++;
    currentLevel++;
    if (currentLevel > 12) currentLevel = 12;

    buttons[selected].style.background = "darkgreen";

    feedback.innerHTML =
      "<strong>Correct.</strong><br>" +
      currentQuestion.feedback +
      "<br><br>Difficulty will increase if possible.";
  } else {
    currentLevel--;
    if (currentLevel < 11) currentLevel = 11;

    buttons[selected].style.background = "darkred";
    buttons[correctShuffledIndex].style.background = "darkgreen";

    feedback.innerHTML =
      "<strong>Incorrect.</strong><br>" +
      "Most correct answer: <strong>" +
      currentQuestion.answers[currentQuestion.correct] +
      "</strong><br><br>" +
      currentQuestion.feedback +
      "<br><br>Difficulty will decrease if possible.";
  }

  feedback.style.display = "block";
  document.getElementById("nextBtn").style.display = "block";
}

function submitAnswer() {
  if (currentQuestion.type === "multi") {
    checkMultiAnswer();
  } else if (currentQuestion.type === "matching") {
    checkMatchingAnswer();
  }
}

function checkMultiAnswer() {
  const checked = Array.from(
    document.querySelectorAll('#answers input[type="checkbox"]:checked')
  ).map(cb => Number(cb.value));

  const correctAnswers = currentQuestion.shuffledCorrect;

  const correct =
    checked.length === correctAnswers.length &&
    checked.every(value => correctAnswers.includes(value));

  const feedback = document.getElementById("feedback");
  const checkboxes = document.querySelectorAll('#answers input[type="checkbox"]');

  checkboxes.forEach(cb => {
    cb.disabled = true;
  });

  if (correct) {
    score++;
    currentLevel++;
    if (currentLevel > 12) currentLevel = 12;

    feedback.innerHTML =
      "<strong>Correct.</strong><br>" +
      currentQuestion.feedback +
      "<br><br>Difficulty will increase if possible.";
  } else {
    currentLevel--;
    if (currentLevel < 11) currentLevel = 11;

    const correctText = currentQuestion.shuffledCorrect
      .map(index => currentQuestion.shuffledAnswers[index].text)
      .join(", ");

    feedback.innerHTML =
      "<strong>Incorrect.</strong><br>" +
      "Most correct answers: <strong>" +
      correctText +
      "</strong><br><br>" +
      currentQuestion.feedback +
      "<br><br>Difficulty will decrease if possible.";
  }

  feedback.style.display = "block";
  document.getElementById("submitBtn").style.display = "none";
  document.getElementById("nextBtn").style.display = "block";
}

function checkMatchingAnswer() {
  const selects = document.querySelectorAll("#answers select");
  const selectedAnswers = Array.from(selects).map(select => Number(select.value));

  const allAnswered = selectedAnswers.every(answer => !Number.isNaN(answer));

  const correct =
    allAnswered &&
    selectedAnswers.length === currentQuestion.correct.length &&
    selectedAnswers.every((value, index) => value === currentQuestion.correct[index]);

  const feedback = document.getElementById("feedback");

  selects.forEach(select => {
    select.disabled = true;
  });

  if (correct) {
    score++;
    currentLevel++;
    if (currentLevel > 12) currentLevel = 12;

    feedback.innerHTML =
      "<strong>Correct.</strong><br>" +
      currentQuestion.feedback +
      "<br><br>Difficulty will increase if possible.";
  } else {
    currentLevel--;
    if (currentLevel < 11) currentLevel = 11;

    let correctText = "";

    currentQuestion.leftItems.forEach((item, index) => {
      correctText +=
        item +
        " = " +
        currentQuestion.rightItems[currentQuestion.correct[index]] +
        "<br>";
    });

    feedback.innerHTML =
      "<strong>Incorrect.</strong><br>" +
      "<br><strong>Most correct matches:</strong><br>" +
      correctText +
      "<br>" +
      currentQuestion.feedback +
      "<br><br>Difficulty will decrease if possible.";
  }

  feedback.style.display = "block";
  document.getElementById("submitBtn").style.display = "none";
  document.getElementById("nextBtn").style.display = "block";
}

function nextQuestion() {
  questionNumber++;
  loadQuestion();
}

function finishExam() {
  document.getElementById("question").innerHTML =
    "<h2>Exam Complete</h2>";

  document.getElementById("answers").innerHTML = "";

  let result = "";

  if (score >= 22) {
    result = "Excellent performance. Student is handling Level 11-12 LC-Ready/NREMT-style neurological critical-thinking scenarios.";
  } else if (score >= 18) {
    result = "Good performance. Review stroke assessment, airway priority, seizure care, altered mental status, hypoglycemia mimics, head injury warning signs, and refusal capacity.";
  } else if (score >= 14) {
    result = "Borderline performance. Review subtle neurological deterioration, reassessment changes, transport decisions, and most-correct-answer reasoning.";
  } else {
    result = "Needs remediation. Focus on EMT priorities: airway, breathing, circulation, altered mental status, stroke recognition, seizure safety, glucose assessment, head injury warning signs, and rapid transport.";
  }

  document.getElementById("feedback").style.display = "block";
  document.getElementById("feedback").innerHTML =
    "<strong>Final Score:</strong> " + score + " / " + maxQuestions +
    "<br><br><strong>Final Difficulty Level:</strong> " + currentLevel +
    "<br><br>" + result;

  document.getElementById("status").innerText =
    "Level 11-12 LC-Ready Style Exam Finished";

  document.getElementById("submitBtn").style.display = "none";
  document.getElementById("nextBtn").style.display = "none";
  document.getElementById("restartBtn").style.display = "block";
}

function restartExam() {
  currentLevel = 11;
  questionNumber = 0;
  score = 0;
  usedQuestions = [];
  loadQuestion();
}

loadQuestion();
</script>

</body>
</html>
