<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Level 19-20 Adaptive EMT Neurological Emergencies Exam</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #222;
      color: white;
      padding: 20px;
    }

    .container {
      max-width: 900px;
      margin: auto;
      background: #333;
      padding: 25px;
      border-radius: 10px;
    }

    h1, h2 {
      text-align: center;
    }

    .question-box {
      background: #d9d9d9;
      color: black;
      padding: 20px;
      border-radius: 8px;
      margin-top: 20px;
    }

    button {
      display: block;
      width: 100%;
      margin: 8px 0;
      padding: 12px;
      font-size: 16px;
      background: green;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      text-align: left;
    }

    button:hover {
      background: darkgreen;
    }

    #submitBtn, #nextBtn, #restartBtn {
      background: #0066cc;
      text-align: center;
      display: none;
    }

    #feedback {
      margin-top: 15px;
      padding: 15px;
      background: white;
      color: black;
      border-radius: 6px;
      display: none;
    }

    #status {
      text-align: center;
      margin-top: 15px;
      font-size: 18px;
    }

    .checkbox-answer {
      display: block;
      background: #eeeeee;
      color: black;
      padding: 12px;
      margin: 8px 0;
      border-radius: 6px;
      font-size: 16px;
      cursor: pointer;
    }

    .checkbox-answer input {
      margin-right: 10px;
      transform: scale(1.2);
    }

    .matching-row {
      display: flex;
      align-items: center;
      gap: 15px;
      margin: 12px 0;
      background: #eeeeee;
      padding: 12px;
      border-radius: 6px;
    }

    .matching-left {
      flex: 1;
      font-weight: bold;
    }

    .matching-row select {
      flex: 1;
      padding: 10px;
      font-size: 16px;
      border-radius: 6px;
    }
  </style>
</head>

<body>

<div class="container">
  <h1>EMT Neurological Emergencies Exam</h1>
  <h2>Level 19-20 Expert Critical-Thinking Adaptive Exam</h2>

  <div id="status"></div>

  <div class="question-box">
    <div id="question"></div>
    <div id="answers"></div>

    <button id="submitBtn" onclick="submitAnswer()">Submit Answer</button>

    <div id="feedback"></div>

    <button id="nextBtn" onclick="nextQuestion()">Next Question</button>
    <button id="restartBtn" onclick="restartExam()">Restart Exam</button>
  </div>
</div>

<script>
const questions = [
  {
    level: 19,
    type: "single",
    question: "A 69-year-old with sudden aphasia and right-sided weakness is being moved to the ambulance. Blood glucose is 96 mg/dL. Family reports last known well was 28 minutes ago. As you move him, he vomits, becomes unable to follow commands, and develops gurgling respirations. The family is shouting that he must go to their preferred hospital 25 minutes farther away. What is the MOST correct EMT action?",
    answers: [
      "Suction and protect the airway, reassess breathing, assist ventilations if needed, continue rapid transport to the most appropriate receiving facility, and update the hospital with last known well time and deterioration",
      "Honor the family's hospital request because stroke care depends mainly on family preference and medication history",
      "Stop transport long enough to complete a full repeat stroke scale and obtain a medication list before airway care",
      "Place the patient flat to increase cerebral perfusion and avoid suction unless breathing stops completely"
    ],
    correct: 0,
    feedback: "Level 19 questions force prioritization under pressure. Airway contamination and decreased responsiveness override family preference, documentation, and repeat stroke scoring."
  },
  {
    level: 19,
    type: "single",
    question: "A 57-year-old has slurred speech, left arm weakness, and confusion. Blood glucose is 48 mg/dL. After protocol-appropriate glucose treatment, the patient becomes more alert, but arm weakness and facial droop remain. The patient now refuses transport because he feels better. What is the BEST interpretation?",
    answers: [
      "Persistent focal deficits after glucose correction still require possible stroke management; refusal capacity must be carefully assessed because recent altered mental status may impair understanding of risk",
      "The improvement after glucose proves this was not a stroke, so refusal should be accepted without further concern",
      "Transport can be delayed until a second glucose check proves the symptoms are stable",
      "Family can decide transport because the patient had low blood glucose earlier"
    ],
    correct: 0,
    feedback: "Hypoglycemia can mimic stroke, coexist with stroke, or partially improve symptoms. Persistent focal deficits and questionable capacity make this high risk."
  },
  {
    level: 19,
    type: "single",
    question: "A head-injured patient initially answers appropriately after a fall. During reassessment, he becomes confused, vomits twice, and develops unequal pupils. His pulse falls from 104 to 56 while blood pressure rises to 204/110. Respirations become irregular. What is the MOST accurate EMT conclusion?",
    answers: [
      "This is a critical neurological deterioration pattern consistent with possible increased intracranial pressure and impending herniation; support airway/breathing and rapidly transport",
      "The blood pressure increase suggests improved perfusion, so the patient can be monitored on scene briefly",
      "Vomiting is likely anxiety-related because the fall was initially minor",
      "The slow pulse means pain is decreasing and the patient is improving"
    ],
    correct: 0,
    feedback: "Level 19 questions require recognizing a pattern, not one isolated sign. Worsening mental status, vomiting, unequal pupils, bradycardia, hypertension, and irregular breathing are critical."
  },
  {
    level: 19,
    type: "single",
    question: "A postictal patient is combative, cyanotic around the lips, and has vomit in his mouth. Police suggest holding him prone while you suction. The patient is moving all extremities and not following commands. What is the MOST appropriate EMT decision?",
    answers: [
      "Use the least restrictive safe approach, avoid prone restraint when possible, clear the airway as soon as feasible, and support oxygenation/ventilation",
      "Accept prone restraint because airway care is impossible until the patient is fully immobilized",
      "Wait until the patient is calm before addressing airway contamination",
      "Insert an oral airway first because it will prevent aspiration during combativeness"
    ],
    correct: 0,
    feedback: "The most correct answer balances provider safety, restraint risk, airway contamination, oxygenation, and patient movement. Prone restraint can worsen ventilation."
  },
  {
    level: 19,
    type: "single",
    question: "A suspected stroke patient has aphasia but is awake. He repeatedly says 'no hospital' but cannot answer where he is, explain what could happen if he stays home, or repeat your explanation. His spouse says he is normally fully oriented. What is the BEST EMT action?",
    answers: [
      "Recognize that decision-making capacity is likely impaired, involve medical control/law enforcement if required by protocol, and continue high-risk stroke care",
      "Accept the refusal because the patient clearly said no",
      "Ask the spouse to sign the refusal because the spouse knows his baseline",
      "Leave after documenting aphasia and advising the family to call back if symptoms worsen"
    ],
    correct: 0,
    feedback: "Capacity is not the same as being awake or saying no. The patient must understand, appreciate, reason, and communicate a choice."
  },
  {
    level: 19,
    type: "multi",
    question: "Which findings or actions represent Level 19 neurological decision-making? Select all that apply.",
    answers: [
      "Treating persistent unilateral weakness as possible stroke even after glucose improves mental status",
      "Prioritizing suction and ventilation over completing a repeat stroke scale when gurgling respirations develop",
      "Recognizing aphasia may invalidate refusal if the patient cannot explain risk",
      "Identifying vomiting, unequal pupils, bradycardia, hypertension, and irregular respirations as a critical brain-injury pattern",
      "Waiting on scene until neurological symptoms either completely resolve or become easier to classify",
      "Giving oral glucose to any confused diabetic patient regardless of swallowing ability"
    ],
    correct: [0, 1, 2, 3],
    feedback: "Level 19 requires complex prioritization across stroke mimics, airway deterioration, legal capacity, and brain-injury deterioration."
  },
  {
    level: 19,
    type: "multi",
    question: "A suspected stroke patient has unsafe swallowing, abnormal glucose, worsening secretions, and family pressure to give juice. Which actions are MOST appropriate? Select all that apply.",
    answers: [
      "Do not give oral glucose or fluids if the patient cannot swallow safely",
      "Suction as needed and reassess breathing adequacy",
      "Follow local glucose protocol without dismissing the stroke possibility",
      "Continue rapid transport and update the receiving facility about glucose, last known well, and airway change",
      "Give juice because family says this is how the patient usually improves",
      "Delay transport until glucose correction proves whether it is a stroke"
    ],
    correct: [0, 1, 2, 3],
    feedback: "This case combines aspiration risk, possible stroke, glucose abnormality, family pressure, and rapid transport decisions."
  },
  {
    level: 19,
    type: "matching",
    question: "Match the Level 19 neurological situation with the most correct EMT reasoning.",
    leftItems: [
      "Glucose improves alertness but facial droop remains",
      "Aphasic patient says no but cannot explain refusal risks",
      "Stroke patient develops gurgling respirations during movement",
      "Head injury patient develops hypertension, bradycardia, irregular breathing"
    ],
    rightItems: [
      "Continue possible stroke pathway",
      "Capacity is questionable",
      "Airway care becomes the immediate priority",
      "Possible increased intracranial pressure/herniation pattern"
    ],
    correct: [0, 1, 2, 3],
    feedback: "Level 19 matching requires selecting the governing principle, not just recognizing the diagnosis."
  },

  {
    level: 20,
    type: "single",
    question: "You are treating a 73-year-old with suspected stroke, last known well 18 minutes ago. She is aphasic, drooling, and has a weak cough. Blood glucose is 58 mg/dL. Her daughter demands oral glucose before transport and says the patient always improves with juice. The patient coughs when secretions pool. What is the MOST defensible EMT action?",
    answers: [
      "Withhold oral intake due to unsafe swallowing, manage airway/secretions, follow local protocol for glucose management, transport rapidly for possible stroke, and clearly report last known well, glucose, and airway risk",
      "Give oral glucose immediately because hypoglycemia must be corrected before stroke care can continue",
      "Delay transport until the daughter confirms whether this is the patient's usual diabetic episode",
      "Transport non-emergently because low glucose explains the neurological findings"
    ],
    correct: 0,
    feedback: "Level 20 questions require defending the safest priority against persuasive distractors. Unsafe swallowing makes oral glucose dangerous, and low glucose does not rule out stroke."
  },
  {
    level: 20,
    type: "single",
    question: "During transport of a suspected stroke patient, your partner wants to finish a detailed neurological assessment. At that moment, the patient becomes unresponsive, has sonorous respirations, and oxygen saturation begins falling. What should guide your NEXT action?",
    answers: [
      "Immediate airway positioning, suction if needed, ventilation support if inadequate, and notification of deterioration take priority over completing neurological scoring",
      "The neurological assessment must be completed first because stroke center activation requires a full score",
      "Oxygen should be increased without changing position because moving the head can worsen stroke",
      "Transport should pause until a complete medication and anticoagulant history is obtained"
    ],
    correct: 0,
    feedback: "At Level 20, the correct answer is the one that prevents immediate death. Neurological scoring matters, but oxygenation and ventilation come first."
  },
  {
    level: 20,
    type: "single",
    question: "A combative postictal patient has vomitus in the airway, cyanosis, and shallow respirations. Police and family are yelling, and your partner is reaching for restraints. What is the MOST correct EMT leadership decision?",
    answers: [
      "Direct a coordinated, least-restrictive safety plan that avoids prone restraint when possible, clears the airway, supports oxygenation/ventilation, and limits scene chaos",
      "Have police restrain the patient prone so airway equipment can be placed without movement",
      "Wait outside until the patient is no longer combative because seizure patients usually improve without intervention",
      "Focus first on determining whether the seizure was caused by medication noncompliance"
    ],
    correct: 0,
    feedback: "This tests leadership under chaos: safety, airway, ventilation, restraint risk, and avoiding low-priority history gathering."
  },
  {
    level: 20,
    type: "single",
    question: "A 46-year-old motorcycle crash patient has a helmet removed before your arrival. He is confused, repeatedly vomits, and becomes progressively less responsive. Pupils are unequal. His respirations become irregular. What is the MOST correct EMT priority?",
    answers: [
      "Protect the airway, support breathing as needed, maintain spinal motion restriction as indicated, and rapidly transport for critical head injury",
      "Focus first on asking witnesses whether loss of consciousness occurred",
      "Keep him sitting upright without spinal precautions because vomiting is the main concern",
      "Delay transport to determine whether alcohol explains the confusion"
    ],
    correct: 0,
    feedback: "Alcohol, witnesses, and history may be relevant, but progressive neurological decline with vomiting and irregular respirations is immediately life-threatening."
  },
  {
    level: 20,
    type: "single",
    question: "A suspected stroke patient refuses care. He is awake, angry, and says he understands, but when asked to explain the risk of refusing, he gives unrelated answers and cannot state the consequence of staying home. His speech is newly abnormal. What is the MOST appropriate conclusion?",
    answers: [
      "He may lack decision-making capacity despite being awake and verbally refusing; follow local high-risk refusal and medical control procedures",
      "His refusal is valid because anger proves he understands the situation",
      "The refusal is valid if a family member agrees with him",
      "The EMT should leave but document that the patient was difficult"
    ],
    correct: 0,
    feedback: "Level 20 refusal questions test capacity, not attitude. The ability to repeat risks and make an informed decision is essential."
  },
  {
    level: 20,
    type: "multi",
    question: "Which choices show Level 20 expert EMT judgment in neurological emergencies? Select all that apply.",
    answers: [
      "Choosing airway and ventilation over completing a stroke score when the patient becomes unresponsive",
      "Withholding oral glucose when swallowing is unsafe, even when glucose is low",
      "Continuing possible stroke care when focal deficits persist after glucose treatment",
      "Recognizing that capacity may be impaired even if the patient loudly refuses care",
      "Accepting family preference as the highest priority when stroke destination and airway risk conflict",
      "Waiting for complete diagnostic certainty before transport"
    ],
    correct: [0, 1, 2, 3],
    feedback: "Expert-level EMT judgment means prioritizing immediate threats while managing uncertainty, legal risk, and competing information."
  },
  {
    level: 20,
    type: "multi",
    question: "A neurological patient deteriorates during transport. Which findings should trigger immediate reassessment of airway and breathing before further neurological documentation? Select all that apply.",
    answers: [
      "New gurgling respirations",
      "Sonorous respirations with falling oxygen saturation",
      "Vomiting with decreasing responsiveness",
      "Respiratory rate becoming slow, shallow, or irregular",
      "Stable facial droop with clear airway and adequate breathing",
      "Family provides an updated medication list"
    ],
    correct: [0, 1, 2, 3],
    feedback: "Airway and breathing threats override further neurological documentation. Stable deficits and medication history matter only after immediate threats are controlled."
  },
  {
    level: 20,
    type: "matching",
    question: "Match the Level 20 case pressure with the safest EMT priority.",
    leftItems: [
      "Family demands oral glucose but patient cannot swallow safely",
      "Partner wants full stroke score while patient becomes unresponsive",
      "Police offer prone restraint for cyanotic postictal patient",
      "Awake stroke patient refuses but cannot explain consequences"
    ],
    rightItems: [
      "Avoid oral intake and manage airway/glucose by protocol",
      "Airway and breathing override documentation",
      "Use least restrictive safe approach and support ventilation",
      "Question capacity and follow high-risk refusal protocol"
    ],
    correct: [0, 1, 2, 3],
    feedback: "Level 20 matching emphasizes resisting persuasive distractors and choosing the safest governing principle."
  }
];

let currentLevel = 19;
let questionNumber = 0;
let score = 0;
let maxQuestions = 25;
let currentQuestion;
let usedQuestions = [];

function shuffleArray(array) {
  return array
    .map(value => ({ value, sort: Math.random() }))
    .sort((a, b) => a.sort - b.sort)
    .map(({ value }) => value);
}

function getQuestionByLevel(level) {
  let available = questions.filter(q =>
    q.level === level && !usedQuestions.includes(q.question)
  );

  if (available.length === 0) {
    available = questions.filter(q => !usedQuestions.includes(q.question));
  }

  if (available.length === 0) {
    usedQuestions = [];
    available = questions.filter(q => q.level === level);
  }

  return available[Math.floor(Math.random() * available.length)];
}

function loadQuestion() {
  if (questionNumber >= maxQuestions) {
    finishExam();
    return;
  }

  currentQuestion = getQuestionByLevel(currentLevel);

  if (!currentQuestion) return;

  usedQuestions.push(currentQuestion.question);

  document.getElementById("status").innerText =
    "Question " + (questionNumber + 1) +
    " of " + maxQuestions +
    " | Current Difficulty Level: " + currentLevel +
    " | Score: " + score;

  document.getElementById("question").innerHTML =
    "<strong>" + currentQuestion.question + "</strong>";

  document.getElementById("answers").innerHTML = "";
  document.getElementById("feedback").style.display = "none";
  document.getElementById("nextBtn").style.display = "none";
  document.getElementById("restartBtn").style.display = "none";
  document.getElementById("submitBtn").style.display = "none";

  if (currentQuestion.type === "single") {
    loadSingleQuestion();
  } else if (currentQuestion.type === "multi") {
    loadMultiQuestion();
  } else if (currentQuestion.type === "matching") {
    loadMatchingQuestion();
  }
}

function loadSingleQuestion() {
  const answersDiv = document.getElementById("answers");

  const shuffledAnswers = shuffleArray(
    currentQuestion.answers.map((answer, index) => ({
      text: answer,
      originalIndex: index
    }))
  );

  currentQuestion.shuffledSingleAnswers = shuffledAnswers;

  shuffledAnswers.forEach((answer, index) => {
    answersDiv.innerHTML += `
      <button onclick="checkSingleAnswer(${index})">
        ${answer.text}
      </button>
    `;
  });
}

function loadMultiQuestion() {
  const answersDiv = document.getElementById("answers");

  const correctAnswers = currentQuestion.correct.map(index => ({
    text: currentQuestion.answers[index],
    isCorrect: true
  }));

  const incorrectAnswers = currentQuestion.answers
    .map((answer, index) => ({
      text: answer,
      isCorrect: false,
      originalIndex: index
    }))
    .filter(answer => !currentQuestion.correct.includes(answer.originalIndex));

  const twoIncorrectAnswers = shuffleArray(incorrectAnswers).slice(0, 2);

  const finalAnswers = shuffleArray([
    ...correctAnswers,
    ...twoIncorrectAnswers
  ]);

  currentQuestion.shuffledAnswers = finalAnswers;

  currentQuestion.shuffledCorrect = finalAnswers
    .map((answer, index) => answer.isCorrect ? index : null)
    .filter(index => index !== null);

  finalAnswers.forEach((answer, index) => {
    answersDiv.innerHTML += `
      <label class="checkbox-answer">
        <input type="checkbox" value="${index}">
        ${answer.text}
      </label>
    `;
  });

  document.getElementById("submitBtn").style.display = "block";
}

function loadMatchingQuestion() {
  const answersDiv = document.getElementById("answers");

  currentQuestion.leftItems.forEach((leftItem, leftIndex) => {
    const shuffledOptions = shuffleArray(
      currentQuestion.rightItems.map((rightItem, rightIndex) => ({
        text: rightItem,
        originalIndex: rightIndex
      }))
    );

    let options = `<option value="">Choose match</option>`;

    shuffledOptions.forEach(option => {
      options += `
        <option value="${option.originalIndex}">
          ${option.text}
        </option>
      `;
    });

    answersDiv.innerHTML += `
      <div class="matching-row">
        <div class="matching-left">${leftItem}</div>
        <select data-left-index="${leftIndex}">
          ${options}
        </select>
      </div>
    `;
  });

  document.getElementById("submitBtn").style.display = "block";
}

function checkSingleAnswer(selected) {
  const feedback = document.getElementById("feedback");
  const buttons = document.querySelectorAll("#answers button");

  buttons.forEach(button => {
    button.disabled = true;
  });

  const selectedOriginalIndex =
    currentQuestion.shuffledSingleAnswers[selected].originalIndex;

  const correctShuffledIndex =
    currentQuestion.shuffledSingleAnswers.findIndex(
      answer => answer.originalIndex === currentQuestion.correct
    );

  if (selectedOriginalIndex === currentQuestion.correct) {
    score++;
    currentLevel++;
    if (currentLevel > 20) currentLevel = 20;

    buttons[selected].style.background = "darkgreen";

    feedback.innerHTML =
      "<strong>Correct.</strong><br>" +
      currentQuestion.feedback +
      "<br><br>Difficulty will increase if possible.";
  } else {
    currentLevel--;
    if (currentLevel < 19) currentLevel = 19;

    buttons[selected].style.background = "darkred";
    buttons[correctShuffledIndex].style.background = "darkgreen";

    feedback.innerHTML =
      "<strong>Incorrect.</strong><br>" +
      "Most correct answer: <strong>" +
      currentQuestion.answers[currentQuestion.correct] +
      "</strong><br><br>" +
      currentQuestion.feedback +
      "<br><br>Difficulty will decrease if possible.";
  }

  feedback.style.display = "block";
  document.getElementById("nextBtn").style.display = "block";
}

function submitAnswer() {
  if (currentQuestion.type === "multi") {
    checkMultiAnswer();
  } else if (currentQuestion.type === "matching") {
    checkMatchingAnswer();
  }
}

function checkMultiAnswer() {
  const checked = Array.from(
    document.querySelectorAll('#answers input[type="checkbox"]:checked')
  ).map(cb => Number(cb.value));

  const correctAnswers = currentQuestion.shuffledCorrect;

  const correct =
    checked.length === correctAnswers.length &&
    checked.every(value => correctAnswers.includes(value));

  const feedback = document.getElementById("feedback");
  const checkboxes = document.querySelectorAll('#answers input[type="checkbox"]');

  checkboxes.forEach(cb => {
    cb.disabled = true;
  });

  if (correct) {
    score++;
    currentLevel++;
    if (currentLevel > 20) currentLevel = 20;

    feedback.innerHTML =
      "<strong>Correct.</strong><br>" +
      currentQuestion.feedback +
      "<br><br>Difficulty will increase if possible.";
  } else {
    currentLevel--;
    if (currentLevel < 19) currentLevel = 19;

    const correctText = currentQuestion.shuffledCorrect
      .map(index => currentQuestion.shuffledAnswers[index].text)
      .join(", ");

    feedback.innerHTML =
      "<strong>Incorrect.</strong><br>" +
      "Most correct answers: <strong>" +
      correctText +
      "</strong><br><br>" +
      currentQuestion.feedback +
      "<br><br>Difficulty will decrease if possible.";
  }

  feedback.style.display = "block";
  document.getElementById("submitBtn").style.display = "none";
  document.getElementById("nextBtn").style.display = "block";
}

function checkMatchingAnswer() {
  const selects = document.querySelectorAll("#answers select");
  const selectedAnswers = Array.from(selects).map(select => Number(select.value));

  const allAnswered = selectedAnswers.every(answer => !Number.isNaN(answer));

  const correct =
    allAnswered &&
    selectedAnswers.length === currentQuestion.correct.length &&
    selectedAnswers.every((value, index) => value === currentQuestion.correct[index]);

  const feedback = document.getElementById("feedback");

  selects.forEach(select => {
    select.disabled = true;
  });

  if (correct) {
    score++;
    currentLevel++;
    if (currentLevel > 20) currentLevel = 20;

    feedback.innerHTML =
      "<strong>Correct.</strong><br>" +
      currentQuestion.feedback +
      "<br><br>Difficulty will increase if possible.";
  } else {
    currentLevel--;
    if (currentLevel < 19) currentLevel = 19;

    let correctText = "";

    currentQuestion.leftItems.forEach((item, index) => {
      correctText +=
        item +
        " = " +
        currentQuestion.rightItems[currentQuestion.correct[index]] +
        "<br>";
    });

    feedback.innerHTML =
      "<strong>Incorrect.</strong><br>" +
      "<br><strong>Most correct matches:</strong><br>" +
      correctText +
      "<br>" +
      currentQuestion.feedback +
      "<br><br>Difficulty will decrease if possible.";
  }

  feedback.style.display = "block";
  document.getElementById("submitBtn").style.display = "none";
  document.getElementById("nextBtn").style.display = "block";
}

function nextQuestion() {
  questionNumber++;
  loadQuestion();
}

function finishExam() {
  document.getElementById("question").innerHTML =
    "<h2>Exam Complete</h2>";

  document.getElementById("answers").innerHTML = "";

  let result = "";

  if (score >= 22) {
    result = "Excellent performance. Student is handling Level 19-20 expert EMT neurological scenarios with advanced prioritization under pressure.";
  } else if (score >= 18) {
    result = "Good performance. Review airway deterioration during stroke, glucose/stroke overlap, refusal capacity, seizure restraint risk, and head-injury deterioration patterns.";
  } else if (score >= 14) {
    result = "Borderline performance. Review competing priorities, unsafe swallowing, airway contamination, evolving mental status, and most-correct-answer reasoning.";
  } else {
    result = "Needs remediation. Focus on expert EMT priorities: airway, breathing, rapid transport, stroke recognition, glucose assessment, seizure safety, head injury deterioration, refusal capacity, and resisting distractors.";
  }

  document.getElementById("feedback").style.display = "block";
  document.getElementById("feedback").innerHTML =
    "<strong>Final Score:</strong> " + score + " / " + maxQuestions +
    "<br><br><strong>Final Difficulty Level:</strong> " + currentLevel +
    "<br><br>" + result;

  document.getElementById("status").innerText =
    "Level 19-20 Expert Critical-Thinking Exam Finished";

  document.getElementById("submitBtn").style.display = "none";
  document.getElementById("nextBtn").style.display = "none";
  document.getElementById("restartBtn").style.display = "block";
}

function restartExam() {
  currentLevel = 19;
  questionNumber = 0;
  score = 0;
  usedQuestions = [];
  loadQuestion();
}

loadQuestion();
</script>

</body>
</html>
