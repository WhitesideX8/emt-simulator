<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Level 14-15 Adaptive EMT Neurological Emergencies Exam</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #222;
      color: white;
      padding: 20px;
    }

    .container {
      max-width: 900px;
      margin: auto;
      background: #333;
      padding: 25px;
      border-radius: 10px;
    }

    h1, h2 {
      text-align: center;
    }

    .question-box {
      background: #d9d9d9;
      color: black;
      padding: 20px;
      border-radius: 8px;
      margin-top: 20px;
    }

    button {
      display: block;
      width: 100%;
      margin: 8px 0;
      padding: 12px;
      font-size: 16px;
      background: green;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      text-align: left;
    }

    button:hover {
      background: darkgreen;
    }

    #submitBtn, #nextBtn, #restartBtn {
      background: #0066cc;
      text-align: center;
      display: none;
    }

    #feedback {
      margin-top: 15px;
      padding: 15px;
      background: white;
      color: black;
      border-radius: 6px;
      display: none;
    }

    #status {
      text-align: center;
      margin-top: 15px;
      font-size: 18px;
    }

    .checkbox-answer {
      display: block;
      background: #eeeeee;
      color: black;
      padding: 12px;
      margin: 8px 0;
      border-radius: 6px;
      font-size: 16px;
      cursor: pointer;
    }

    .checkbox-answer input {
      margin-right: 10px;
      transform: scale(1.2);
    }

    .matching-row {
      display: flex;
      align-items: center;
      gap: 15px;
      margin: 12px 0;
      background: #eeeeee;
      padding: 12px;
      border-radius: 6px;
    }

    .matching-left {
      flex: 1;
      font-weight: bold;
    }

    .matching-row select {
      flex: 1;
      padding: 10px;
      font-size: 16px;
      border-radius: 6px;
    }
  </style>
</head>

<body>

<div class="container">
  <h1>EMT Neurological Emergencies Exam</h1>
  <h2>Level 14-15 Critical-Thinking Adaptive Exam</h2>

  <div id="status"></div>

  <div class="question-box">
    <div id="question"></div>
    <div id="answers"></div>

    <button id="submitBtn" onclick="submitAnswer()">Submit Answer</button>

    <div id="feedback"></div>

    <button id="nextBtn" onclick="nextQuestion()">Next Question</button>
    <button id="restartBtn" onclick="restartExam()">Restart Exam</button>
  </div>
</div>

<script>
const questions = [
  {
    level: 14,
    type: "single",
    question: "A 72-year-old with sudden aphasia and right-sided weakness is awake but becoming increasingly anxious. Blood glucose is 108 mg/dL. Family says symptoms began 35 minutes ago. During packaging, the patient starts drooling but still has a gag reflex and adequate respirations. What is the MOST appropriate EMT action?",
    answers: [
      "Position to protect the airway, suction as needed, continue rapid transport, and update the receiving facility with last known well time and change in airway status",
      "Complete a second full stroke scale before moving the patient because the symptoms are evolving",
      "Place the patient supine to improve cerebral perfusion and withhold suction unless respirations stop",
      "Delay transport to obtain a complete medication list because thrombolytic decisions require medication history"
    ],
    correct: 0,
    feedback: "Level 14 questions require balancing stroke destination needs with immediate airway protection. Last known well time and deterioration must be communicated, but airway risk comes first."
  },
  {
    level: 14,
    type: "single",
    question: "A patient has a witnessed seizure. When you arrive, the seizure has stopped. He is confused, diaphoretic, breathing 8 times/min, and has snoring respirations. His wife says he has epilepsy and usually wakes up after several minutes. What should the EMT do FIRST?",
    answers: [
      "Open and position the airway, suction if needed, and assist ventilations if breathing remains inadequate",
      "Wait several minutes because this may be his normal postictal pattern",
      "Place an oral airway immediately because all postictal patients need one",
      "Ask the wife for seizure medication names before starting treatment"
    ],
    correct: 0,
    feedback: "A known seizure history does not reduce the priority of airway and breathing. Slow respirations with snoring require immediate airway management."
  },
  {
    level: 14,
    type: "single",
    question: "A 61-year-old has sudden left facial droop and arm weakness. He is alert and refuses transport, stating he feels better. He cannot explain what a stroke is, cannot repeat the risks of refusal, and keeps using incorrect words. What is the BEST action?",
    answers: [
      "Treat the refusal as potentially invalid due to impaired decision-making capacity and follow local protocol for high-risk refusal/transport",
      "Accept the refusal because the patient is awake and physically able to speak",
      "Ask the family to sign the refusal instead of the patient",
      "Leave after documenting that the symptoms improved"
    ],
    correct: 0,
    feedback: "Decision-making capacity requires understanding, appreciation, reasoning, and communication. Aphasia or confusion can make refusal invalid."
  },
  {
    level: 14,
    type: "single",
    question: "A 24-year-old is found confused after a minor crash. He has a scalp laceration, unequal pupils, and vomits twice. He is breathing adequately but becomes slower to answer questions. What is the MOST appropriate treatment priority?",
    answers: [
      "Maintain spinal motion restriction as indicated, protect the airway, monitor for worsening breathing, and rapidly transport for possible brain injury",
      "Focus on controlling scalp bleeding because external bleeding is the most immediate threat",
      "Place the patient in Trendelenburg position to improve blood flow to the brain",
      "Allow the patient to sleep because decreasing responsiveness is expected after a crash"
    ],
    correct: 0,
    feedback: "Unequal pupils, vomiting, and decreasing responsiveness suggest serious brain injury or increased intracranial pressure. Airway protection and rapid transport are priorities."
  },
  {
    level: 14,
    type: "single",
    question: "A suspected stroke patient has normal blood glucose, clear lung sounds, and adequate respirations. During transport, the patient suddenly becomes unresponsive and has gurgling respirations. What is the MOST correct sequence?",
    answers: [
      "Suction the airway, reassess breathing, assist ventilations if inadequate, continue rapid transport, and notify the receiving facility of deterioration",
      "Finish the neurological reassessment, document the new GCS, then begin airway care",
      "Place the patient flat, apply high-flow oxygen, and wait to see if mental status improves",
      "Give oral glucose because unresponsiveness may still be from a glucose problem"
    ],
    correct: 0,
    feedback: "When airway contamination and decreased responsiveness occur, airway and breathing take priority over completing neurological documentation."
  },
  {
    level: 14,
    type: "multi",
    question: "A neurological patient is becoming harder to manage. Which findings should make the EMT suspect immediate airway or breathing risk? Select all that apply.",
    answers: [
      "Gurgling respirations",
      "Loss of ability to manage secretions",
      "Respiratory rate of 8/min with snoring",
      "Repeated vomiting with decreasing mental status",
      "Clear speech with stable orientation",
      "Normal blood glucose with no change in breathing"
    ],
    correct: [0, 1, 2, 3],
    feedback: "Airway risk is suggested by gurgling, secretions, slow/snoring respirations, vomiting, and declining mental status."
  },
  {
    level: 14,
    type: "multi",
    question: "Which actions show Level 14 neurological decision-making for a suspected stroke patient? Select all that apply.",
    answers: [
      "Identifying last known well time early",
      "Recognizing airway deterioration as a higher immediate priority than completing the stroke scale",
      "Checking glucose without ruling out stroke solely because glucose is normal or abnormal",
      "Updating the receiving facility when the patient's condition changes",
      "Waiting on scene until symptoms either fully resolve or become more obvious",
      "Giving oral fluids to improve speech and swallowing"
    ],
    correct: [0, 1, 2, 3],
    feedback: "Advanced neurological care requires recognizing time-sensitive stroke information while still prioritizing airway, breathing, reassessment, and notification."
  },
  {
    level: 14,
    type: "matching",
    question: "Match the complex neurological presentation with the highest EMT concern.",
    leftItems: [
      "Aphasic patient cannot explain refusal risks",
      "Stroke patient begins gurgling during transport",
      "Head injury with vomiting, unequal pupils, and slowing responses",
      "Postictal patient breathing 8/min with snoring respirations"
    ],
    rightItems: [
      "Impaired decision-making capacity",
      "Airway contamination and deterioration",
      "Possible increased intracranial pressure",
      "Inadequate airway and breathing"
    ],
    correct: [0, 1, 2, 3],
    feedback: "Level 14 matching requires identifying the priority problem, not simply naming the condition."
  },

  {
    level: 15,
    type: "single",
    question: "A 78-year-old with a suspected stroke is awake but aphasic. Blood glucose is 62 mg/dL. He can swallow poorly and coughs with secretions. Family insists you give oral glucose because he is diabetic. What is the MOST appropriate EMT decision?",
    answers: [
      "Do not give anything by mouth if swallowing is unsafe; manage airway risk, follow local glucose protocol, and continue rapid transport for possible stroke and hypoglycemia mimic",
      "Give oral glucose immediately because blood glucose below normal rules out stroke",
      "Delay transport until glucose is corrected and the patient can complete a stroke screen",
      "Allow family to give food or juice because they know how his diabetes usually presents"
    ],
    correct: 0,
    feedback: "Level 15 questions include competing priorities. Hypoglycemia may mimic or coexist with stroke, but unsafe swallowing creates aspiration risk."
  },
  {
    level: 15,
    type: "single",
    question: "You are caring for a head-injured patient with decreasing responsiveness. Initial respirations are 24 and shallow. Later they become irregular. Pulse drops from 96 to 52, and blood pressure rises to 198/104. What is the MOST accurate EMT interpretation?",
    answers: [
      "This pattern suggests possible increased intracranial pressure with impending herniation, requiring airway support and rapid transport",
      "The rising blood pressure means perfusion is improving and the patient is stabilizing",
      "The slow pulse is likely anxiety resolving and does not change the transport priority",
      "The patient should be placed sitting upright and observed before transport"
    ],
    correct: 0,
    feedback: "Bradycardia, hypertension, and irregular respirations can suggest severe brain injury and increased intracranial pressure."
  },
  {
    level: 15,
    type: "single",
    question: "A 55-year-old has sudden confusion, right arm weakness, and slurred speech. Blood glucose is 44 mg/dL. After protocol-appropriate glucose treatment, speech improves but right arm weakness remains. What should the EMT do?",
    answers: [
      "Continue treating this as a possible stroke, document glucose response, determine last known well time, notify the receiving facility, and transport rapidly",
      "Cancel the stroke alert because any improvement after glucose proves it was only hypoglycemia",
      "Remain on scene until all weakness fully resolves",
      "Tell the patient transport is optional because symptoms partially improved"
    ],
    correct: 0,
    feedback: "Partial improvement after glucose does not rule out stroke. Persistent focal deficit remains time-sensitive."
  },
  {
    level: 15,
    type: "single",
    question: "A patient with suspected stroke is being moved to the ambulance. The family hands you a medication list and begins arguing about hospital choice. The patient then becomes unresponsive with sonorous respirations. What should the EMT do NEXT?",
    answers: [
      "Address airway and breathing immediately, continue rapid transport to an appropriate facility, and obtain secondary details only when they do not delay care",
      "Stop movement and review the medication list because it may affect hospital treatment",
      "Resolve the hospital choice disagreement before transport begins",
      "Repeat the stroke scale so the receiving hospital has complete neurological documentation"
    ],
    correct: 0,
    feedback: "At Level 15, distractors compete with real clinical tasks. Medication lists and destination details matter, but airway and breathing deterioration comes first."
  },
  {
    level: 15,
    type: "single",
    question: "A postictal patient is combative, cyanotic around the lips, and has vomit in the mouth. Police offer to restrain him prone so you can suction. What is the MOST appropriate EMT action?",
    answers: [
      "Avoid prone restraint when possible, use the least restrictive safe approach, clear the airway as soon as feasible, and support oxygenation/ventilation",
      "Accept prone restraint because suctioning is impossible unless the patient is fully immobilized",
      "Wait until the patient becomes calm because airway care cannot be attempted during agitation",
      "Place an oral airway first because it will prevent aspiration"
    ],
    correct: 0,
    feedback: "This tests safety, restraint risk, airway contamination, and oxygenation. Prone restraint can worsen ventilation and should not be routine."
  },
  {
    level: 15,
    type: "multi",
    question: "Which factors make a neurological case Level 15 difficulty? Select all that apply.",
    answers: [
      "A stroke mimic is present but does not fully explain the focal deficit",
      "The patient has airway compromise during a time-sensitive stroke presentation",
      "Legal refusal is complicated by aphasia or impaired understanding",
      "Family or bystander information creates pressure to choose a lower-priority action",
      "The question asks only for the definition of FAST",
      "The patient is stable, alert, and has no competing priorities"
    ],
    correct: [0, 1, 2, 3],
    feedback: "Level 15 requires handling competing diagnoses, changing priorities, legal capacity, distractors, and deterioration."
  },
  {
    level: 15,
    type: "multi",
    question: "A patient has suspected stroke, unsafe swallowing, abnormal glucose, and worsening secretions. Which actions are MOST appropriate? Select all that apply.",
    answers: [
      "Do not give oral glucose if the patient cannot swallow safely",
      "Suction as needed and reassess breathing adequacy",
      "Treat abnormal glucose according to local protocol without dismissing stroke",
      "Continue rapid transport and update the receiving facility",
      "Give juice because family reports the patient is diabetic",
      "Wait for complete symptom resolution before transport"
    ],
    correct: [0, 1, 2, 3],
    feedback: "This requires simultaneous management of aspiration risk, glucose abnormality, possible stroke, and transport priority."
  },
  {
    level: 15,
    type: "matching",
    question: "Match the Level 15 scenario with the most correct EMT reasoning.",
    leftItems: [
      "Low glucose improves but unilateral weakness remains",
      "Aphasic patient refuses but cannot explain risk",
      "Stroke patient becomes unresponsive with sonorous respirations",
      "Vomiting head-injury patient develops hypertension, bradycardia, irregular respirations"
    ],
    rightItems: [
      "Continue possible stroke pathway despite partial glucose response",
      "Capacity is questionable; follow high-risk refusal protocol",
      "Airway and breathing now override stroke documentation",
      "Possible increased intracranial pressure/herniation pattern"
    ],
    correct: [0, 1, 2, 3],
    feedback: "Level 15 reasoning requires choosing the action that best addresses the most dangerous evolving problem."
  }
];

let currentLevel = 14;
let questionNumber = 0;
let score = 0;
let maxQuestions = 25;
let currentQuestion;
let usedQuestions = [];

function shuffleArray(array) {
  return array
    .map(value => ({ value, sort: Math.random() }))
    .sort((a, b) => a.sort - b.sort)
    .map(({ value }) => value);
}

function getQuestionByLevel(level) {
  let available = questions.filter(q =>
    q.level === level && !usedQuestions.includes(q.question)
  );

  if (available.length === 0) {
    available = questions.filter(q => !usedQuestions.includes(q.question));
  }

  if (available.length === 0) {
    usedQuestions = [];
    available = questions.filter(q => q.level === level);
  }

  return available[Math.floor(Math.random() * available.length)];
}

function loadQuestion() {
  if (questionNumber >= maxQuestions) {
    finishExam();
    return;
  }

  currentQuestion = getQuestionByLevel(currentLevel);

  if (!currentQuestion) return;

  usedQuestions.push(currentQuestion.question);

  document.getElementById("status").innerText =
    "Question " + (questionNumber + 1) +
    " of " + maxQuestions +
    " | Current Difficulty Level: " + currentLevel +
    " | Score: " + score;

  document.getElementById("question").innerHTML =
    "<strong>" + currentQuestion.question + "</strong>";

  document.getElementById("answers").innerHTML = "";
  document.getElementById("feedback").style.display = "none";
  document.getElementById("nextBtn").style.display = "none";
  document.getElementById("restartBtn").style.display = "none";
  document.getElementById("submitBtn").style.display = "none";

  if (currentQuestion.type === "single") {
    loadSingleQuestion();
  } else if (currentQuestion.type === "multi") {
    loadMultiQuestion();
  } else if (currentQuestion.type === "matching") {
    loadMatchingQuestion();
  }
}

function loadSingleQuestion() {
  const answersDiv = document.getElementById("answers");

  const shuffledAnswers = shuffleArray(
    currentQuestion.answers.map((answer, index) => ({
      text: answer,
      originalIndex: index
    }))
  );

  currentQuestion.shuffledSingleAnswers = shuffledAnswers;

  shuffledAnswers.forEach((answer, index) => {
    answersDiv.innerHTML += `
      <button onclick="checkSingleAnswer(${index})">
        ${answer.text}
      </button>
    `;
  });
}

function loadMultiQuestion() {
  const answersDiv = document.getElementById("answers");

  const correctAnswers = currentQuestion.correct.map(index => ({
    text: currentQuestion.answers[index],
    isCorrect: true
  }));

  const incorrectAnswers = currentQuestion.answers
    .map((answer, index) => ({
      text: answer,
      isCorrect: false,
      originalIndex: index
    }))
    .filter(answer => !currentQuestion.correct.includes(answer.originalIndex));

  const twoIncorrectAnswers = shuffleArray(incorrectAnswers).slice(0, 2);

  const finalAnswers = shuffleArray([
    ...correctAnswers,
    ...twoIncorrectAnswers
  ]);

  currentQuestion.shuffledAnswers = finalAnswers;

  currentQuestion.shuffledCorrect = finalAnswers
    .map((answer, index) => answer.isCorrect ? index : null)
    .filter(index => index !== null);

  finalAnswers.forEach((answer, index) => {
    answersDiv.innerHTML += `
      <label class="checkbox-answer">
        <input type="checkbox" value="${index}">
        ${answer.text}
      </label>
    `;
  });

  document.getElementById("submitBtn").style.display = "block";
}

function loadMatchingQuestion() {
  const answersDiv = document.getElementById("answers");

  currentQuestion.leftItems.forEach((leftItem, leftIndex) => {
    const shuffledOptions = shuffleArray(
      currentQuestion.rightItems.map((rightItem, rightIndex) => ({
        text: rightItem,
        originalIndex: rightIndex
      }))
    );

    let options = `<option value="">Choose match</option>`;

    shuffledOptions.forEach(option => {
      options += `
        <option value="${option.originalIndex}">
          ${option.text}
        </option>
      `;
    });

    answersDiv.innerHTML += `
      <div class="matching-row">
        <div class="matching-left">${leftItem}</div>
        <select data-left-index="${leftIndex}">
          ${options}
        </select>
      </div>
    `;
  });

  document.getElementById("submitBtn").style.display = "block";
}

function checkSingleAnswer(selected) {
  const feedback = document.getElementById("feedback");
  const buttons = document.querySelectorAll("#answers button");

  buttons.forEach(button => {
    button.disabled = true;
  });

  const selectedOriginalIndex =
    currentQuestion.shuffledSingleAnswers[selected].originalIndex;

  const correctShuffledIndex =
    currentQuestion.shuffledSingleAnswers.findIndex(
      answer => answer.originalIndex === currentQuestion.correct
    );

  if (selectedOriginalIndex === currentQuestion.correct) {
    score++;
    currentLevel++;
    if (currentLevel > 15) currentLevel = 15;

    buttons[selected].style.background = "darkgreen";

    feedback.innerHTML =
      "<strong>Correct.</strong><br>" +
      currentQuestion.feedback +
      "<br><br>Difficulty will increase if possible.";
  } else {
    currentLevel--;
    if (currentLevel < 14) currentLevel = 14;

    buttons[selected].style.background = "darkred";
    buttons[correctShuffledIndex].style.background = "darkgreen";

    feedback.innerHTML =
      "<strong>Incorrect.</strong><br>" +
      "Most correct answer: <strong>" +
      currentQuestion.answers[currentQuestion.correct] +
      "</strong><br><br>" +
      currentQuestion.feedback +
      "<br><br>Difficulty will decrease if possible.";
  }

  feedback.style.display = "block";
  document.getElementById("nextBtn").style.display = "block";
}

function submitAnswer() {
  if (currentQuestion.type === "multi") {
    checkMultiAnswer();
  } else if (currentQuestion.type === "matching") {
    checkMatchingAnswer();
  }
}

function checkMultiAnswer() {
  const checked = Array.from(
    document.querySelectorAll('#answers input[type="checkbox"]:checked')
  ).map(cb => Number(cb.value));

  const correctAnswers = currentQuestion.shuffledCorrect;

  const correct =
    checked.length === correctAnswers.length &&
    checked.every(value => correctAnswers.includes(value));

  const feedback = document.getElementById("feedback");
  const checkboxes = document.querySelectorAll('#answers input[type="checkbox"]');

  checkboxes.forEach(cb => {
    cb.disabled = true;
  });

  if (correct) {
    score++;
    currentLevel++;
    if (currentLevel > 15) currentLevel = 15;

    feedback.innerHTML =
      "<strong>Correct.</strong><br>" +
      currentQuestion.feedback +
      "<br><br>Difficulty will increase if possible.";
  } else {
    currentLevel--;
    if (currentLevel < 14) currentLevel = 14;

    const correctText = currentQuestion.shuffledCorrect
      .map(index => currentQuestion.shuffledAnswers[index].text)
      .join(", ");

    feedback.innerHTML =
      "<strong>Incorrect.</strong><br>" +
      "Most correct answers: <strong>" +
      correctText +
      "</strong><br><br>" +
      currentQuestion.feedback +
      "<br><br>Difficulty will decrease if possible.";
  }

  feedback.style.display = "block";
  document.getElementById("submitBtn").style.display = "none";
  document.getElementById("nextBtn").style.display = "block";
}

function checkMatchingAnswer() {
  const selects = document.querySelectorAll("#answers select");
  const selectedAnswers = Array.from(selects).map(select => Number(select.value));

  const allAnswered = selectedAnswers.every(answer => !Number.isNaN(answer));

  const correct =
    allAnswered &&
    selectedAnswers.length === currentQuestion.correct.length &&
    selectedAnswers.every((value, index) => value === currentQuestion.correct[index]);

  const feedback = document.getElementById("feedback");

  selects.forEach(select => {
    select.disabled = true;
  });

  if (correct) {
    score++;
    currentLevel++;
    if (currentLevel > 15) currentLevel = 15;

    feedback.innerHTML =
      "<strong>Correct.</strong><br>" +
      currentQuestion.feedback +
      "<br><br>Difficulty will increase if possible.";
  } else {
    currentLevel--;
    if (currentLevel < 14) currentLevel = 14;

    let correctText = "";

    currentQuestion.leftItems.forEach((item, index) => {
      correctText +=
        item +
        " = " +
        currentQuestion.rightItems[currentQuestion.correct[index]] +
        "<br>";
    });

    feedback.innerHTML =
      "<strong>Incorrect.</strong><br>" +
      "<br><strong>Most correct matches:</strong><br>" +
      correctText +
      "<br>" +
      currentQuestion.feedback +
      "<br><br>Difficulty will decrease if possible.";
  }

  feedback.style.display = "block";
  document.getElementById("submitBtn").style.display = "none";
  document.getElementById("nextBtn").style.display = "block";
}

function nextQuestion() {
  questionNumber++;
  loadQuestion();
}

function finishExam() {
  document.getElementById("question").innerHTML =
    "<h2>Exam Complete</h2>";

  document.getElementById("answers").innerHTML = "";

  let result = "";

  if (score >= 22) {
    result = "Excellent performance. Student is handling Level 14-15 advanced EMT neurological critical-thinking scenarios with strong prioritization.";
  } else if (score >= 18) {
    result = "Good performance. Review complex stroke mimics, airway deterioration, refusal capacity, postictal airway care, and head injury warning signs.";
  } else if (score >= 14) {
    result = "Borderline performance. Review competing priorities, changing patient condition, unsafe swallowing, glucose/stroke overlap, and most-correct-answer reasoning.";
  } else {
    result = "Needs remediation. Focus on EMT priorities: airway, breathing, circulation, rapid transport, stroke recognition, glucose assessment, seizure safety, head injury deterioration, and refusal capacity.";
  }

  document.getElementById("feedback").style.display = "block";
  document.getElementById("feedback").innerHTML =
    "<strong>Final Score:</strong> " + score + " / " + maxQuestions +
    "<br><br><strong>Final Difficulty Level:</strong> " + currentLevel +
    "<br><br>" + result;

  document.getElementById("status").innerText =
    "Level 14-15 Critical-Thinking Exam Finished";

  document.getElementById("submitBtn").style.display = "none";
  document.getElementById("nextBtn").style.display = "none";
  document.getElementById("restartBtn").style.display = "block";
}

function restartExam() {
  currentLevel = 14;
  questionNumber = 0;
  score = 0;
  usedQuestions = [];
  loadQuestion();
}

loadQuestion();
</script>

</body>
</html>
