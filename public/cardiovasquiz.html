<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Adaptive EMT Cardiovascular Exam</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #222;
      color: white;
      padding: 20px;
    }

    .container {
      max-width: 900px;
      margin: auto;
      background: #333;
      padding: 25px;
      border-radius: 10px;
    }

    h1, h2 {
      text-align: center;
    }

    .question-box {
      background: #d9d9d9;
      color: black;
      padding: 20px;
      border-radius: 8px;
      margin-top: 20px;
    }

    button {
      display: block;
      width: 100%;
      margin: 8px 0;
      padding: 12px;
      font-size: 16px;
      background: green;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      text-align: left;
    }

    button:hover {
      background: darkgreen;
    }

    #submitBtn, #nextBtn, #restartBtn {
      background: #0066cc;
      text-align: center;
      display: none;
    }

    #feedback {
      margin-top: 15px;
      padding: 15px;
      background: white;
      color: black;
      border-radius: 6px;
      display: none;
    }

    #status {
      text-align: center;
      margin-top: 15px;
      font-size: 18px;
    }

    .checkbox-answer {
      display: block;
      background: #eeeeee;
      color: black;
      padding: 12px;
      margin: 8px 0;
      border-radius: 6px;
      font-size: 16px;
      cursor: pointer;
    }

    .checkbox-answer input {
      margin-right: 10px;
      transform: scale(1.2);
    }

    .matching-row {
      display: flex;
      align-items: center;
      gap: 15px;
      margin: 12px 0;
      background: #eeeeee;
      padding: 12px;
      border-radius: 6px;
    }

    .matching-left {
      flex: 1;
      font-weight: bold;
    }

    .matching-row select {
      flex: 1;
      padding: 10px;
      font-size: 16px;
      border-radius: 6px;
    }
  </style>
</head>

<body>

<div class="container">
  <h1>EMT Cardiovascular Exam</h1>
  <h2>Harder Adaptive NREMT-Style Questions</h2>

  <div id="status"></div>

  <div class="question-box">
    <div id="question"></div>
    <div id="answers"></div>

    <button id="submitBtn" onclick="submitAnswer()">Submit Answer</button>

    <div id="feedback"></div>

    <button id="nextBtn" onclick="nextQuestion()">Next Question</button>
    <button id="restartBtn" onclick="restartExam()">Restart Exam</button>
  </div>
</div>

<script>
const questions = [

{
  level: 1,
  type: "single",
  question: "A 56-year-old patient reports chest pressure after climbing stairs. The pain improves after resting for several minutes. What is the MOST likely cause?",
  answers: [
    "Temporary decrease in oxygen supply to the heart muscle",
    "Complete blockage of blood flow to the brain",
    "Excessive air trapping in the lungs",
    "Low blood sugar affecting cardiac muscle"
  ],
  correct: 0,
  feedback: "Chest pressure brought on by exertion and relieved by rest suggests angina from temporary myocardial ischemia."
},

{
  level: 1,
  type: "single",
  question: "A patient is pale, cool, diaphoretic, and anxious with chest discomfort. Which vital sign would be MOST concerning?",
  answers: [
    "Pulse 88 and regular",
    "Blood pressure 84/50",
    "Respirations 18 and unlabored",
    "SpO2 97% on room air"
  ],
  correct: 1,
  feedback: "Hypotension in a chest pain patient may indicate poor cardiac output or shock."
},

{
  level: 1,
  type: "single",
  question: "An unconscious adult has no radial pulse. What should the EMT check NEXT?",
  answers: [
    "Pedal pulse",
    "Carotid pulse",
    "Blood glucose",
    "Capillary refill"
  ],
  correct: 1,
  feedback: "In an unconscious adult, the carotid pulse is used to assess for central circulation."
},

{
  level: 1,
  type: "multi",
  question: "Which findings may suggest cardiac chest pain? Select all that apply.",
  answers: [
    "Pressure or squeezing in the chest",
    "Pain radiating to the jaw or left arm",
    "Shortness of breath",
    "Pain that changes only with palpation",
    "Nausea or diaphoresis"
  ],
  correct: [0,1,2,4],
  feedback: "Cardiac chest pain may include pressure, radiation, shortness of breath, nausea, and diaphoresis."
},

{
  level: 1,
  type: "matching",
  question: "Match the cardiovascular term with the best description.",
  leftItems: [
    "Ischemia",
    "Infarction",
    "Perfusion"
  ],
  rightItems: [
    "Inadequate oxygen supply to tissue",
    "Tissue death from lack of blood flow",
    "Circulation of blood through tissues"
  ],
  correct: [0,1,2],
  feedback: "Ischemia means inadequate oxygen delivery, infarction means tissue death, and perfusion means blood flow through tissues."
},

{
  level: 2,
  type: "single",
  question: "A 64-year-old male with chest pain has a prescribed nitroglycerin bottle. His blood pressure is 88/56. What should the EMT do?",
  answers: [
    "Assist with one nitroglycerin tablet",
    "Withhold nitroglycerin and continue assessment",
    "Give two nitroglycerin tablets to improve circulation",
    "Have the patient stand before giving nitroglycerin"
  ],
  correct: 1,
  feedback: "Nitroglycerin can lower blood pressure further and should not be assisted when the patient is hypotensive."
},

{
  level: 2,
  type: "single",
  question: "A patient with chest pain took sildenafil earlier today. Why is this important?",
  answers: [
    "It increases the risk of aspirin allergy",
    "It can cause a dangerous drop in blood pressure with nitroglycerin",
    "It makes oxygen ineffective",
    "It prevents AED analysis"
  ],
  correct: 1,
  feedback: "Erectile dysfunction medications such as sildenafil can cause severe hypotension when combined with nitroglycerin."
},

{
  level: 2,
  type: "single",
  question: "A patient with suspected cardiac chest pain is alert and has no aspirin allergy. Which intervention is usually appropriate under EMT protocol?",
  answers: [
    "Assist with aspirin",
    "Administer oral glucose",
    "Apply a tourniquet",
    "Give albuterol by nebulizer"
  ],
  correct: 0,
  feedback: "Aspirin may be given for suspected cardiac chest pain if there are no contraindications and local protocol allows."
},

{
  level: 2,
  type: "multi",
  question: "Which findings suggest poor perfusion? Select all that apply.",
  answers: [
    "Altered mental status",
    "Weak radial pulses",
    "Cool clammy skin",
    "Normal mentation with warm dry skin",
    "Delayed capillary refill"
  ],
  correct: [0,1,2,4],
  feedback: "Poor perfusion can cause altered mental status, weak pulses, cool clammy skin, and delayed capillary refill."
},

{
  level: 2,
  type: "matching",
  question: "Match the finding with the most likely concern.",
  leftItems: [
    "Hypotension after nitroglycerin",
    "Chest pain with diaphoresis",
    "Weak pulse and altered mental status"
  ],
  rightItems: [
    "Medication-related drop in blood pressure",
    "Possible myocardial infarction",
    "Poor perfusion"
  ],
  correct: [0,1,2],
  feedback: "These findings require careful EMT recognition and treatment prioritization."
},

{
  level: 3,
  type: "single",
  question: "A 70-year-old female complains of weakness, nausea, and shortness of breath. She denies chest pain. Skin is cool and moist. BP is 90/58. What should the EMT suspect?",
  answers: [
    "Atypical myocardial infarction",
    "Simple indigestion",
    "Isolated anxiety",
    "Muscle strain"
  ],
  correct: 0,
  feedback: "Older adults and females may have atypical MI symptoms without classic chest pain."
},

{
  level: 3,
  type: "single",
  question: "A patient becomes unresponsive while you are assessing chest pain. He has agonal respirations and no pulse. What should you do FIRST?",
  answers: [
    "Apply oxygen by nasal cannula",
    "Begin CPR and apply the AED",
    "Obtain a full SAMPLE history",
    "Assist with nitroglycerin"
  ],
  correct: 1,
  feedback: "Agonal respirations are not normal breathing. A pulseless patient needs immediate CPR and AED use."
},

{
  level: 3,
  type: "single",
  question: "During CPR, the AED states 'No shock advised.' The patient remains pulseless. What should the EMT do NEXT?",
  answers: [
    "Resume CPR immediately",
    "Check blood pressure",
    "Remove the AED pads",
    "Wait for the AED to reanalyze without compressions"
  ],
  correct: 0,
  feedback: "If no shock is advised and the patient remains pulseless, CPR should be resumed immediately."
},

{
  level: 3,
  type: "multi",
  question: "Which actions are appropriate for a suspected cardiac chest pain patient? Select all that apply.",
  answers: [
    "Place the patient in a position of comfort",
    "Administer oxygen if hypoxic or in respiratory distress",
    "Assist with prescribed nitroglycerin if allowed and not contraindicated",
    "Delay transport until pain is completely gone",
    "Consider aspirin if not contraindicated"
  ],
  correct: [0,1,2,4],
  feedback: "Cardiac chest pain care includes comfort, oxygen when indicated, aspirin if allowed, nitroglycerin when appropriate, and prompt transport."
},

{
  level: 3,
  type: "matching",
  question: "Match the presentation with the best EMT priority.",
  leftItems: [
    "Pulseless and apneic patient",
    "Chest pain with adequate blood pressure",
    "Chest pain with severe hypotension"
  ],
  rightItems: [
    "CPR and AED",
    "Cardiac assessment and medication assistance if appropriate",
    "Treat for shock and avoid nitroglycerin"
  ],
  correct: [0,1,2],
  feedback: "Treatment priorities depend on perfusion, pulse, breathing, and medication contraindications."
},

{
  level: 4,
  type: "single",
  question: "A patient with chest pain has crackles in both lungs, severe dyspnea, and pink frothy sputum. What condition should the EMT suspect?",
  answers: [
    "Pulmonary edema from heart failure",
    "Simple bronchitis",
    "Tension pneumothorax",
    "Hyperventilation syndrome"
  ],
  correct: 0,
  feedback: "Crackles, dyspnea, and pink frothy sputum suggest pulmonary edema, often related to heart failure."
},

{
  level: 4,
  type: "single",
  question: "A chest pain patient has unequal blood pressures in the arms and tearing pain radiating to the back. What should the EMT suspect?",
  answers: [
    "Aortic dissection",
    "Stable angina",
    "Hypoglycemia",
    "Simple muscle strain"
  ],
  correct: 0,
  feedback: "Tearing chest or back pain with unequal pulses or blood pressures may indicate aortic dissection."
},

{
  level: 4,
  type: "single",
  question: "A patient in cardiogenic shock is MOST likely experiencing shock because:",
  answers: [
    "The heart is failing to pump effectively",
    "The blood vessels are dilating from an allergen",
    "The patient has lost a large amount of blood",
    "The airway is blocked by a foreign body"
  ],
  correct: 0,
  feedback: "Cardiogenic shock occurs when the heart cannot pump enough blood to meet the body's needs."
},

{
  level: 4,
  type: "multi",
  question: "Which findings are consistent with cardiogenic shock? Select all that apply.",
  answers: [
    "Hypotension",
    "Weak or irregular pulse",
    "Cool clammy skin",
    "Clear lungs with normal perfusion",
    "Signs of pulmonary edema"
  ],
  correct: [0,1,2,4],
  feedback: "Cardiogenic shock may include hypotension, weak or irregular pulse, poor skin signs, and pulmonary edema."
},

{
  level: 4,
  type: "matching",
  question: "Match the medication or intervention with its primary EMT purpose.",
  leftItems: [
    "Aspirin",
    "Nitroglycerin",
    "AED",
    "Oxygen"
  ],
  rightItems: [
    "Reduce platelet aggregation",
    "Dilate blood vessels and reduce cardiac workload",
    "Analyze rhythm and defibrillate when indicated",
    "Improve oxygen delivery when indicated"
  ],
  correct: [0,1,2,3],
  feedback: "Each intervention has a specific purpose in cardiovascular emergency care."
},

{
  level: 5,
  type: "single",
  question: "A patient with chest pain is alert but suddenly becomes confused, pale, and hypotensive after taking nitroglycerin. What is the MOST appropriate EMT action?",
  answers: [
    "Assist with another nitroglycerin dose",
    "Treat for shock and reassess blood pressure",
    "Have the patient walk to improve circulation",
    "Delay transport until mental status improves"
  ],
  correct: 1,
  feedback: "A drop in blood pressure and altered mental status after nitroglycerin requires shock management and reassessment."
},

{
  level: 5,
  type: "single",
  question: "A pulseless patient receives a shock from the AED. What should the EMT do immediately after the shock is delivered?",
  answers: [
    "Resume CPR immediately",
    "Check blood pressure",
    "Remove the AED pads",
    "Give nitroglycerin"
  ],
  correct: 0,
  feedback: "After a shock, CPR should be resumed immediately unless the patient shows clear signs of life."
},

{
  level: 5,
  type: "single",
  question: "Which patient should be considered the highest priority for rapid transport?",
  answers: [
    "Chest pain relieved by rest with normal vitals",
    "Chest pressure with diaphoresis and hypotension",
    "Mild dizziness after standing quickly",
    "Localized chest pain reproducible by palpation"
  ],
  correct: 1,
  feedback: "Chest pressure with diaphoresis and hypotension suggests severe cardiac compromise and poor perfusion."
},

{
  level: 5,
  type: "multi",
  question: "A patient has chest pain, BP 82/48, and took sildenafil 4 hours ago. Which actions are appropriate? Select all that apply.",
  answers: [
    "Withhold nitroglycerin",
    "Administer oxygen if indicated",
    "Prepare for rapid transport",
    "Consider aspirin if not contraindicated",
    "Place the patient standing upright"
  ],
  correct: [0,1,2,3],
  feedback: "Nitroglycerin is contraindicated with hypotension and recent sildenafil use. Support oxygenation, consider aspirin, and transport rapidly."
},

{
  level: 5,
  type: "matching",
  question: "Match the presentation with the MOST likely cardiovascular emergency.",
  leftItems: [
    "Pink frothy sputum with crackles",
    "Tearing chest pain radiating to the back",
    "Unresponsive with no pulse",
    "Exertional chest pressure relieved by rest"
  ],
  rightItems: [
    "Pulmonary edema",
    "Aortic dissection",
    "Cardiac arrest",
    "Angina"
  ],
  correct: [0,1,2,3],
  feedback: "These presentations require EMTs to recognize high-risk cardiovascular emergencies."
}

];

let currentLevel = 2;
let questionNumber = 0;
let score = 0;
let maxQuestions = 25;
let currentQuestion;
let usedQuestions = [];

function shuffleArray(array) {
  return array
    .map(value => ({ value, sort: Math.random() }))
    .sort((a, b) => a.sort - b.sort)
    .map(({ value }) => value);
}

function getQuestionByLevel(level) {
  let available = questions.filter(q =>
    q.level === level && !usedQuestions.includes(q.question)
  );

  if (available.length === 0) {
    available = questions.filter(q => !usedQuestions.includes(q.question));
  }

  if (available.length === 0) {
    finishExam();
    return null;
  }

  return available[Math.floor(Math.random() * available.length)];
}

function loadQuestion() {
  if (questionNumber >= maxQuestions) {
    finishExam();
    return;
  }

  currentQuestion = getQuestionByLevel(currentLevel);

  if (!currentQuestion) return;

  usedQuestions.push(currentQuestion.question);

  document.getElementById("status").innerText =
    "Question " + (questionNumber + 1) +
    " of " + maxQuestions +
    " | Current Difficulty Level: " + currentLevel +
    " | Score: " + score;

  document.getElementById("question").innerHTML =
    "<strong>" + currentQuestion.question + "</strong>";

  document.getElementById("answers").innerHTML = "";
  document.getElementById("feedback").style.display = "none";
  document.getElementById("nextBtn").style.display = "none";
  document.getElementById("restartBtn").style.display = "none";
  document.getElementById("submitBtn").style.display = "none";

  if (currentQuestion.type === "single") {
    loadSingleQuestion();
  } else if (currentQuestion.type === "multi") {
    loadMultiQuestion();
  } else if (currentQuestion.type === "matching") {
    loadMatchingQuestion();
  }
}

function loadSingleQuestion() {
  const answersDiv = document.getElementById("answers");

  currentQuestion.answers.forEach((answer, index) => {
    answersDiv.innerHTML += `
      <button onclick="checkSingleAnswer(${index})">
        ${answer}
      </button>
    `;
  });
}

function loadMultiQuestion() {
  const answersDiv = document.getElementById("answers");

  currentQuestion.answers.forEach((answer, index) => {
    answersDiv.innerHTML += `
      <label class="checkbox-answer">
        <input type="checkbox" value="${index}">
        ${answer}
      </label>
    `;
  });

  document.getElementById("submitBtn").style.display = "block";
}

function loadMatchingQuestion() {
  const answersDiv = document.getElementById("answers");

  currentQuestion.leftItems.forEach((leftItem, leftIndex) => {

    const shuffledOptions = shuffleArray(
      currentQuestion.rightItems.map((rightItem, rightIndex) => ({
        text: rightItem,
        originalIndex: rightIndex
      }))
    );

    let options = `<option value="">Choose match</option>`;

    shuffledOptions.forEach(option => {
      options += `
        <option value="${option.originalIndex}">
          ${option.text}
        </option>
      `;
    });

    answersDiv.innerHTML += `
      <div class="matching-row">
        <div class="matching-left">${leftItem}</div>
        <select data-left-index="${leftIndex}">
          ${options}
        </select>
      </div>
    `;
  });

  document.getElementById("submitBtn").style.display = "block";
}

function checkSingleAnswer(selected) {

  const feedback = document.getElementById("feedback");
  const buttons = document.querySelectorAll("#answers button");

  buttons.forEach(button => {
    button.disabled = true;
  });

  if (selected === currentQuestion.correct) {

    score++;
    currentLevel++;

    if (currentLevel > 5) currentLevel = 5;

    buttons[selected].style.background = "darkgreen";

    feedback.innerHTML =
      "<strong>Correct.</strong><br>" +
      currentQuestion.feedback +
      "<br><br>Difficulty will increase.";

  } else {

    currentLevel--;

    if (currentLevel < 1) currentLevel = 1;

    buttons[selected].style.background = "darkred";
    buttons[currentQuestion.correct].style.background = "darkgreen";

    feedback.innerHTML =
      "<strong>Incorrect.</strong><br>" +
      "Correct answer: <strong>" +
      currentQuestion.answers[currentQuestion.correct] +
      "</strong><br><br>" +
      currentQuestion.feedback +
      "<br><br>Difficulty will decrease.";
  }

  feedback.style.display = "block";
  document.getElementById("nextBtn").style.display = "block";
}

function submitAnswer() {

  if (currentQuestion.type === "multi") {
    checkMultiAnswer();
  }

  else if (currentQuestion.type === "matching") {
    checkMatchingAnswer();
  }
}

function checkMultiAnswer() {

  const checked = Array.from(
    document.querySelectorAll('#answers input[type="checkbox"]:checked')
  ).map(cb => Number(cb.value));

  const correct =
    checked.length === currentQuestion.correct.length &&
    checked.every(value => currentQuestion.correct.includes(value));

  const feedback = document.getElementById("feedback");

  const checkboxes = document.querySelectorAll('#answers input[type="checkbox"]');

  checkboxes.forEach(cb => {
    cb.disabled = true;
  });

  if (correct) {

    score++;
    currentLevel++;

    if (currentLevel > 5) currentLevel = 5;

    feedback.innerHTML =
      "<strong>Correct.</strong><br>" +
      currentQuestion.feedback +
      "<br><br>Difficulty will increase.";

  } else {

    currentLevel--;

    if (currentLevel < 1) currentLevel = 1;

    const correctAnswers = currentQuestion.correct
      .map(index => currentQuestion.answers[index])
      .join(", ");

    feedback.innerHTML =
      "<strong>Incorrect.</strong><br>" +
      "Correct answers: <strong>" +
      correctAnswers +
      "</strong><br><br>" +
      currentQuestion.feedback +
      "<br><br>Difficulty will decrease.";
  }

  feedback.style.display = "block";
  document.getElementById("submitBtn").style.display = "none";
  document.getElementById("nextBtn").style.display = "block";
}

function checkMatchingAnswer() {

  const selects = document.querySelectorAll("#answers select");

  const selectedAnswers = Array.from(selects).map(select =>
    Number(select.value)
  );

  const allAnswered = selectedAnswers.every(answer =>
    !Number.isNaN(answer)
  );

  const correct =
    allAnswered &&
    selectedAnswers.length === currentQuestion.correct.length &&
    selectedAnswers.every((value, index) =>
      value === currentQuestion.correct[index]
    );

  const feedback = document.getElementById("feedback");

  selects.forEach(select => {
    select.disabled = true;
  });

  if (correct) {

    score++;
    currentLevel++;

    if (currentLevel > 5) currentLevel = 5;

    feedback.innerHTML =
      "<strong>Correct.</strong><br>" +
      currentQuestion.feedback +
      "<br><br>Difficulty will increase.";

  } else {

    currentLevel--;

    if (currentLevel < 1) currentLevel = 1;

    let correctText = "";

    currentQuestion.leftItems.forEach((item, index) => {

      correctText +=
        item +
        " = " +
        currentQuestion.rightItems[currentQuestion.correct[index]] +
        "<br>";
    });

    feedback.innerHTML =
      "<strong>Incorrect.</strong><br>" +
      "<br><strong>Correct matches:</strong><br>" +
      correctText +
      "<br>" +
      currentQuestion.feedback +
      "<br><br>Difficulty will decrease.";
  }

  feedback.style.display = "block";
  document.getElementById("submitBtn").style.display = "none";
  document.getElementById("nextBtn").style.display = "block";
}

function nextQuestion() {
  questionNumber++;
  loadQuestion();
}

function finishExam() {

  document.getElementById("question").innerHTML =
    "<h2>Exam Complete</h2>";

  document.getElementById("answers").innerHTML = "";

  let result = "";

  if (score >= 20) {
    result = "Strong cardiovascular performance.";
  }

  else if (score >= 15) {
    result = "Borderline performance. Review cardiovascular emergencies, medication contraindications, shock, and cardiac arrest management.";
  }

  else {
    result = "Needs remediation. Focus on chest pain assessment, aspirin, nitroglycerin contraindications, CPR, AED use, pulmonary edema, shock, and perfusion.";
  }

  document.getElementById("feedback").style.display = "block";

  document.getElementById("feedback").innerHTML =
    "<strong>Final Score:</strong> " + score + " / " + maxQuestions +
    "<br><br><strong>Final Difficulty Level:</strong> " + currentLevel +
    "<br><br>" + result;

  document.getElementById("status").innerText =
    "Adaptive Exam Finished";

  document.getElementById("submitBtn").style.display = "none";
  document.getElementById("nextBtn").style.display = "none";
  document.getElementById("restartBtn").style.display = "block";
}

function restartExam() {
  currentLevel = 2;
  questionNumber = 0;
  score = 0;
  usedQuestions = [];
  loadQuestion();
}

loadQuestion();

</script>

</body>
</html>
