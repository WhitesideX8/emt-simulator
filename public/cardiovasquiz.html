<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Level 19-20 Adaptive EMT Cardiovascular Exam</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #222;
      color: white;
      padding: 20px;
    }

    .container {
      max-width: 900px;
      margin: auto;
      background: #333;
      padding: 25px;
      border-radius: 10px;
    }

    h1, h2 {
      text-align: center;
    }

    .question-box {
      background: #d9d9d9;
      color: black;
      padding: 20px;
      border-radius: 8px;
      margin-top: 20px;
    }

    button {
      display: block;
      width: 100%;
      margin: 8px 0;
      padding: 12px;
      font-size: 16px;
      background: green;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      text-align: left;
    }

    button:hover {
      background: darkgreen;
    }

    #submitBtn, #nextBtn, #restartBtn {
      background: #0066cc;
      text-align: center;
      display: none;
    }

    #feedback {
      margin-top: 15px;
      padding: 15px;
      background: white;
      color: black;
      border-radius: 6px;
      display: none;
    }

    #status {
      text-align: center;
      margin-top: 15px;
      font-size: 18px;
    }

    .checkbox-answer {
      display: block;
      background: #eeeeee;
      color: black;
      padding: 12px;
      margin: 8px 0;
      border-radius: 6px;
      font-size: 16px;
      cursor: pointer;
    }

    .checkbox-answer input {
      margin-right: 10px;
      transform: scale(1.2);
    }

    .matching-row {
      display: flex;
      align-items: center;
      gap: 15px;
      margin: 12px 0;
      background: #eeeeee;
      padding: 12px;
      border-radius: 6px;
    }

    .matching-left {
      flex: 1;
      font-weight: bold;
    }

    .matching-row select {
      flex: 1;
      padding: 10px;
      font-size: 16px;
      border-radius: 6px;
    }
  </style>
</head>

<body>

<div class="container">
  <h1>EMT Cardiovascular Exam</h1>
  <h2>Level 19-20 Expert Critical-Thinking Adaptive Exam</h2>

  <div id="status"></div>

  <div class="question-box">
    <div id="question"></div>
    <div id="answers"></div>

    <button id="submitBtn" onclick="submitAnswer()">Submit Answer</button>

    <div id="feedback"></div>

    <button id="nextBtn" onclick="nextQuestion()">Next Question</button>
    <button id="restartBtn" onclick="restartExam()">Restart Exam</button>
  </div>
</div>

<script>
const questions = [
  {
    level: 19,
    type: "single",
    question: "A 64-year-old male has crushing chest pressure, pale clammy skin, and nausea. BP is 86/54. He has his prescribed nitroglycerin and took sildenafil earlier today. His wife insists nitro always helps. What is the MOST appropriate EMT action?",
    answers: [
      "Withhold nitroglycerin, treat for poor perfusion, consider aspirin if not contraindicated by protocol, and rapidly transport",
      "Assist with nitroglycerin because the patient has his own prescription",
      "Give nitroglycerin only after the patient stands to improve venous return",
      "Delay transport until the chest pressure improves with rest"
    ],
    correct: 0,
    feedback: "Hypotension and recent sildenafil are major nitroglycerin contraindications. The priority is perfusion support and rapid transport."
  },
  {
    level: 19,
    type: "single",
    question: "A 71-year-old female reports weakness, nausea, shortness of breath, and jaw discomfort but denies chest pain. She is cool, diaphoretic, and hypotensive. What is the MOST correct EMT interpretation?",
    answers: [
      "This may be an atypical acute coronary syndrome presentation requiring high-priority assessment and transport",
      "This is unlikely cardiac because there is no chest pain",
      "This is most likely anxiety because the symptoms are vague",
      "Transport can be delayed until chest pain develops"
    ],
    correct: 0,
    feedback: "Women and older adults may present with atypical ACS symptoms. Absence of chest pain does not rule out serious cardiac disease."
  },
  {
    level: 19,
    type: "single",
    question: "A patient with chest pressure becomes suddenly unresponsive during assessment. He has gasping respirations and no carotid pulse. Family says he was talking one minute ago. What should the EMT do FIRST?",
    answers: [
      "Begin high-quality CPR and apply the AED as soon as possible",
      "Apply oxygen by nonrebreather and obtain a blood pressure",
      "Assist with prescribed nitroglycerin because the complaint began as chest pain",
      "Check a radial pulse for 30 seconds before starting CPR"
    ],
    correct: 0,
    feedback: "Agonal respirations are not normal breathing. Pulseless patients need immediate CPR and AED use."
  },
  {
    level: 19,
    type: "single",
    question: "A 58-year-old with chest pain has severe dyspnea, crackles, pink frothy sputum, and cool clammy skin. BP is 92/60. Which treatment priority is MOST appropriate?",
    answers: [
      "Support oxygenation and ventilation as needed, keep the patient positioned for breathing if tolerated, and rapidly transport",
      "Lay the patient flat to improve venous return",
      "Encourage the patient to cough forcefully until the fluid clears",
      "Withhold transport until lung sounds normalize"
    ],
    correct: 0,
    feedback: "Pulmonary edema with poor perfusion is high risk. Oxygenation, ventilation support, position of comfort, and rapid transport are priorities."
  },
  {
    level: 19,
    type: "single",
    question: "A patient describes sudden tearing chest pain radiating to the back. One radial pulse is weaker than the other, and arm blood pressures are unequal. He asks for aspirin because he thinks it is a heart attack. What should the EMT suspect?",
    answers: [
      "Possible aortic dissection requiring rapid transport and careful reassessment",
      "Stable angina because pain radiates from the chest",
      "Pulmonary edema because the pain is severe",
      "Hypoglycemia because the symptoms are sudden"
    ],
    correct: 0,
    feedback: "Tearing chest/back pain with pulse or blood pressure differences suggests possible aortic dissection."
  },
  {
    level: 19,
    type: "multi",
    question: "A chest pain patient has BP 84/50, cool clammy skin, altered mental status, and recent sildenafil use. Which actions are MOST appropriate? Select all that apply.",
    answers: [
      "Withhold nitroglycerin",
      "Treat for poor perfusion/shock",
      "Prepare for rapid transport",
      "Consider aspirin if not contraindicated and allowed by protocol",
      "Assist with nitroglycerin because chest pain is present",
      "Have the patient walk to improve circulation"
    ],
    correct: [0, 1, 2, 3],
    feedback: "Hypotension and sildenafil make nitroglycerin unsafe. Poor perfusion requires support and rapid transport."
  },
  {
    level: 19,
    type: "multi",
    question: "Which findings should make an EMT suspect a high-risk cardiovascular emergency rather than simple discomfort? Select all that apply.",
    answers: [
      "Chest pressure with diaphoresis and hypotension",
      "Jaw discomfort with weakness and shortness of breath in an older adult",
      "Pink frothy sputum with crackles and severe dyspnea",
      "Tearing pain radiating to the back with unequal arm pressures",
      "Localized pain only when pressing one small spot on the chest",
      "Brief dizziness that resolves completely after standing too quickly"
    ],
    correct: [0, 1, 2, 3],
    feedback: "High-risk cardiovascular presentations include ACS, atypical MI, pulmonary edema, cardiogenic shock, and possible aortic dissection."
  },
  {
    level: 19,
    type: "matching",
    question: "Match the Level 19 cardiovascular presentation with the highest EMT concern.",
    leftItems: [
      "Chest pain, hypotension, recent sildenafil",
      "Weakness, nausea, jaw discomfort, diaphoresis",
      "Pink frothy sputum with crackles",
      "Tearing pain to back with unequal pulses"
    ],
    rightItems: [
      "Nitroglycerin contraindication and poor perfusion",
      "Possible atypical ACS/MI",
      "Possible pulmonary edema from heart failure",
      "Possible aortic dissection",
      "Simple muscle strain relieved by rest"
    ],
    correct: [0, 1, 2, 3],
    feedback: "Level 19 questions require identifying the dangerous pattern and not being distracted by incomplete or atypical presentations."
  },

  {
    level: 20,
    type: "single",
    question: "You are transporting a 67-year-old with suspected MI. He suddenly becomes unresponsive. The monitor/AED is not yet attached. He has agonal respirations and no carotid pulse. Your partner asks whether to finish the medication history first because the hospital will need it. What should guide your NEXT action?",
    answers: [
      "Immediate CPR and AED application take priority over history gathering",
      "Complete the medication history before CPR because it affects cardiac treatment",
      "Give aspirin first because the original complaint was chest pain",
      "Check blood pressure before deciding whether the patient is in cardiac arrest"
    ],
    correct: 0,
    feedback: "At Level 20, the correct action is the one that treats the immediate life threat. Pulseless arrest requires CPR and AED immediately."
  },
  {
    level: 20,
    type: "single",
    question: "A patient with chest pressure, diaphoresis, and hypotension asks for nitroglycerin. He took tadalafil within the last 24 hours. His pain is 10/10 and he says he will refuse transport unless you give nitro. What is the MOST defensible EMT action?",
    answers: [
      "Do not assist nitroglycerin, explain the danger, treat poor perfusion, consider aspirin if appropriate, and continue high-priority transport/refusal protocol if needed",
      "Give nitroglycerin because refusal risk is greater than medication risk",
      "Give half a dose of nitroglycerin to satisfy the patient",
      "Delay all care until the patient agrees to transport"
    ],
    correct: 0,
    feedback: "Severe pain and patient pressure do not remove contraindications. PDE-5 inhibitor use plus hypotension creates major risk."
  },
  {
    level: 20,
    type: "single",
    question: "A patient with suspected cardiac chest pain has increasing respiratory distress, crackles, and falling oxygen saturation despite a nonrebreather. He becomes drowsy and can only speak one-word answers. What is the MOST appropriate EMT priority?",
    answers: [
      "Reassess airway and breathing, support ventilations as needed, and rapidly transport while updating the receiving facility",
      "Continue oxygen by nonrebreather only because positive pressure is never used for cardiac patients",
      "Focus on obtaining a complete OPQRST history before changing treatment",
      "Have the patient lie flat to improve blood flow to the brain"
    ],
    correct: 0,
    feedback: "Worsening respiratory failure in pulmonary edema requires airway and breathing reassessment, ventilation support if needed, and rapid transport."
  },
  {
    level: 20,
    type: "single",
    question: "A chest pain patient has unequal arm blood pressures, tearing pain into the back, and signs of poor perfusion. A bystander tells you to give aspirin immediately because it is always given for chest pain. What is the MOST important EMT reasoning?",
    answers: [
      "The presentation suggests possible aortic dissection; rapid transport and careful reassessment are priorities, and treatment should follow local protocol rather than automatic chest-pain routines",
      "All chest pain must receive aspirin before transport regardless of presentation",
      "Unequal arm blood pressures are usually caused by anxiety and should not affect care",
      "The patient should walk to the ambulance to prevent worsening blood pressure"
    ],
    correct: 0,
    feedback: "Level 20 distractors use common routines. Not all chest pain is the same. Possible dissection requires careful judgment and protocol-based care."
  },
  {
    level: 20,
    type: "single",
    question: "After an AED shock, a pulseless patient remains unresponsive. A family member asks if the shock worked, and your partner pauses to check for a pulse. What should happen immediately after the shock unless signs of life are obvious?",
    answers: [
      "Resume CPR immediately",
      "Wait for the AED to reanalyze without compressions",
      "Remove the pads and check blood pressure",
      "Give nitroglycerin because the arrest followed chest pain"
    ],
    correct: 0,
    feedback: "CPR resumes immediately after a shock unless the patient shows clear signs of life. Do not create unnecessary pauses."
  },
  {
    level: 20,
    type: "multi",
    question: "Which choices demonstrate Level 20 expert EMT cardiovascular judgment? Select all that apply.",
    answers: [
      "Withholding nitroglycerin when hypotension or recent PDE-5 inhibitor use is present",
      "Recognizing atypical ACS in a weak, nauseated, diaphoretic older adult without chest pain",
      "Beginning CPR and applying an AED when a chest pain patient becomes pulseless with agonal respirations",
      "Supporting ventilation when pulmonary edema progresses to respiratory failure",
      "Giving nitroglycerin because the patient insists it always helps",
      "Waiting for diagnostic certainty before transporting a high-risk chest pain patient"
    ],
    correct: [0, 1, 2, 3],
    feedback: "Expert cardiovascular judgment means resisting routine answers when contraindications, deterioration, or atypical symptoms change the priority."
  },
  {
    level: 20,
    type: "multi",
    question: "A cardiovascular patient deteriorates during transport. Which findings require immediate reassessment of ABCs before further history or documentation? Select all that apply.",
    answers: [
      "Sudden unresponsiveness with agonal respirations",
      "Falling oxygen saturation with increasing drowsiness",
      "Severe dyspnea with worsening crackles and one-word speech",
      "Loss of central pulse",
      "Family provides a complete medication list",
      "Pain score changes from 7/10 to 6/10 with stable vital signs"
    ],
    correct: [0, 1, 2, 3],
    feedback: "ABCs override paperwork and history when the patient shows respiratory failure, cardiac arrest, or rapid deterioration."
  },
  {
    level: 20,
    type: "matching",
    question: "Match the Level 20 cardiovascular pressure/distractor with the safest EMT priority.",
    leftItems: [
      "Patient demands nitro but is hypotensive and took tadalafil",
      "Chest pain patient becomes pulseless with agonal respirations",
      "Pulmonary edema patient becomes drowsy with falling oxygen saturation",
      "Tearing chest pain to back with unequal arm pressures"
    ],
    rightItems: [
      "Withhold nitro and manage poor perfusion",
      "Start CPR and apply AED",
      "Reassess airway/breathing and support ventilations",
      "Suspect possible aortic dissection and transport rapidly",
      "Delay care until a complete medication history is obtained"
    ],
    correct: [0, 1, 2, 3],
    feedback: "Level 20 matching focuses on the safest governing principle when distractors compete with patient priorities."
  }
];

let currentLevel = 19;
let questionNumber = 0;
let score = 0;
let maxQuestions = 25;
let currentQuestion;
let usedQuestions = [];

function shuffleArray(array) {
  return array
    .map(value => ({ value, sort: Math.random() }))
    .sort((a, b) => a.sort - b.sort)
    .map(({ value }) => value);
}

function getQuestionByLevel(level) {
  let available = questions.filter(q =>
    q.level === level && !usedQuestions.includes(q.question)
  );

  if (available.length === 0) {
    available = questions.filter(q => !usedQuestions.includes(q.question));
  }

  if (available.length === 0) {
    usedQuestions = [];
    available = questions.filter(q => q.level === level);
  }

  return available[Math.floor(Math.random() * available.length)];
}

function loadQuestion() {
  if (questionNumber >= maxQuestions) {
    finishExam();
    return;
  }

  currentQuestion = getQuestionByLevel(currentLevel);

  if (!currentQuestion) return;

  usedQuestions.push(currentQuestion.question);

  document.getElementById("status").innerText =
    "Question " + (questionNumber + 1) +
    " of " + maxQuestions +
    " | Current Difficulty Level: " + currentLevel +
    " | Score: " + score;

  document.getElementById("question").innerHTML =
    "<strong>" + currentQuestion.question + "</strong>";

  document.getElementById("answers").innerHTML = "";
  document.getElementById("feedback").style.display = "none";
  document.getElementById("nextBtn").style.display = "none";
  document.getElementById("restartBtn").style.display = "none";
  document.getElementById("submitBtn").style.display = "none";

  if (currentQuestion.type === "single") {
    loadSingleQuestion();
  } else if (currentQuestion.type === "multi") {
    loadMultiQuestion();
  } else if (currentQuestion.type === "matching") {
    loadMatchingQuestion();
  }
}

function loadSingleQuestion() {
  const answersDiv = document.getElementById("answers");

  const shuffledAnswers = shuffleArray(
    currentQuestion.answers.map((answer, index) => ({
      text: answer,
      originalIndex: index
    }))
  );

  currentQuestion.shuffledSingleAnswers = shuffledAnswers;

  shuffledAnswers.forEach((answer, index) => {
    answersDiv.innerHTML += `
      <button onclick="checkSingleAnswer(${index})">
        ${answer.text}
      </button>
    `;
  });
}

function loadMultiQuestion() {
  const answersDiv = document.getElementById("answers");

  const correctAnswers = currentQuestion.correct.map(index => ({
    text: currentQuestion.answers[index],
    isCorrect: true
  }));

  const incorrectAnswers = currentQuestion.answers
    .map((answer, index) => ({
      text: answer,
      isCorrect: false,
      originalIndex: index
    }))
    .filter(answer => !currentQuestion.correct.includes(answer.originalIndex));

  const twoIncorrectAnswers = shuffleArray(incorrectAnswers).slice(0, 2);

  const finalAnswers = shuffleArray([
    ...correctAnswers,
    ...twoIncorrectAnswers
  ]);

  currentQuestion.shuffledAnswers = finalAnswers;

  currentQuestion.shuffledCorrect = finalAnswers
    .map((answer, index) => answer.isCorrect ? index : null)
    .filter(index => index !== null);

  finalAnswers.forEach((answer, index) => {
    answersDiv.innerHTML += `
      <label class="checkbox-answer">
        <input type="checkbox" value="${index}">
        ${answer.text}
      </label>
    `;
  });

  document.getElementById("submitBtn").style.display = "block";
}

function loadMatchingQuestion() {
  const answersDiv = document.getElementById("answers");

  currentQuestion.leftItems.forEach((leftItem, leftIndex) => {
    const shuffledOptions = shuffleArray(
      currentQuestion.rightItems.map((rightItem, rightIndex) => ({
        text: rightItem,
        originalIndex: rightIndex
      }))
    );

    let options = `<option value="">Choose match</option>`;

    shuffledOptions.forEach(option => {
      options += `
        <option value="${option.originalIndex}">
          ${option.text}
        </option>
      `;
    });

    answersDiv.innerHTML += `
      <div class="matching-row">
        <div class="matching-left">${leftItem}</div>
        <select data-left-index="${leftIndex}">
          ${options}
        </select>
      </div>
    `;
  });

  document.getElementById("submitBtn").style.display = "block";
}

function checkSingleAnswer(selected) {
  const feedback = document.getElementById("feedback");
  const buttons = document.querySelectorAll("#answers button");

  buttons.forEach(button => {
    button.disabled = true;
  });

  const selectedOriginalIndex =
    currentQuestion.shuffledSingleAnswers[selected].originalIndex;

  const correctShuffledIndex =
    currentQuestion.shuffledSingleAnswers.findIndex(
      answer => answer.originalIndex === currentQuestion.correct
    );

  if (selectedOriginalIndex === currentQuestion.correct) {
    score++;
    currentLevel++;
    if (currentLevel > 20) currentLevel = 20;

    buttons[selected].style.background = "darkgreen";

    feedback.innerHTML =
      "<strong>Correct.</strong><br>" +
      currentQuestion.feedback +
      "<br><br>Difficulty will increase if possible.";
  } else {
    currentLevel--;
    if (currentLevel < 19) currentLevel = 19;

    buttons[selected].style.background = "darkred";
    buttons[correctShuffledIndex].style.background = "darkgreen";

    feedback.innerHTML =
      "<strong>Incorrect.</strong><br>" +
      "Most correct answer: <strong>" +
      currentQuestion.answers[currentQuestion.correct] +
      "</strong><br><br>" +
      currentQuestion.feedback +
      "<br><br>Difficulty will decrease if possible.";
  }

  feedback.style.display = "block";
  document.getElementById("nextBtn").style.display = "block";
}

function submitAnswer() {
  if (currentQuestion.type === "multi") {
    checkMultiAnswer();
  } else if (currentQuestion.type === "matching") {
    checkMatchingAnswer();
  }
}

function checkMultiAnswer() {
  const checked = Array.from(
    document.querySelectorAll('#answers input[type="checkbox"]:checked')
  ).map(cb => Number(cb.value));

  const correctAnswers = currentQuestion.shuffledCorrect;

  const correct =
    checked.length === correctAnswers.length &&
    checked.every(value => correctAnswers.includes(value));

  const feedback = document.getElementById("feedback");
  const checkboxes = document.querySelectorAll('#answers input[type="checkbox"]');

  checkboxes.forEach(cb => {
    cb.disabled = true;
  });

  if (correct) {
    score++;
    currentLevel++;
    if (currentLevel > 20) currentLevel = 20;

    feedback.innerHTML =
      "<strong>Correct.</strong><br>" +
      currentQuestion.feedback +
      "<br><br>Difficulty will increase if possible.";
  } else {
    currentLevel--;
    if (currentLevel < 19) currentLevel = 19;

    const correctText = currentQuestion.shuffledCorrect
      .map(index => currentQuestion.shuffledAnswers[index].text)
      .join(", ");

    feedback.innerHTML =
      "<strong>Incorrect.</strong><br>" +
      "Most correct answers: <strong>" +
      correctText +
      "</strong><br><br>" +
      currentQuestion.feedback +
      "<br><br>Difficulty will decrease if possible.";
  }

  feedback.style.display = "block";
  document.getElementById("submitBtn").style.display = "none";
  document.getElementById("nextBtn").style.display = "block";
}

function checkMatchingAnswer() {
  const selects = document.querySelectorAll("#answers select");
  const selectedAnswers = Array.from(selects).map(select => Number(select.value));

  const allAnswered = selectedAnswers.every(answer => !Number.isNaN(answer));

  const correct =
    allAnswered &&
    selectedAnswers.length === currentQuestion.correct.length &&
    selectedAnswers.every((value, index) => value === currentQuestion.correct[index]);

  const feedback = document.getElementById("feedback");

  selects.forEach(select => {
    select.disabled = true;
  });

  if (correct) {
    score++;
    currentLevel++;
    if (currentLevel > 20) currentLevel = 20;

    feedback.innerHTML =
      "<strong>Correct.</strong><br>" +
      currentQuestion.feedback +
      "<br><br>Difficulty will increase if possible.";
  } else {
    currentLevel--;
    if (currentLevel < 19) currentLevel = 19;

    let correctText = "";

    currentQuestion.leftItems.forEach((item, index) => {
      correctText +=
        item +
        " = " +
        currentQuestion.rightItems[currentQuestion.correct[index]] +
        "<br>";
    });

    feedback.innerHTML =
      "<strong>Incorrect.</strong><br>" +
      "<br><strong>Most correct matches:</strong><br>" +
      correctText +
      "<br>" +
      currentQuestion.feedback +
      "<br><br>Difficulty will decrease if possible.";
  }

  feedback.style.display = "block";
  document.getElementById("submitBtn").style.display = "none";
  document.getElementById("nextBtn").style.display = "block";
}

function nextQuestion() {
  questionNumber++;
  loadQuestion();
}

function finishExam() {
  document.getElementById("question").innerHTML =
    "<h2>Exam Complete</h2>";

  document.getElementById("answers").innerHTML = "";

  let result = "";

  if (score >= 22) {
    result = "Excellent performance. Student is handling Level 19-20 expert cardiovascular scenarios with strong prioritization and resistance to distractors.";
  } else if (score >= 18) {
    result = "Good performance. Review nitroglycerin contraindications, atypical ACS, pulmonary edema, aortic dissection, cardiogenic shock, CPR, and AED sequencing.";
  } else if (score >= 14) {
    result = "Borderline performance. Review competing cardiovascular priorities, medication contraindications, deteriorating breathing, poor perfusion, and most-correct-answer reasoning.";
  } else {
    result = "Needs remediation. Focus on EMT cardiovascular priorities: ABCs, perfusion, aspirin/nitroglycerin rules, shock, AED use, CPR, pulmonary edema, atypical MI, and rapid transport.";
  }

  document.getElementById("feedback").style.display = "block";
  document.getElementById("feedback").innerHTML =
    "<strong>Final Score:</strong> " + score + " / " + maxQuestions +
    "<br><br><strong>Final Difficulty Level:</strong> " + currentLevel +
    "<br><br>" + result;

  document.getElementById("status").innerText =
    "Level 19-20 Expert Cardiovascular Exam Finished";

  document.getElementById("submitBtn").style.display = "none";
  document.getElementById("nextBtn").style.display = "none";
  document.getElementById("restartBtn").style.display = "block";
}

function restartExam() {
  currentLevel = 19;
  questionNumber = 0;
  score = 0;
  usedQuestions = [];
  loadQuestion();
}

loadQuestion();
</script>

</body>
</html>
