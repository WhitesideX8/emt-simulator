<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>EMT Simulation Scenarios</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: url('https://raw.githubusercontent.com/WhitesideX8/emt-simulator/main/public/IMG_0989.jpg') no-repeat center center fixed;
  background-size: cover;
  text-align: center;
  color: white;
}

body::before {
  content: "";
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.45);
  z-index: 0;
}

.container {
  position: relative;
  z-index: 1;
  padding-top: 40px;
}

h1 {
  margin-bottom: 25px;
  font-size: 42px;
}

.avatar-box {
  position: relative;
  display: inline-block;
  margin-bottom: 25px;
}

.avatar {
  width: 280px;
  max-width: 90%;
  border-radius: 14px;
  cursor: pointer;
}

.mouth {
  position: absolute;
  left: 50%;
  top: 58%;
  width: 42px;
  height: 7px;
  background: #111;
  border-radius: 50%;
  transform: translateX(-50%);
  display: none;
}

.talking .mouth {
  display: block;
  animation: talk 0.18s infinite alternate;
}

@keyframes talk {
  from { height: 6px; }
  to { height: 22px; }
}

button {
  display: block;
  width: 300px;
  margin: 15px auto;
  padding: 15px;
  font-size: 20px;
  background: green;
  color: white;
  border: none;
  border-radius: 8px;
  cursor: pointer;
}

button:hover {
  background: darkgreen;
}
</style>
</head>

<body>
<div class="container">

  <h1>EMT Simulation Scenarios</h1>

  <div id="avatarBox" class="avatar-box">
    <img
      id="avatar"
      class="avatar"
      src="public/ChatGPT Image Jun 28, 2026, 11_28_32 AM.png"
      alt="Patient Avatar"
    >
    <div class="mouth"></div>
  </div>

  <a href="chestpain.html">
    <button>Scenario #1</button>
  </a>

  <a href="sob.html">
    <button>Scenario #2</button>
  </a>

  <a href="stroke.html">
    <button>Scenario #3</button>
  </a>

  <a href="diabetic.html">
    <button>Scenario #4</button>
  </a>

</div>

<script>
const avatar = document.getElementById("avatar");
const avatarBox = document.getElementById("avatarBox");

avatar.addEventListener("click", () => {
  speak("Welcome to the EMT simulation scenarios. Please select a patient scenario to begin.");
});

function speak(text) {
  speechSynthesis.cancel();

  const speech = new SpeechSynthesisUtterance(text);
  speech.rate = 0.9;
  speech.pitch = 1;
  speech.volume = 1;

  avatarBox.classList.add("talking");

  speech.onend = () => {
    avatarBox.classList.remove("talking");
  };

  speechSynthesis.speak(speech);
}
</script>

</body>
</html>
