<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Adaptive EMT Legal and Communications Exam</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #222;
      color: white;
      padding: 20px;
    }

    .container {
      max-width: 900px;
      margin: auto;
      background: #333;
      padding: 25px;
      border-radius: 10px;
    }

    h1, h2 {
      text-align: center;
    }

    .question-box {
      background: #d9d9d9;
      color: black;
      padding: 20px;
      border-radius: 8px;
      margin-top: 20px;
    }

    button {
      display: block;
      width: 100%;
      margin: 8px 0;
      padding: 12px;
      font-size: 16px;
      background: green;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      text-align: left;
    }

    button:hover {
      background: darkgreen;
    }

    #submitBtn, #nextBtn, #restartBtn {
      background: #0066cc;
      text-align: center;
      display: none;
    }

    #feedback {
      margin-top: 15px;
      padding: 15px;
      background: white;
      color: black;
      border-radius: 6px;
      display: none;
    }

    #status {
      text-align: center;
      margin-top: 15px;
      font-size: 18px;
    }

    .checkbox-answer {
      display: block;
      background: #eeeeee;
      color: black;
      padding: 12px;
      margin: 8px 0;
      border-radius: 6px;
      font-size: 16px;
      cursor: pointer;
    }

    .checkbox-answer input {
      margin-right: 10px;
      transform: scale(1.2);
    }

    .matching-row {
      display: flex;
      align-items: center;
      gap: 15px;
      margin: 12px 0;
      background: #eeeeee;
      padding: 12px;
      border-radius: 6px;
    }

    .matching-left {
      flex: 1;
      font-weight: bold;
    }

    .matching-row select {
      flex: 1;
      padding: 10px;
      font-size: 16px;
      border-radius: 6px;
    }
  </style>
</head>

<body>

<div class="container">
  <h1>EMT Legal and Communications Exam</h1>
  <h2>Scenario-Based Multiple Choice, Select-All-That-Apply, Matching, and Radio Questions</h2>

  <div id="status"></div>

  <div class="question-box">
    <div id="question"></div>
    <div id="answers"></div>

    <button id="submitBtn" onclick="submitAnswer()">Submit Answer</button>

    <div id="feedback"></div>

    <button id="nextBtn" onclick="nextQuestion()">Next Question</button>
    <button id="restartBtn" onclick="restartExam()">Restart Exam</button>
  </div>
</div>

<script>
const questions = [
  {
    level: 1,
    type: "single",
    question: "A conscious adult patient with chest pain says, 'I do not want to go to the hospital.' Before accepting the refusal, what must the EMT first determine?",
    answers: [
      "Whether the patient has insurance",
      "Whether the patient has decision-making capacity",
      "Whether the family agrees",
      "Whether the hospital is busy"
    ],
    correct: 1,
    feedback: "A refusal is only valid if the patient has decision-making capacity and understands the risks."
  },
  {
    level: 1,
    type: "single",
    question: "An unconscious adult is found after a fall and needs emergency care. What type of consent allows treatment?",
    answers: ["Expressed consent", "Implied consent", "Informed refusal", "Written consent"],
    correct: 1,
    feedback: "Implied consent applies when an unconscious patient needs emergency care."
  },
  {
    level: 1,
    type: "single",
    question: "Which radio report is most appropriate?",
    answers: [
      "We are bringing in a sick person.",
      "Patient has chest pain and looks bad.",
      "Adult male, chest pain, pale and diaphoretic, BP 88/60, aspirin given, ETA 6 minutes.",
      "Tell the doctor we are coming."
    ],
    correct: 2,
    feedback: "A good radio report is clear, concise, objective, and includes key assessment and treatment information."
  },
  {
    level: 1,
    type: "multi",
    question: "Which statements should be documented in a refusal? Select all that apply.",
    answers: [
      "Patient was advised of risks",
      "Patient verbalized understanding",
      "Patient signature if obtained",
      "EMT opinion that the patient was annoying"
    ],
    correct: [0, 1, 2],
    feedback: "Refusal documentation should include risks explained, patient understanding, and signatures when possible."
  },
  {
    level: 1,
    type: "matching",
    question: "Match the legal concept with the best example.",
    leftItems: ["Implied consent", "Expressed consent", "Confidentiality"],
    rightItems: [
      "Unconscious patient treated in emergency",
      "Patient says yes to treatment",
      "Protecting patient medical information"
    ],
    correct: [0, 1, 2],
    feedback: "These are common legal principles used during EMS care."
  },

  {
    level: 2,
    type: "single",
    question: "A patient refuses transport after syncope. He is alert, oriented, and understands the risks. What is the EMT’s best action?",
    answers: [
      "Force transport because syncope is serious",
      "Leave immediately without documentation",
      "Explain risks, contact medical direction if required, and document refusal",
      "Ask police to arrest the patient"
    ],
    correct: 2,
    feedback: "A competent patient may refuse care, but high-risk refusals require careful explanation and documentation."
  },
  {
    level: 2,
    type: "single",
    question: "You begin treating a patient, then leave before another qualified provider takes over. This is known as:",
    answers: ["Negligence", "Abandonment", "Assault", "Libel"],
    correct: 1,
    feedback: "Abandonment occurs when care is stopped without proper transfer."
  },
  {
    level: 2,
    type: "single",
    question: "Which documentation statement is most objective?",
    answers: [
      "Patient was drunk and rude.",
      "Patient appeared lazy.",
      "Patient had slurred speech and odor of alcohol on breath.",
      "Patient was pretending to be sick."
    ],
    correct: 2,
    feedback: "Documentation should be objective and based on observable facts."
  },
  {
    level: 2,
    type: "multi",
    question: "Which actions help protect patient confidentiality? Select all that apply.",
    answers: [
      "Only discuss patient information with providers involved in care",
      "Avoid posting call details on social media",
      "Use patient information only for care and documentation",
      "Share patient details with friends after the call"
    ],
    correct: [0, 1, 2],
    feedback: "Patient information must be protected and only shared for legitimate care-related reasons."
  },
  {
    level: 2,
    type: "matching",
    question: "Match each documentation problem with the concern.",
    leftItems: ["Missing vitals", "Personal opinion", "Late entry not marked"],
    rightItems: [
      "Incomplete patient assessment record",
      "Subjective and inappropriate charting",
      "Could appear dishonest or altered"
    ],
    correct: [0, 1, 2],
    feedback: "Good documentation must be accurate, complete, objective, and honest."
  },

  {
    level: 2,
    type: "single",
    question: "What is the primary purpose of an EMS radio report to the hospital?",
    answers: [
      "To entertain the receiving staff",
      "To allow the hospital to prepare for the patient",
      "To provide billing information",
      "To replace written documentation"
    ],
    correct: 1,
    feedback: "Radio reports help the receiving facility prepare personnel and equipment before patient arrival."
  },
  {
    level: 2,
    type: "single",
    question: "Which radio transmission is most appropriate?",
    answers: [
      "We have a really sick patient coming in.",
      "62-year-old male with chest pain, BP 88/60, aspirin given, ETA 5 minutes.",
      "Patient is annoying and will not stop talking.",
      "Guess what happened on this call?"
    ],
    correct: 1,
    feedback: "Professional radio reports should be concise, objective, and clinically relevant."
  },

  {
    level: 3,
    type: "single",
    question: "A confused elderly patient refuses transport after a head injury. What is the EMT’s main concern?",
    answers: [
      "The patient may not have decision-making capacity",
      "The patient has the right to refuse no matter what",
      "The EMT must immediately leave",
      "The refusal does not need documentation"
    ],
    correct: 0,
    feedback: "Confusion after injury may affect capacity, making refusal more complex."
  },
  {
    level: 3,
    type: "single",
    question: "A patient says, 'I understand I could die, but I still do not want transport.' This statement is important because it shows:",
    answers: [
      "The patient is automatically incompetent",
      "The patient may understand the risk of refusal",
      "The EMT can stop documenting",
      "The patient must be transported anyway"
    ],
    correct: 1,
    feedback: "Understanding the risk is an important part of informed refusal."
  },
  {
    level: 3,
    type: "single",
    question: "During handoff, which information is most important to include?",
    answers: [
      "Your opinion of the patient’s personality",
      "The patient’s chief complaint, findings, treatments, and response",
      "Only the patient’s name",
      "Only the destination hospital"
    ],
    correct: 1,
    feedback: "A good handoff includes complaint, assessment, care provided, and patient response."
  },
  {
    level: 3,
    type: "multi",
    question: "Which factors may affect a patient’s ability to refuse care? Select all that apply.",
    answers: [
      "Altered mental status",
      "Intoxication",
      "Hypoxia",
      "Being calm and fully oriented"
    ],
    correct: [0, 1, 2],
    feedback: "Mental status, intoxication, and hypoxia may impair decision-making capacity."
  },
  {
    level: 3,
    type: "multi",
    question: "Which information should usually be included in a radio report? Select all that apply.",
    answers: [
      "Patient age and sex",
      "Chief complaint",
      "Vital signs",
      "Personal opinions about the patient"
    ],
    correct: [0, 1, 2],
    feedback: "A radio report should include important patient information, assessment findings, and treatments."
  },
  {
    level: 3,
    type: "matching",
    question: "Match the EMS communication situation with the best action.",
    leftItems: ["Angry patient", "Language barrier", "Hospital handoff"],
    rightItems: [
      "Remain calm and avoid arguing",
      "Use interpreter resources when available",
      "Give concise report with findings and treatment"
    ],
    correct: [0, 1, 2],
    feedback: "Communication should be calm, clear, respectful, and appropriate to the situation."
  },
  {
    level: 3,
    type: "matching",
    question: "Match the radio communication term with its meaning.",
    leftItems: [
      "ETA",
      "Repeat traffic",
      "Affirmative",
      "Stand by"
    ],
    rightItems: [
      "Estimated time of arrival",
      "Repeat the message",
      "Yes/confirmed",
      "Wait for further communication"
    ],
    correct: [0, 1, 2, 3],
    feedback: "These are common EMS radio communication terms."
  },

  {
    level: 4,
    type: "single",
    question: "You document that the patient 'was fine' after treatment. Why is this weak documentation?",
    answers: [
      "It is too objective",
      "It does not describe specific patient findings or response",
      "It includes too many vital signs",
      "It protects the EMT legally"
    ],
    correct: 1,
    feedback: "Documentation should describe specific findings, not vague conclusions."
  },
  {
    level: 4,
    type: "single",
    question: "A competent adult refuses spinal motion restriction after a fall. Which is the best documentation?",
    answers: [
      "Patient refused. No further details.",
      "Patient was difficult and refused everything.",
      "Risks including worsening spinal injury explained; patient verbalized understanding and refused care.",
      "Patient did not want help."
    ],
    correct: 2,
    feedback: "The best refusal documentation includes risks explained, understanding, and the care refused."
  },
  {
    level: 4,
    type: "single",
    question: "During a radio report, another unit interrupts with emergency traffic. What should you do?",
    answers: [
      "Continue speaking over them",
      "Stop transmitting and allow emergency traffic",
      "Ignore the interruption",
      "Turn off the radio"
    ],
    correct: 1,
    feedback: "Emergency traffic takes priority over routine radio communication."
  },
  {
    level: 4,
    type: "multi",
    question: "Which elements are part of negligence? Select all that apply.",
    answers: [
      "Duty to act",
      "Breach of duty",
      "Damages or harm",
      "A perfect patient outcome"
    ],
    correct: [0, 1, 2],
    feedback: "Negligence generally involves duty, breach, damages, and causation."
  },
  {
    level: 4,
    type: "matching",
    question: "Match the legal risk with the example.",
    leftItems: ["Battery", "Abandonment", "Confidentiality breach", "Negligence"],
    rightItems: [
      "Touching without consent",
      "Leaving without proper transfer",
      "Posting call details online",
      "Failing to meet standard of care"
    ],
    correct: [0, 1, 2, 3],
    feedback: "These examples represent common EMS legal risks."
  },

  {
    level: 5,
    type: "single",
    question: "A patient with possible stroke refuses transport. Family wants EMS to force transport, but the patient is alert, oriented, and clearly explains the risks. What should the EMT do?",
    answers: [
      "Force transport because family requests it",
      "Accept refusal immediately without explanation",
      "Follow refusal procedure, explain risks, involve medical direction if required, and document carefully",
      "Ignore the patient and ask police to decide"
    ],
    correct: 2,
    feedback: "High-risk refusals require careful assessment, risk explanation, possible medical direction, and detailed documentation."
  }
];

let currentLevel = 2;
let questionNumber = 0;
let score = 0;
let maxQuestions = 25;
let currentQuestion;
let usedQuestions = [];

function shuffleArray(array) {
  return array
    .map(value => ({ value, sort: Math.random() }))
    .sort((a, b) => a.sort - b.sort)
    .map(({ value }) => value);
}

function getQuestionByLevel(level) {
  let available = questions.filter(q =>
    q.level === level && !usedQuestions.includes(q.question)
  );

  if (available.length === 0) {
    available = questions.filter(q => !usedQuestions.includes(q.question));
  }

  if (available.length === 0) {
    finishExam();
    return null;
  }

  return available[Math.floor(Math.random() * available.length)];
}

function loadQuestion() {
  if (questionNumber >= maxQuestions) {
    finishExam();
    return;
  }

  currentQuestion = getQuestionByLevel(currentLevel);

  if (!currentQuestion) return;

  usedQuestions.push(currentQuestion.question);

  document.getElementById("status").innerText =
    "Question " + (questionNumber + 1) +
    " of " + maxQuestions +
    " | Current Difficulty Level: " + currentLevel +
    " | Score: " + score;

  document.getElementById("question").innerHTML =
    "<strong>" + currentQuestion.question + "</strong>";

  document.getElementById("answers").innerHTML = "";
  document.getElementById("feedback").style.display = "none";
  document.getElementById("nextBtn").style.display = "none";
  document.getElementById("restartBtn").style.display = "none";
  document.getElementById("submitBtn").style.display = "none";

  if (currentQuestion.type === "single") {
    loadSingleQuestion();
  } else if (currentQuestion.type === "multi") {
    loadMultiQuestion();
  } else if (currentQuestion.type === "matching") {
    loadMatchingQuestion();
  }
}

function loadSingleQuestion() {
  const answersDiv = document.getElementById("answers");

  currentQuestion.answers.forEach((answer, index) => {
    answersDiv.innerHTML += `
      <button onclick="checkSingleAnswer(${index})">
        ${answer}
      </button>
    `;
  });
}

function loadMultiQuestion() {
  const answersDiv = document.getElementById("answers");

  currentQuestion.answers.forEach((answer, index) => {
    answersDiv.innerHTML += `
      <label class="checkbox-answer">
        <input type="checkbox" value="${index}">
        ${answer}
      </label>
    `;
  });

  document.getElementById("submitBtn").style.display = "block";
}

function loadMatchingQuestion() {
  const answersDiv = document.getElementById("answers");

  currentQuestion.leftItems.forEach((leftItem, leftIndex) => {
    const shuffledOptions = shuffleArray(
      currentQuestion.rightItems.map((rightItem, rightIndex) => ({
        text: rightItem,
        originalIndex: rightIndex
      }))
    );

    let options = `<option value="">Choose match</option>`;

    shuffledOptions.forEach(option => {
      options += `
        <option value="${option.originalIndex}">
          ${option.text}
        </option>
      `;
    });

    answersDiv.innerHTML += `
      <div class="matching-row">
        <div class="matching-left">${leftItem}</div>
        <select data-left-index="${leftIndex}">
          ${options}
        </select>
      </div>
    `;
  });

  document.getElementById("submitBtn").style.display = "block";
}

function checkSingleAnswer(selected) {
  const feedback = document.getElementById("feedback");
  const buttons = document.querySelectorAll("#answers button");

  buttons.forEach(button => {
    button.disabled = true;
  });

  if (selected === currentQuestion.correct) {
    score++;
    currentLevel++;
    if (currentLevel > 5) currentLevel = 5;

    buttons[selected].style.background = "darkgreen";

    feedback.innerHTML =
      "<strong>Correct.</strong><br>" +
      currentQuestion.feedback +
      "<br><br>Difficulty will increase.";
  } else {
    currentLevel--;
    if (currentLevel < 1) currentLevel = 1;

    buttons[selected].style.background = "darkred";
    buttons[currentQuestion.correct].style.background = "darkgreen";

    feedback.innerHTML =
      "<strong>Incorrect.</strong><br>" +
      "Correct answer: <strong>" +
      currentQuestion.answers[currentQuestion.correct] +
      "</strong><br><br>" +
      currentQuestion.feedback +
      "<br><br>Difficulty will decrease.";
  }

  feedback.style.display = "block";
  document.getElementById("nextBtn").style.display = "block";
}

function submitAnswer() {
  if (currentQuestion.type === "multi") {
    checkMultiAnswer();
  } else if (currentQuestion.type === "matching") {
    checkMatchingAnswer();
  }
}

function checkMultiAnswer() {
  const checked = Array.from(
    document.querySelectorAll('#answers input[type="checkbox"]:checked')
  ).map(cb => Number(cb.value));

  const correct =
    checked.length === currentQuestion.correct.length &&
    checked.every(value => currentQuestion.correct.includes(value));

  const feedback = document.getElementById("feedback");
  const checkboxes = document.querySelectorAll('#answers input[type="checkbox"]');

  checkboxes.forEach(cb => {
    cb.disabled = true;
  });

  if (correct) {
    score++;
    currentLevel++;
    if (currentLevel > 5) currentLevel = 5;

    feedback.innerHTML =
      "<strong>Correct.</strong><br>" +
      currentQuestion.feedback +
      "<br><br>Difficulty will increase.";
  } else {
    currentLevel--;
    if (currentLevel < 1) currentLevel = 1;

    const correctAnswers = currentQuestion.correct
      .map(index => currentQuestion.answers[index])
      .join(", ");

    feedback.innerHTML =
      "<strong>Incorrect.</strong><br>" +
      "Correct answers: <strong>" +
      correctAnswers +
      "</strong><br><br>" +
      currentQuestion.feedback +
      "<br><br>Difficulty will decrease.";
  }

  feedback.style.display = "block";
  document.getElementById("submitBtn").style.display = "none";
  document.getElementById("nextBtn").style.display = "block";
}

function checkMatchingAnswer() {
  const selects = document.querySelectorAll("#answers select");
  const selectedAnswers = Array.from(selects).map(select => Number(select.value));

  const allAnswered = selectedAnswers.every(answer => !Number.isNaN(answer));

  const correct =
    allAnswered &&
    selectedAnswers.length === currentQuestion.correct.length &&
    selectedAnswers.every((value, index) => value === currentQuestion.correct[index]);

  const feedback = document.getElementById("feedback");

  selects.forEach(select => {
    select.disabled = true;
  });

  if (correct) {
    score++;
    currentLevel++;
    if (currentLevel > 5) currentLevel = 5;

    feedback.innerHTML =
      "<strong>Correct.</strong><br>" +
      currentQuestion.feedback +
      "<br><br>Difficulty will increase.";
  } else {
    currentLevel--;
    if (currentLevel < 1) currentLevel = 1;

    let correctText = "";

    currentQuestion.leftItems.forEach((item, index) => {
      correctText +=
        item +
        " = " +
        currentQuestion.rightItems[currentQuestion.correct[index]] +
        "<br>";
    });

    feedback.innerHTML =
      "<strong>Incorrect.</strong><br>" +
      "<br><strong>Correct matches:</strong><br>" +
      correctText +
      "<br>" +
      currentQuestion.feedback +
      "<br><br>Difficulty will decrease.";
  }

  feedback.style.display = "block";
  document.getElementById("submitBtn").style.display = "none";
  document.getElementById("nextBtn").style.display = "block";
}

function nextQuestion() {
  questionNumber++;
  loadQuestion();
}

function finishExam() {
  document.getElementById("question").innerHTML =
    "<h2>Exam Complete</h2>";

  document.getElementById("answers").innerHTML = "";

  let result = "";

  if (score >= 20) {
    result = "Strong performance. Continue with advanced legal, documentation, refusal, and radio communication review.";
  } else if (score >= 15) {
    result = "Borderline performance. Review refusals, documentation, consent, confidentiality, handoff reports, and radio reports.";
  } else {
    result = "Needs remediation. Focus on informed refusal, decision-making capacity, abandonment, negligence, documentation, radio reports, and patient handoff.";
  }

  document.getElementById("feedback").style.display = "block";

  document.getElementById("feedback").innerHTML =
    "<strong>Final Score:</strong> " + score + " / " + maxQuestions +
    "<br><br><strong>Final Difficulty Level:</strong> " + currentLevel +
    "<br><br>" + result;

  document.getElementById("status").innerText =
    "Adaptive Exam Finished";

  document.getElementById("submitBtn").style.display = "none";
  document.getElementById("nextBtn").style.display = "none";
  document.getElementById("restartBtn").style.display = "block";
}

function restartExam() {
  currentLevel = 2;
  questionNumber = 0;
  score = 0;
  usedQuestions = [];
  loadQuestion();
}

loadQuestion();
</script>

</body>
</html>
