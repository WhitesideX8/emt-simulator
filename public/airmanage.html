<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Adaptive EMT Airway Management Exam</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #222;
      color: white;
      padding: 20px;
    }

    .container {
      max-width: 900px;
      margin: auto;
      background: #333;
      padding: 25px;
      border-radius: 10px;
    }

    h1, h2 {
      text-align: center;
    }

    .question-box {
      background: #d9d9d9;
      color: black;
      padding: 20px;
      border-radius: 8px;
      margin-top: 20px;
    }

    button {
      display: block;
      width: 100%;
      margin: 8px 0;
      padding: 12px;
      font-size: 16px;
      background: green;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      text-align: left;
    }

    button:hover {
      background: darkgreen;
    }

    #submitBtn, #nextBtn, #restartBtn {
      background: #0066cc;
      text-align: center;
      display: none;
    }

    #feedback {
      margin-top: 15px;
      padding: 15px;
      background: white;
      color: black;
      border-radius: 6px;
      display: none;
    }

    #status {
      text-align: center;
      margin-top: 15px;
      font-size: 18px;
    }

    .checkbox-answer {
      display: block;
      background: #eeeeee;
      color: black;
      padding: 12px;
      margin: 8px 0;
      border-radius: 6px;
      font-size: 16px;
      cursor: pointer;
    }

    .checkbox-answer input {
      margin-right: 10px;
      transform: scale(1.2);
    }

    .matching-row {
      display: flex;
      align-items: center;
      gap: 15px;
      margin: 12px 0;
      background: #eeeeee;
      padding: 12px;
      border-radius: 6px;
    }

    .matching-left {
      flex: 1;
      font-weight: bold;
    }

    .matching-row select {
      flex: 1;
      padding: 10px;
      font-size: 16px;
      border-radius: 6px;
    }
  </style>
</head>

<body>

<div class="container">
  <h1>EMT Airway Management Exam</h1>
  <h2>Most-Correct EMT Style Questions</h2>

  <div id="status"></div>

  <div class="question-box">
    <div id="question"></div>
    <div id="answers"></div>

    <button id="submitBtn" onclick="submitAnswer()">Submit Answer</button>

    <div id="feedback"></div>

    <button id="nextBtn" onclick="nextQuestion()">Next Question</button>
    <button id="restartBtn" onclick="restartExam()">Restart Exam</button>
  </div>
</div>

<script>
const questions = [
  {
    level: 1,
    type: "single",
    question: "You arrive to find an unresponsive patient lying supine. What is the MOST appropriate first airway action?",
    answers: [
      "Open and assess the airway",
      "Insert an airway adjunct immediately",
      "Begin asking SAMPLE history questions",
      "Apply a blood pressure cuff first"
    ],
    correct: 0,
    feedback: "The airway must be opened and assessed before other airway interventions can be effective."
  },
  {
    level: 1,
    type: "single",
    question: "A medical patient is unresponsive with no suspected trauma. Which airway maneuver is MOST appropriate?",
    answers: [
      "Jaw-thrust maneuver",
      "Head-tilt/chin-lift maneuver",
      "Abdominal thrust maneuver",
      "Trendelenburg positioning"
    ],
    correct: 1,
    feedback: "The head-tilt/chin-lift is preferred when spinal injury is not suspected."
  },
  {
    level: 1,
    type: "single",
    question: "A patient is unresponsive after a fall from a ladder. Which airway maneuver is MOST appropriate?",
    answers: [
      "Head-tilt/chin-lift",
      "Jaw-thrust",
      "Abdominal thrusts",
      "Recovery position only"
    ],
    correct: 1,
    feedback: "The jaw-thrust is preferred when spinal trauma is suspected because it minimizes cervical spine movement."
  },
  {
    level: 1,
    type: "multi",
    question: "Which findings are MOST concerning for airway compromise? Select all that apply.",
    answers: [
      "Snoring respirations",
      "Gurgling sounds",
      "Stridor",
      "Clear speech without distress"
    ],
    correct: [0, 1, 2],
    feedback: "Snoring, gurgling, and stridor may indicate airway obstruction or compromise."
  },
  {
    level: 1,
    type: "matching",
    question: "Match the airway sound with the MOST likely cause.",
    leftItems: ["Snoring", "Gurgling", "Stridor"],
    rightItems: [
      "Tongue obstruction",
      "Fluid in the airway",
      "Upper airway narrowing"
    ],
    correct: [0, 1, 2],
    feedback: "Recognizing airway sounds helps identify the airway problem."
  },

  {
    level: 2,
    type: "single",
    question: "An unresponsive patient has noisy gurgling respirations. What should the EMT do FIRST?",
    answers: [
      "Suction the airway",
      "Insert an OPA immediately",
      "Begin oral glucose administration",
      "Place the patient flat and wait"
    ],
    correct: 0,
    feedback: "Gurgling suggests fluid in the airway. Suction should be performed before ventilating or placing an adjunct."
  },
  {
    level: 2,
    type: "single",
    question: "Which patient is the BEST candidate for an oropharyngeal airway?",
    answers: [
      "Alert patient with an intact gag reflex",
      "Unresponsive patient without a gag reflex",
      "Conscious patient complaining of nausea",
      "Patient who is refusing airway care"
    ],
    correct: 1,
    feedback: "An OPA is used for an unresponsive patient without a gag reflex."
  },
  {
    level: 2,
    type: "single",
    question: "Which patient is the BEST candidate for a nasopharyngeal airway?",
    answers: [
      "Responsive patient with an intact gag reflex and no facial trauma",
      "Patient with severe facial trauma",
      "Patient with suspected basilar skull fracture",
      "Patient with complete airway obstruction"
    ],
    correct: 0,
    feedback: "An NPA may be used in a responsive patient who cannot tolerate an OPA, if no contraindications exist."
  },
  {
    level: 2,
    type: "multi",
    question: "Which findings are MOST important contraindications or cautions for NPA placement? Select all that apply.",
    answers: [
      "Severe facial trauma",
      "Suspected basilar skull fracture",
      "Clear nasal passage",
      "Blood or CSF from the nose"
    ],
    correct: [0, 1, 3],
    feedback: "Severe facial trauma, suspected skull fracture, and blood or CSF from the nose are important concerns with NPA use."
  },
  {
    level: 2,
    type: "matching",
    question: "Match the airway device with the MOST appropriate use.",
    leftItems: ["OPA", "NPA", "Suction"],
    rightItems: [
      "Unresponsive without gag reflex",
      "Responsive with gag reflex",
      "Remove fluid from airway"
    ],
    correct: [0, 1, 2],
    feedback: "Each airway device has a specific use based on patient condition."
  },

  {
    level: 3,
    type: "single",
    question: "You insert an OPA and the patient begins gagging. What is the MOST appropriate action?",
    answers: [
      "Remove the OPA immediately",
      "Push the OPA in farther",
      "Tape the OPA in place",
      "Begin chest compressions"
    ],
    correct: 0,
    feedback: "If the patient gags, the OPA should be removed because the gag reflex is present."
  },
  {
    level: 3,
    type: "single",
    question: "While ventilating with a BVM, which finding BEST confirms air is entering the lungs?",
    answers: [
      "The bag refills after each squeeze",
      "The mask fogs during ventilation",
      "Visible chest rise",
      "The patient’s eyes open"
    ],
    correct: 2,
    feedback: "Visible chest rise is the best indicator of effective ventilation."
  },
  {
    level: 3,
    type: "single",
    question: "A patient is breathing 6 times per minute with shallow chest rise. What is the MOST appropriate intervention?",
    answers: [
      "Apply a nasal cannula only",
      "Assist ventilations with a BVM and oxygen",
      "Place the patient in recovery position only",
      "Withhold oxygen until ALS arrives"
    ],
    correct: 1,
    feedback: "Slow, shallow respirations are inadequate and require assisted ventilations."
  },
  {
    level: 3,
    type: "multi",
    question: "Which findings MOST strongly suggest inadequate ventilation? Select all that apply.",
    answers: [
      "Poor chest rise",
      "Slow respiratory rate",
      "Altered mental status",
      "Speaking full sentences clearly"
    ],
    correct: [0, 1, 2],
    feedback: "Poor chest rise, slow breathing, and altered mental status can indicate inadequate ventilation."
  },
  {
    level: 3,
    type: "matching",
    question: "Match the airway or breathing problem with the MOST appropriate EMT action.",
    leftItems: ["Tongue obstruction", "Fluid in airway", "Inadequate breathing", "No gag reflex"],
    rightItems: [
      "Open airway and consider OPA",
      "Suction",
      "Assist ventilations with BVM",
      "OPA may be appropriate"
    ],
    correct: [0, 1, 2, 3],
    feedback: "The best airway action depends on the problem found during assessment."
  },

  {
    level: 4,
    type: "single",
    question: "While ventilating a patient with a BVM, you feel resistance and see poor chest rise. What should you do FIRST?",
    answers: [
      "Reposition the airway and improve the mask seal",
      "Ventilate faster",
      "Stop ventilating completely",
      "Give aspirin"
    ],
    correct: 0,
    feedback: "Poor chest rise often means the airway position or mask seal needs correction."
  },
  {
    level: 4,
    type: "single",
    question: "A patient vomits during BVM ventilation. What is the MOST appropriate immediate action?",
    answers: [
      "Turn the patient as appropriate and suction the airway",
      "Continue ventilating through the vomit",
      "Insert oral glucose",
      "Remove oxygen permanently"
    ],
    correct: 0,
    feedback: "Vomitus must be cleared quickly to reduce obstruction and aspiration risk."
  },
  {
    level: 4,
    type: "single",
    question: "What is the MOST important reason to avoid ventilating too forcefully or too quickly with a BVM?",
    answers: [
      "It may cause gastric inflation and increase aspiration risk",
      "It causes hypoglycemia",
      "It always decreases body temperature",
      "It improves perfusion too quickly"
    ],
    correct: 0,
    feedback: "Excessive ventilation can cause gastric inflation and increase aspiration risk."
  },
  {
    level: 4,
    type: "multi",
    question: "Which techniques are MOST likely to improve BVM ventilation? Select all that apply.",
    answers: [
      "Good mask seal",
      "Proper airway positioning",
      "Watching for chest rise",
      "Squeezing the bag as hard and fast as possible"
    ],
    correct: [0, 1, 2],
    feedback: "Effective BVM ventilation requires a good seal, proper positioning, and controlled ventilations with visible chest rise."
  },
  {
    level: 4,
    type: "matching",
    question: "Match each BVM problem with the MOST appropriate correction.",
    leftItems: ["Poor mask seal", "Tongue obstruction", "Fluid in airway", "Ventilating too fast"],
    rightItems: [
      "Reposition mask/use two-person technique",
      "Open airway/add adjunct",
      "Suction",
      "Slow controlled ventilations"
    ],
    correct: [0, 1, 2, 3],
    feedback: "Troubleshooting BVM problems improves oxygenation and ventilation."
  },

  {
    level: 5,
    type: "single",
    question: "An unresponsive trauma patient has snoring respirations and poor chest rise. What is the EMT’s priority?",
    answers: [
      "Open the airway with a jaw-thrust and support ventilations",
      "Obtain a full SAMPLE history",
      "Give nitroglycerin",
      "Wait for ALS before treating"
    ],
    correct: 0,
    feedback: "Airway and breathing problems are immediate life threats, especially in trauma patients."
  },
  {
    level: 5,
    type: "single",
    question: "A choking adult becomes unresponsive. What is the MOST appropriate action?",
    answers: [
      "Begin CPR and check the airway when opening it",
      "Continue abdominal thrusts while standing",
      "Give water",
      "Insert an NPA first"
    ],
    correct: 0,
    feedback: "If a choking adult becomes unresponsive, begin CPR and check for a visible obstruction when opening the airway."
  },
  {
    level: 5,
    type: "single",
    question: "A patient has severe upper airway swelling, stridor, and increasing fatigue. What should the EMT MOST strongly suspect?",
    answers: [
      "Impending airway failure",
      "Improving airway status",
      "Normal breathing",
      "Mild anxiety only"
    ],
    correct: 0,
    feedback: "Stridor with fatigue is a serious sign of worsening upper airway obstruction and possible airway failure."
  },
  {
    level: 5,
    type: "multi",
    question: "Which findings MOST strongly indicate the need for immediate airway and ventilatory support? Select all that apply.",
    answers: [
      "Unresponsiveness",
      "Agonal respirations",
      "Cyanosis",
      "Normal speech and pink skin"
    ],
    correct: [0, 1, 2],
    feedback: "Unresponsiveness, agonal respirations, and cyanosis are signs of severe airway or breathing compromise."
  },
  {
    level: 5,
    type: "matching",
    question: "Match the airway emergency with the MOST appropriate priority action.",
    leftItems: ["Apnea", "Gurgling airway", "Severe choking", "Snoring unresponsive patient"],
    rightItems: [
      "Ventilate with BVM",
      "Suction",
      "Airway obstruction sequence/CPR if unresponsive",
      "Open airway and consider adjunct"
    ],
    correct: [0, 1, 2, 3],
    feedback: "Airway emergencies require rapid identification and immediate corrective action."
  }
];

let currentLevel = 2;
let questionNumber = 0;
let score = 0;
let maxQuestions = 25;
let currentQuestion;
let usedQuestions = [];

function shuffleArray(array) {
  return array
    .map(value => ({ value, sort: Math.random() }))
    .sort((a, b) => a.sort - b.sort)
    .map(({ value }) => value);
}

function getQuestionByLevel(level) {
  let available = questions.filter(q =>
    q.level === level && !usedQuestions.includes(q.question)
  );

  if (available.length === 0) {
    available = questions.filter(q => !usedQuestions.includes(q.question));
  }

  if (available.length === 0) {
    finishExam();
    return null;
  }

  return available[Math.floor(Math.random() * available.length)];
}

function loadQuestion() {
  if (questionNumber >= maxQuestions) {
    finishExam();
    return;
  }

  currentQuestion = getQuestionByLevel(currentLevel);
  if (!currentQuestion) return;

  usedQuestions.push(currentQuestion.question);

  document.getElementById("status").innerText =
    "Question " + (questionNumber + 1) +
    " of " + maxQuestions +
    " | Current Difficulty Level: " + currentLevel +
    " | Score: " + score;

  document.getElementById("question").innerHTML =
    "<strong>" + currentQuestion.question + "</strong>";

  document.getElementById("answers").innerHTML = "";
  document.getElementById("feedback").style.display = "none";
  document.getElementById("nextBtn").style.display = "none";
  document.getElementById("restartBtn").style.display = "none";
  document.getElementById("submitBtn").style.display = "none";

  if (currentQuestion.type === "single") {
    loadSingleQuestion();
  } else if (currentQuestion.type === "multi") {
    loadMultiQuestion();
  } else if (currentQuestion.type === "matching") {
    loadMatchingQuestion();
  }
}

function loadSingleQuestion() {
  const answersDiv = document.getElementById("answers");

  currentQuestion.answers.forEach((answer, index) => {
    answersDiv.innerHTML += `
      <button onclick="checkSingleAnswer(${index})">
        ${answer}
      </button>
    `;
  });
}

function loadMultiQuestion() {
  const answersDiv = document.getElementById("answers");

  currentQuestion.answers.forEach((answer, index) => {
    answersDiv.innerHTML += `
      <label class="checkbox-answer">
        <input type="checkbox" value="${index}">
        ${answer}
      </label>
    `;
  });

  document.getElementById("submitBtn").style.display = "block";
}

function loadMatchingQuestion() {
  const answersDiv = document.getElementById("answers");

  currentQuestion.leftItems.forEach((leftItem, leftIndex) => {
    const shuffledOptions = shuffleArray(
      currentQuestion.rightItems.map((rightItem, rightIndex) => ({
        text: rightItem,
        originalIndex: rightIndex
      }))
    );

    let options = `<option value="">Choose match</option>`;

    shuffledOptions.forEach(option => {
      options += `
        <option value="${option.originalIndex}">
          ${option.text}
        </option>
      `;
    });

    answersDiv.innerHTML += `
      <div class="matching-row">
        <div class="matching-left">${leftItem}</div>
        <select data-left-index="${leftIndex}">
          ${options}
        </select>
      </div>
    `;
  });

  document.getElementById("submitBtn").style.display = "block";
}

function checkSingleAnswer(selected) {
  const feedback = document.getElementById("feedback");
  const buttons = document.querySelectorAll("#answers button");

  buttons.forEach(button => {
    button.disabled = true;
  });

  if (selected === currentQuestion.correct) {
    score++;
    currentLevel++;
    if (currentLevel > 5) currentLevel = 5;

    buttons[selected].style.background = "darkgreen";

    feedback.innerHTML =
      "<strong>Correct.</strong><br>" +
      currentQuestion.feedback +
      "<br><br>Difficulty will increase.";
  } else {
    currentLevel--;
    if (currentLevel < 1) currentLevel = 1;

    buttons[selected].style.background = "darkred";
    buttons[currentQuestion.correct].style.background = "darkgreen";

    feedback.innerHTML =
      "<strong>Incorrect.</strong><br>" +
      "Most correct answer: <strong>" +
      currentQuestion.answers[currentQuestion.correct] +
      "</strong><br><br>" +
      currentQuestion.feedback +
      "<br><br>Difficulty will decrease.";
  }

  feedback.style.display = "block";
  document.getElementById("nextBtn").style.display = "block";
}

function submitAnswer() {
  if (currentQuestion.type === "multi") {
    checkMultiAnswer();
  } else if (currentQuestion.type === "matching") {
    checkMatchingAnswer();
  }
}

function checkMultiAnswer() {
  const checked = Array.from(
    document.querySelectorAll('#answers input[type="checkbox"]:checked')
  ).map(cb => Number(cb.value));

  const correct =
    checked.length === currentQuestion.correct.length &&
    checked.every(value => currentQuestion.correct.includes(value));

  const feedback = document.getElementById("feedback");
  const checkboxes = document.querySelectorAll('#answers input[type="checkbox"]');

  checkboxes.forEach(cb => {
    cb.disabled = true;
  });

  if (correct) {
    score++;
    currentLevel++;
    if (currentLevel > 5) currentLevel = 5;

    feedback.innerHTML =
      "<strong>Correct.</strong><br>" +
      currentQuestion.feedback +
      "<br><br>Difficulty will increase.";
  } else {
    currentLevel--;
    if (currentLevel < 1) currentLevel = 1;

    const correctAnswers = currentQuestion.correct
      .map(index => currentQuestion.answers[index])
      .join(", ");

    feedback.innerHTML =
      "<strong>Incorrect.</strong><br>" +
      "Most correct answers: <strong>" +
      correctAnswers +
      "</strong><br><br>" +
      currentQuestion.feedback +
      "<br><br>Difficulty will decrease.";
  }

  feedback.style.display = "block";
  document.getElementById("submitBtn").style.display = "none";
  document.getElementById("nextBtn").style.display = "block";
}

function checkMatchingAnswer() {
  const selects = document.querySelectorAll("#answers select");
  const selectedAnswers = Array.from(selects).map(select => Number(select.value));

  const allAnswered = selectedAnswers.every(answer => !Number.isNaN(answer));

  const correct =
    allAnswered &&
    selectedAnswers.length === currentQuestion.correct.length &&
    selectedAnswers.every((value, index) => value === currentQuestion.correct[index]);

  const feedback = document.getElementById("feedback");

  selects.forEach(select => {
    select.disabled = true;
  });

  if (correct) {
    score++;
    currentLevel++;
    if (currentLevel > 5) currentLevel = 5;

    feedback.innerHTML =
      "<strong>Correct.</strong><br>" +
      currentQuestion.feedback +
      "<br><br>Difficulty will increase.";
  } else {
    currentLevel--;
    if (currentLevel < 1) currentLevel = 1;

    let correctText = "";

    currentQuestion.leftItems.forEach((item, index) => {
      correctText +=
        item +
        " = " +
        currentQuestion.rightItems[currentQuestion.correct[index]] +
        "<br>";
    });

    feedback.innerHTML =
      "<strong>Incorrect.</strong><br>" +
      "<br><strong>Most correct matches:</strong><br>" +
      correctText +
      "<br>" +
      currentQuestion.feedback +
      "<br><br>Difficulty will decrease.";
  }

  feedback.style.display = "block";
  document.getElementById("submitBtn").style.display = "none";
  document.getElementById("nextBtn").style.display = "block";
}

function nextQuestion() {
  questionNumber++;
  loadQuestion();
}

function finishExam() {
  document.getElementById("question").innerHTML =
    "<h2>Exam Complete</h2>";

  document.getElementById("answers").innerHTML = "";

  let result = "";

  if (score >= 20) {
    result = "Strong performance. Continue with advanced airway and ventilation review.";
  } else if (score >= 15) {
    result = "Borderline performance. Review airway positioning, suctioning, airway adjuncts, and BVM ventilation.";
  } else {
    result = "Needs remediation. Focus on opening the airway, suctioning, OPA/NPA use, choking care, and assisted ventilations.";
  }

  document.getElementById("feedback").style.display = "block";
  document.getElementById("feedback").innerHTML =
    "<strong>Final Score:</strong> " + score + " / " + maxQuestions +
    "<br><br><strong>Final Difficulty Level:</strong> " + currentLevel +
    "<br><br>" + result;

  document.getElementById("status").innerText = "Adaptive Exam Finished";
  document.getElementById("submitBtn").style.display = "none";
  document.getElementById("nextBtn").style.display = "none";
  document.getElementById("restartBtn").style.display = "block";
}

function restartExam() {
  currentLevel = 2;
  questionNumber = 0;
  score = 0;
  usedQuestions = [];
  loadQuestion();
}

loadQuestion();
</script>

</body>
</html>
