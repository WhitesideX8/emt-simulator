<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>EMT Medical Quiz</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: #f2f2f2;
    margin: 20px;
}

.container {
    max-width: 1000px;
    margin: auto;
    background: white;
    padding: 25px;
    border-radius: 10px;
}

h1, h2, h3 {
    text-align: center;
}

.question {
    background: #fafafa;
    padding: 15px;
    margin: 15px 0;
    border-left: 5px solid #555;
}

button {
    padding: 12px 20px;
    font-size: 18px;
    margin-top: 20px;
    cursor: pointer;
}

.answer-key {
    display: none;
    background: #eee;
    padding: 15px;
    margin-top: 20px;
}

select {
    width: 320px;
    padding: 8px;
    margin-top: 8px;
}

#progress {
    text-align: center;
    font-weight: bold;
}
</style>
</head>

<body>

<div class="container">
<h1>EMT Medical Quiz</h1>
<h2>Advanced NREMT Style</h2>

<div id="progress"></div>

<form id="quizForm"></form>

<button type="button" id="nextBtn" onclick="nextQuestion()">Next Question</button>
<button type="button" id="submitBtn" onclick="gradeQuiz()" style="display:none;">Submit Quiz</button>

<h2 id="score"></h2>

<div class="answer-key" id="answerKey">
<h2>Answer Key</h2>
<div id="keyContent"></div>
</div>
</div>

<script>
const fillOptions = [
    "Asthma", "COPD", "CHF", "Hypoglycemia", "Stroke", "Sepsis",
    "Anaphylaxis", "Pneumonia", "Pulmonary embolism", "Hyperglycemia",
    "life-threatening", "shock", "raccoon", "sign", "pneumothorax",
    "fracture", "sprain", "strain", "contusion", "hematoma", "burn",
    "area", "circumferential", "swelling", "superficial", "system",
    "injury", "fluid", "pressure"
];

const questions = [
{
type: "mc",
q: "A 64-year-old female complains of chest pressure, nausea, and unusual fatigue. She denies severe pain but appears pale and anxious. What should the EMT suspect?",
a: ["Anxiety only", "Possible acute coronary syndrome with atypical presentation", "Muscle strain", "Simple indigestion"],
c: "B",
e: "Women, older adults, and diabetic patients may have atypical ACS symptoms such as fatigue, nausea, weakness, or mild pressure."
},
{
type: "mc",
q: "A patient with chest pain took sildenafil earlier in the day and asks for help taking his prescribed nitroglycerin. What should the EMT do?",
a: ["Assist with nitroglycerin immediately", "Withhold nitroglycerin and follow protocol", "Give two doses of nitroglycerin", "Have the patient stand before taking nitroglycerin"],
c: "B",
e: "Nitroglycerin is contraindicated after recent erectile dysfunction medication use because severe hypotension may occur."
},
{
type:"mc",
q:"A 27-year-old female who is 38 weeks pregnant reports contractions every 2 minutes lasting 60 seconds. She states she feels an urge to have a bowel movement. What should the EMT do next?",
a:["Begin transport immediately without assessment","Assess for crowning and prepare for delivery","Place the patient supine","Delay assessment until arrival at the hospital"],
c:"B",
e:"Frequent contractions and the urge to defecate suggest imminent delivery. Check for crowning."
},
{
type:"mc",
q:"During delivery, the infant's head delivers and retracts tightly against the perineum. What complication should be suspected?",
a:["Prolapsed cord","Breech presentation","Shoulder dystocia","Placenta previa"],
c:"C",
e:"The turtle sign is characteristic of shoulder dystocia."
},
{
type:"mc",
q:"A 32-year-old pregnant female at 34 weeks has painless bright-red vaginal bleeding. Which condition is most likely?",
a:["Abruptio placentae","Placenta previa","Ectopic pregnancy","Ruptured uterus"],
c:"B",
e:"Placenta previa classically presents with painless bright-red bleeding."
},
{
type:"mc",
q:"A 29-year-old female at 36 weeks gestation reports severe abdominal pain and dark vaginal bleeding. Her abdomen is rigid and tender. What should the EMT suspect?",
a:["Placenta previa","Abruptio placentae","Normal labor","Round ligament pain"],
c:"B",
e:"Painful bleeding with a rigid abdomen suggests placental abruption."
},
{
type:"mc",
q:"During delivery, the umbilical cord is visible before the infant's head. What is the EMT's priority?",
a:["Pull on the cord","Push the cord back into the vagina","Relieve pressure on the cord and transport rapidly","Clamp the cord immediately"],
c:"C",
e:"A prolapsed cord can compromise fetal oxygenation and requires immediate intervention."
},
{
type:"mc",
q:"A pregnant patient develops a severe headache, hypertension, and visual disturbances. What condition should the EMT suspect?",
a:["Placenta previa","Preeclampsia","Normal pregnancy","Hyperemesis gravidarum"],
c:"B",
e:"Headache, hypertension, and visual changes are classic signs of preeclampsia."
},
{
type:"mc",
q:"A pregnant patient experiences a generalized seizure. Which condition is most likely?",
a:["Eclampsia","Hypoglycemia","Placenta previa","Miscarriage"],
c:"A",
e:"Eclampsia is preeclampsia with seizure activity."
},
{
type:"mc",
q:"A woman who delivered 10 minutes ago continues to bleed heavily. What is the EMT's best action?",
a:["Pull on the umbilical cord","Massage the uterine fundus if protocol allows","Place ice on the abdomen","Encourage walking"],
c:"B",
e:"Postpartum hemorrhage may be reduced by uterine massage if permitted by protocol."
},
{
type: "mc",
q: "During CPR, an EMT notices that compressions are shallow and frequently interrupted. What is the greatest concern?",
a: ["The AED will not work","Coronary and cerebral perfusion will decrease","The patient will breathe too fast","The oxygen tank will empty faster"],
c: "B",
e: "Shallow or interrupted compressions reduce blood flow to the heart and brain."
},
{
type: "mc",
q: "A patient is found pulseless and apneic. The AED states, no shock advised. What should the EMT do next?",
a: ["Check blood pressure","Resume CPR immediately","Remove the AED pads","Wait 2 minutes before doing anything"],
c: "B",
e: "If no shock is advised, immediately resume CPR beginning with compressions."
},
{
type: "mc",
q: "A patient complains of chest pain that worsens when lying flat and improves when leaning forward. What condition should the EMT consider?",
a: ["Pericarditis","Stable angina","Pulmonary edema","Cardiac arrest"],
c: "A",
e: "Pericarditis pain may worsen when lying flat and improve when sitting up or leaning forward."
},
{
type: "mc",
q: "A trauma patient has muffled heart sounds, jugular venous distention, and hypotension after a penetrating chest injury. What should the EMT suspect?",
a: ["Cardiac tamponade","Simple rib fracture","Asthma","Stable angina"],
c: "A",
e: "Beck triad, which includes JVD, muffled heart sounds, and hypotension, suggests cardiac tamponade."
},
{
type: "mc",
q: "A patient with suspected ACS becomes increasingly short of breath and develops crackles. What does this suggest?",
a: ["The chest pain is not cardiac","Left-sided heart failure or pulmonary edema","An allergic reaction","Hyperventilation syndrome only"],
c: "B",
e: "ACS can impair left ventricular function, causing pulmonary edema and respiratory distress."
},
{
type:"mc",
q:"A 24-year-old male was ejected from a vehicle and found 20 feet from the car. He is confused, pale, cool, and diaphoretic. RR 30 shallow, HR 138, BP 82/50. There is bright red bleeding from a deep thigh wound soaking through clothing. Your partner is opening the airway. What is the EMT’s most appropriate immediate action?",
a:["Begin a rapid head-to-toe assessment before treating the wound","Control the life-threatening extremity bleeding immediately with direct pressure or tourniquet if needed","Apply a cervical collar before addressing the bleeding","Obtain a complete SAMPLE history from bystanders"],
c:"B",
e:"Massive external bleeding is controlled immediately because hemorrhage can kill quickly."
},
{
type:"mc",
q:"A 31-year-old male was stabbed in the left chest. He is anxious, cyanotic, and speaking one-word answers. Breath sounds are absent on the left. Neck veins are distended and BP is 76/44. What is the most likely problem?",
a:["Cardiac tamponade because JVD and hypotension are present","Tension pneumothorax because respiratory distress, unilateral absent breath sounds, JVD, and hypotension are present","Simple pneumothorax because all pneumothoraces remain stable before ALS arrival","Flail chest because paradoxical chest movement is expected with penetrating trauma"],
c:"B",
e:"Unilateral absent breath sounds, severe distress, JVD, and hypotension suggest tension pneumothorax."
},
{
type:"mc",
q:"A 44-year-old male struck the steering wheel during a crash. He has severe chest pain, shallow respirations, bruising over the sternum, and a section of the left chest wall moves inward during inspiration and outward during expiration. SpO₂ is 88%. What is the most appropriate interpretation and priority?",
a:["Flail chest; support oxygenation and ventilation as needed","Simple rib fracture; apply ice and transport non-urgently","Pulmonary embolism; place the patient supine","Myocardial infarction; assist with nitroglycerin first"],
c:"A",
e:"Paradoxical motion indicates flail chest. Oxygenation and ventilation are priorities."
},
{
type:"mc",
q:"A patient has an open chest wound after a stabbing. You apply an occlusive dressing. Ten minutes later, he becomes more dyspneic, hypotensive, and has worsening absent breath sounds on the injured side. What should you suspect?",
a:["The dressing may have contributed to developing tension pneumothorax","The wound has healed and the patient is anxious","The patient needs oral fluids","The patient is developing isolated abdominal bleeding only"],
c:"A",
e:"Patients with occlusive dressings must be monitored for tension pneumothorax."
},
{
type:"mc",
q:"A 36-year-old female fell 25 feet from a roof. She is confused, pale, tachycardic, and hypotensive. No major external bleeding is found. Abdomen is firm and tender. What is the most likely cause of shock?",
a:["Internal hemorrhage","Anxiety-induced hyperventilation","Minor musculoskeletal pain","Isolated superficial bleeding"],
c:"A",
e:"Significant blunt trauma with shock and abdominal findings suggests internal bleeding."
},

{type:"fill",q:"Severe bleeding that can rapidly cause death is called __________ hemorrhage.",c:"life-threatening"},
{type:"fill",q:"Poor tissue perfusion after trauma is called __________.",c:"shock"},
{type:"fill",q:"Bruising around the eyes after head trauma is called __________ eyes.",c:"raccoon"},
{type:"fill",q:"Bruising behind the ears after head trauma is called Battle’s __________.",c:"sign"},
{type:"fill",q:"Air in the pleural space is called a __________.",c:"pneumothorax"},

{
type:"match",
q:"Match the trauma finding with the highest EMT concern.",
left:["Paradoxical chest movement","Bubbling chest wound","Unequal pupils after head trauma","Pelvic instability"],
right:["Flail chest with ventilation compromise","Open pneumothorax","Possible brain injury or increased pressure","Severe internal bleeding risk"],
c:["Flail chest with ventilation compromise","Open pneumothorax","Possible brain injury or increased pressure","Severe internal bleeding risk"]
},
{
type:"match",
q:"Match the bleeding control method with the best use.",
left:["Direct pressure","Tourniquet","Hemostatic dressing","Pressure dressing"],
right:["Initial control of most external bleeding","Life-threatening extremity hemorrhage","Severe bleeding where protocol allows","Maintains pressure after bleeding is controlled"],
c:["Initial control of most external bleeding","Life-threatening extremity hemorrhage","Severe bleeding where protocol allows","Maintains pressure after bleeding is controlled"]
}
];

function shuffle(array) {
    return array.sort(() => Math.random() - 0.5);
}

const shuffledQuestions = shuffle([...questions]);

let currentQuestion = 0;
let studentAnswers = [];

function buildQuiz() {
    showQuestion();
}

function showQuestion() {
    const form = document.getElementById("quizForm");
    const item = shuffledQuestions[currentQuestion];

    document.getElementById("progress").innerHTML =
        `Question ${currentQuestion + 1} of ${shuffledQuestions.length}`;

    let html = `<div class="question"><p><b>${item.q}</b></p>`;

    if (item.type === "mc") {
        const letters = ["A", "B", "C", "D"];

        item.a.forEach((ans, i) => {
            html += `
            <label>
                <input type="radio" name="currentAnswer" value="${letters[i]}">
                ${letters[i]}. ${ans}
            </label><br>`;
        });
    }

    if (item.type === "fill") {
        let distractors = fillOptions.filter(option =>
            option.toLowerCase() !== item.c.toLowerCase()
        );

        distractors = shuffle([...distractors]).slice(0, 4);
        let options = shuffle([item.c, ...distractors]);

        html += `
        <select name="currentAnswer">
            <option value="">Select Answer</option>
            ${options.map(option => `<option value="${option}">${option}</option>`).join("")}
        </select>`;
    }

    if (item.type === "match") {
        item.left.forEach((left, i) => {
            let shuffledRight = shuffle([...item.right]);

            html += `<p>${left}</p>
            <select name="matchAnswer">
                <option value="">Choose</option>`;

            shuffledRight.forEach(right => {
                html += `<option value="${right}">${right}</option>`;
            });

            html += `</select>`;
        });
    }

    html += `</div>`;
    form.innerHTML = html;
}

function nextQuestion() {
    const item = shuffledQuestions[currentQuestion];
    let answer;

    if (item.type === "mc") {
        let selected = document.querySelector(`input[name="currentAnswer"]:checked`);

        if (!selected) {
            alert("Please select an answer before moving on.");
            return;
        }

        answer = selected.value;
    }

    if (item.type === "fill") {
        let selected = document.querySelector(`select[name="currentAnswer"]`).value;

        if (selected === "") {
            alert("Please select an answer before moving on.");
            return;
        }

        answer = selected;
    }

    if (item.type === "match") {
        let selects = document.querySelectorAll(`select[name="matchAnswer"]`);
        answer = [];

        for (let select of selects) {
            if (select.value === "") {
                alert("Please complete all matching answers before moving on.");
                return;
            }

            answer.push(select.value);
        }
    }

    studentAnswers[currentQuestion] = answer;
    currentQuestion++;

    if (currentQuestion < shuffledQuestions.length) {
        showQuestion();
    } else {
        document.getElementById("quizForm").innerHTML =
            "<h2>All questions answered. Submit your quiz.</h2>";

        document.getElementById("nextBtn").style.display = "none";
        document.getElementById("submitBtn").style.display = "inline-block";
        document.getElementById("progress").innerHTML = "";
    }

    window.scrollTo(0, 0);
}

function gradeQuiz() {
    let score = 0;
    let total = 0;
    let key = "";

    shuffledQuestions.forEach((item, index) => {
        let answer = studentAnswers[index];

        if (item.type === "mc") {
            total++;

            if (answer === item.c) {
                score++;
            }

            key += `<p>${index + 1}. Correct answer: ${item.c}<br>${item.e || ""}</p>`;
        }

        if (item.type === "fill") {
            total++;

            if (answer.toLowerCase() === item.c.toLowerCase()) {
                score++;
            }

            key += `<p>${index + 1}. Correct answer: ${item.c}</p>`;
        }

        if (item.type === "match") {
            item.left.forEach((left, i) => {
                total++;

                if (answer[i] === item.c[i]) {
                    score++;
                }
            });

            let correctList = "";

            item.left.forEach((left, i) => {
                correctList += `${left} = ${item.c[i]}<br>`;
            });

            key += `<p>${index + 1}.<br>${correctList}</p>`;
        }
    });

    let percent = Math.round((score / total) * 100);

    document.getElementById("score").innerHTML =
        "Score: " + score + " / " + total + " (" + percent + "%)";

    document.getElementById("keyContent").innerHTML = key;
    document.getElementById("answerKey").style.display = "block";

    document.getElementById("submitBtn").disabled = true;

    window.scrollTo(0, document.body.scrollHeight);
}

buildQuiz();
</script>

</body>
</html>
