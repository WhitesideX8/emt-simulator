<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>EMT Medical Quiz</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: #f2f2f2;
    margin: 20px;
}

.container {
    max-width: 1000px;
    margin: auto;
    background: white;
    padding: 25px;
    border-radius: 10px;
}

h1, h2 {
    text-align: center;
}

.question {
    background: #fafafa;
    padding: 15px;
    margin: 15px 0;
    border-left: 5px solid #555;
}

button {
    padding: 12px 20px;
    font-size: 18px;
    margin-top: 20px;
    cursor: pointer;
}

.correct {
    color: green;
    font-weight: bold;
}

.incorrect {
    color: red;
    font-weight: bold;
}

.answer-key {
    display: none;
    background: #eee;
    padding: 15px;
    margin-top: 20px;
}

select {
    width: 320px;
    padding: 8px;
    margin-top: 8px;
}

.feedback {
    margin-top: 10px;
    font-weight: bold;
}
</style>
</head>

<body>

<div class="container">
<h1>EMT Medical Quiz</h1>
<h2>Advanced NREMT Style</h2>

<form id="quizForm"></form>

<button type="button" onclick="gradeQuiz()">Submit Quiz</button>

<h2 id="score"></h2>

<div class="answer-key" id="answerKey">
<h2>Answer Key</h2>
<div id="keyContent"></div>
</div>
</div>

<script>
const fillOptions = [
    "Asthma",
    "COPD",
    "CHF",
    "Hypoglycemia",
    "Stroke",
    "Sepsis",
    "Anaphylaxis",
    "Pneumonia",
    "Pulmonary embolism",
    "Hyperglycemia"
];

const questions = [
   {
type: "mc",
q: "A 64-year-old female complains of chest pressure, nausea, and unusual fatigue. She denies severe pain but appears pale and anxious. What should the EMT suspect?",
a: [
"Anxiety only",
"Possible acute coronary syndrome with atypical presentation",
"Muscle strain",
"Simple indigestion"
],
c: "B",
e: "Women, older adults, and diabetic patients may have atypical ACS symptoms such as fatigue, nausea, weakness, or mild pressure."
},

{
type: "mc",
q: "A patient with chest pain took sildenafil earlier in the day and asks for help taking his prescribed nitroglycerin. What should the EMT do?",
a: [
"Assist with nitroglycerin immediately",
"Withhold nitroglycerin and follow protocol",
"Give two doses of nitroglycerin",
"Have the patient stand before taking nitroglycerin"
],
c: "B",
e: "Nitroglycerin is contraindicated after recent erectile dysfunction medication use because severe hypotension may occur."
},
{
type:"mc",
q:"1. A 27-year-old female who is 38 weeks pregnant reports contractions every 2 minutes lasting 60 seconds. She states she feels an urge to have a bowel movement. What should the EMT do NEXT?",
a:[
"Begin transport immediately without assessment",
"Assess for crowning and prepare for delivery",
"Place the patient supine",
"Delay assessment until arrival at the hospital"
],
c:"B",
e:"Frequent contractions and the urge to defecate suggest imminent delivery. Check for crowning."
},

{
type:"mc",
q:"2. During delivery, the infant's head delivers and retracts tightly against the perineum. What complication should be suspected?",
a:[
"Prolapsed cord",
"Breech presentation",
"Shoulder dystocia",
"Placenta previa"
],
c:"C",
e:"The 'turtle sign' is characteristic of shoulder dystocia."
},

{
type:"mc",
q:"3. A 32-year-old pregnant female at 34 weeks has painless bright-red vaginal bleeding. Which condition is MOST likely?",
a:[
"Abruptio placentae",
"Placenta previa",
"Ectopic pregnancy",
"Ruptured uterus"
],
c:"B",
e:"Placenta previa classically presents with painless bright-red bleeding."
},

{
type:"mc",
q:"4. A 29-year-old female at 36 weeks gestation reports severe abdominal pain and dark vaginal bleeding. Her abdomen is rigid and tender. What should the EMT suspect?",
a:[
"Placenta previa",
"Abruptio placentae",
"Normal labor",
"Round ligament pain"
],
c:"B",
e:"Painful bleeding with a rigid abdomen suggests placental abruption."
},

{
type:"mc",
q:"5. During delivery, the umbilical cord is visible before the infant's head. What is the EMT's priority?",
a:[
"Pull on the cord",
"Push the cord back into the vagina",
"Relieve pressure on the cord and transport rapidly",
"Clamp the cord immediately"
],
c:"C",
e:"A prolapsed cord can compromise fetal oxygenation and requires immediate intervention."
},

{
type:"mc",
q:"6. A pregnant patient develops a severe headache, hypertension, and visual disturbances. What condition should the EMT suspect?",
a:[
"Placenta previa",
"Preeclampsia",
"Normal pregnancy",
"Hyperemesis gravidarum"
],
c:"B",
e:"Headache, hypertension, and visual changes are classic signs of preeclampsia."
},

{
type:"mc",
q:"7. A pregnant patient experiences a generalized seizure. Which condition is MOST likely?",
a:[
"Eclampsia",
"Hypoglycemia",
"Placenta previa",
"Miscarriage"
],
c:"A",
e:"Eclampsia is preeclampsia with seizure activity."
},

{
type:"mc",
q:"8. A woman who delivered 10 minutes ago continues to bleed heavily. What is the EMT's BEST action?",
a:[
"Pull on the umbilical cord",
"Massage the uterine fundus if protocol allows",
"Place ice on the abdomen",
"Encourage walking"
],
c:"B",
e:"Postpartum hemorrhage may be reduced by uterine massage if permitted by protocol."
},


{
type: "mc",
q: "During CPR, an EMT notices that compressions are shallow and frequently interrupted. What is the greatest concern?",
a: [
"The AED will not work",
"Coronary and cerebral perfusion will decrease",
"The patient will breathe too fast",
"The oxygen tank will empty faster"
],
c: "B",
e: "Shallow or interrupted compressions reduce blood flow to the heart and brain."
},

{
type: "mc",
q: "A patient is found pulseless and apneic. The AED states, 'No shock advised.' What should the EMT do next?",
a: [
"Check blood pressure",
"Resume CPR immediately",
"Remove the AED pads",
"Wait 2 minutes before doing anything"
],
c: "B",
e: "If no shock is advised, immediately resume CPR beginning with compressions."
},

{
type: "mc",
q: "A patient complains of chest pain that worsens when lying flat and improves when leaning forward. What condition should the EMT consider?",
a: [
"Pericarditis",
"Stable angina",
"Pulmonary edema",
"Cardiac arrest"
],
c: "A",
e: "Pericarditis pain may worsen when lying flat and improve when sitting up or leaning forward."
},

{
type: "mc",
q: "A trauma patient has muffled heart sounds, jugular venous distention, and hypotension after a penetrating chest injury. What should the EMT suspect?",
a: [
"Cardiac tamponade",
"Simple rib fracture",
"Asthma",
"Stable angina"
],
c: "A",
e: "Beck's triad—JVD, muffled heart sounds, and hypotension—suggests cardiac tamponade."
},

{
type: "mc",
q: "A patient with suspected ACS becomes increasingly short of breath and develops crackles. What does this suggest?",
a: [
"The chest pain is not cardiac",
"Left-sided heart failure or pulmonary edema",
"An allergic reaction",
"Hyperventilation syndrome only"
],
c: "B",
e: "ACS can impair left ventricular function, causing pulmonary edema and respiratory distress."
},
];  

function shuffle(array) {
    return array.sort(() => Math.random() - 0.5);
}

function buildQuiz() {
    const form = document.getElementById("quizForm");
    form.innerHTML = "";

    questions.forEach((item, index) => {
        let html = `<div class="question"><p><b>${index + 1}. ${item.q}</b></p>`;

        if (item.type === "mc") {
            const letters = ["A", "B", "C", "D"];

            item.a.forEach((ans, i) => {
                html += `
                <label>
                    <input type="radio" name="q${index}" value="${letters[i]}">
                    ${letters[i]}. ${ans}
                </label><br>`;
            });
        }

        if (item.type === "fill") {
            let distractors = fillOptions.filter(option =>
                option.toLowerCase() !== item.c.toLowerCase()
            );

            distractors = shuffle([...distractors]).slice(0, 4);

            let options = shuffle([
                item.c,
                ...distractors
            ]);

            html += `
            <select name="q${index}">
                <option value="">Select Answer</option>
                ${options.map(option =>
                    `<option value="${option}">${option}</option>`
                ).join("")}
            </select>`;
        }

        if (item.type === "match") {
            item.left.forEach((left, i) => {
                let shuffledRight = shuffle([...item.right]);

                html += `<p>${left}</p>
                <select name="q${index}_${i}">
                    <option value="">Choose</option>`;

                shuffledRight.forEach(right => {
                    html += `<option value="${right}">${right}</option>`;
                });

                html += `</select>`;
            });
        }

        html += `<div class="feedback" id="fb${index}"></div></div>`;
        form.innerHTML += html;
    });
}

function gradeQuiz() {
    let score = 0;
    let total = 0;
    let key = "";

    questions.forEach((item, index) => {
        let feedback = document.getElementById("fb" + index);
        feedback.innerHTML = "";

        if (item.type === "mc") {
            total++;

            let selected = document.querySelector(`input[name="q${index}"]:checked`);

            if (selected && selected.value === item.c) {
                score++;
                feedback.innerHTML =
                    `<span class="correct">Correct.</span> ${item.e || ""}`;
            } else {
                feedback.innerHTML =
                    `<span class="incorrect">Incorrect.</span> Most correct answer: <b>${item.c}</b>. ${item.e || ""}`;
            }

            key += `<p>${index + 1}. ${item.c}</p>`;
        }

        if (item.type === "fill") {
            total++;

            let selected = document.querySelector(`select[name="q${index}"]`).value;

            if (selected.toLowerCase() === item.c.toLowerCase()) {
                score++;
                feedback.innerHTML =
                    `<span class="correct">Correct.</span>`;
            } else {
                feedback.innerHTML =
                    `<span class="incorrect">Incorrect.</span> Correct answer: <b>${item.c}</b>`;
            }

            key += `<p>${index + 1}. ${item.c}</p>`;
        }

        if (item.type === "match") {
            let correctCount = 0;

            item.left.forEach((left, i) => {
                total++;

                let selected =
                    document.querySelector(`select[name="q${index}_${i}"]`).value;

                if (selected === item.c[i]) {
                    score++;
                    correctCount++;
                }
            });

            let correctList = "";

            item.left.forEach((left, i) => {
                correctList += `${left} = ${item.c[i]}<br>`;
            });

            if (correctCount === item.left.length) {
                feedback.innerHTML =
                    `<span class="correct">Correct.</span><br>${correctList}`;
            } else {
                feedback.innerHTML =
                    `<span class="incorrect">Incorrect.</span><br><b>Correct matches:</b><br>${correctList}`;
            }

            key += `<p>${index + 1}.<br>${correctList}</p>`;
        }
    });

    let percent = Math.round((score / total) * 100);

    document.getElementById("score").innerHTML =
        "Score: " + score + " / " + total + " (" + percent + "%)";

    document.getElementById("keyContent").innerHTML = key;
    document.getElementById("answerKey").style.display = "block";

    window.scrollTo(0, document.body.scrollHeight);
}

buildQuiz();
</script>

</body>
</html>
