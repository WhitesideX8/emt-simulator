<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Level 7 Adaptive EMT Endocrine Emergencies Exam</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #222;
      color: white;
      padding: 20px;
    }

    .container {
      max-width: 900px;
      margin: auto;
      background: #333;
      padding: 25px;
      border-radius: 10px;
    }

    h1, h2 {
      text-align: center;
    }

    .question-box {
      background: #d9d9d9;
      color: black;
      padding: 20px;
      border-radius: 8px;
      margin-top: 20px;
    }

    button {
      display: block;
      width: 100%;
      margin: 8px 0;
      padding: 12px;
      font-size: 16px;
      background: green;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      text-align: left;
    }

    button:hover {
      background: darkgreen;
    }

    #submitBtn, #nextBtn, #restartBtn {
      background: #0066cc;
      text-align: center;
      display: none;
    }

    #feedback {
      margin-top: 15px;
      padding: 15px;
      background: white;
      color: black;
      border-radius: 6px;
      display: none;
    }

    #status {
      text-align: center;
      margin-top: 15px;
      font-size: 18px;
    }

    .checkbox-answer {
      display: block;
      background: #eeeeee;
      color: black;
      padding: 12px;
      margin: 8px 0;
      border-radius: 6px;
      font-size: 16px;
      cursor: pointer;
    }

    .checkbox-answer input {
      margin-right: 10px;
      transform: scale(1.2);
    }

    .matching-row {
      display: flex;
      align-items: center;
      gap: 15px;
      margin: 12px 0;
      background: #eeeeee;
      padding: 12px;
      border-radius: 6px;
    }

    .matching-left {
      flex: 1;
      font-weight: bold;
    }

    .matching-row select {
      flex: 1;
      padding: 10px;
      font-size: 16px;
      border-radius: 6px;
    }
  </style>
</head>

<body>

<div class="container">
  <h1>EMT Endocrine Emergencies Exam</h1>
  <h2>Level 7 Critical-Thinking Scenario Questions</h2>

  <div id="status"></div>

  <div class="question-box">
    <div id="question"></div>
    <div id="answers"></div>

    <button id="submitBtn" onclick="submitAnswer()">Submit Answer</button>

    <div id="feedback"></div>

    <button id="nextBtn" onclick="nextQuestion()">Next Question</button>
    <button id="restartBtn" onclick="restartExam()">Restart Exam</button>
  </div>
</div>

<script>
const questions = [
  {
    level: 7,
    type: "single",
    question: "You arrive for a 54-year-old diabetic found confused in a hot apartment. Family reports vomiting all day and missed insulin. The patient has deep rapid respirations, BP 82/48, pulse 136, glucose reads HIGH, and he suddenly becomes combative. What is the MOST appropriate EMT action?",
    answers: [
      "Manage airway risk, maintain safety, request ALS, and begin rapid transport",
      "Administer oral glucose because the patient has altered mental status",
      "Delay transport until the patient becomes calm",
      "Coach the patient to slow his breathing"
    ],
    correct: 0,
    feedback: "This patient likely has severe DKA with shock, airway risk, and worsening mental status."
  },
  {
    level: 7,
    type: "single",
    question: "A diabetic patient is found after a fall. He has slurred speech, unequal grips, facial droop, pale diaphoretic skin, and glucose of 39 mg/dL. What is the MOST appropriate interpretation?",
    answers: [
      "Treat hypoglycemia if safe while continuing stroke and trauma assessment",
      "Assume hypoglycemia explains everything and ignore stroke signs",
      "Assume stroke only and ignore the glucose level",
      "Delay all care until family confirms the medication list"
    ],
    correct: 0,
    feedback: "Level 7 questions often involve overlapping conditions. Do not tunnel vision."
  },
  {
    level: 7,
    type: "single",
    question: "A diabetic patient becomes unresponsive after receiving oral glucose. You hear gurgling respirations and see glucose gel in the mouth. What should you do FIRST?",
    answers: [
      "Suction the airway and begin airway management",
      "Give more oral glucose",
      "Place the patient upright and continue transport",
      "Check another glucose before doing anything"
    ],
    correct: 0,
    feedback: "Airway contamination is an immediate life threat."
  },
  {
    level: 7,
    type: "single",
    question: "A confused diabetic dialysis patient has glucose of 45 mg/dL, slow irregular pulse, weakness, and shortness of breath. Which action is MOST appropriate?",
    answers: [
      "Treat immediate ABC concerns, manage glucose if safe, and request ALS",
      "Assume this is only hypoglycemia",
      "Give oral glucose even if swallowing is impaired",
      "Have the patient walk to the ambulance to assess stability"
    ],
    correct: 0,
    feedback: "Dialysis patients may have hypoglycemia plus dangerous electrolyte problems."
  },
  {
    level: 7,
    type: "single",
    question: "A patient with suspected DKA is hypotensive, vomiting, and becoming less responsive. Your partner asks if you should obtain a second glucose reading before moving. What is the BEST response?",
    answers: [
      "No. Begin rapid transport while managing airway and shock",
      "Yes. Confirm the number before transport",
      "Yes. Stay on scene until the patient improves",
      "No. Give oral glucose immediately"
    ],
    correct: 0,
    feedback: "Unstable patients need rapid transport and supportive care. Do not delay for repeated nonessential testing."
  },
  {
    level: 7,
    type: "single",
    question: "A diabetic patient is alert after glucose but repeatedly asks the same questions and cannot explain the risks of refusing transport. What is the MOST appropriate conclusion?",
    answers: [
      "The patient may not have decision-making capacity",
      "The patient is competent because he knows his name",
      "The refusal is automatically valid",
      "The EMT should leave after obtaining a signature"
    ],
    correct: 0,
    feedback: "Capacity requires understanding risks, benefits, and consequences, not just orientation."
  },
  {
    level: 7,
    type: "single",
    question: "You are treating a combative diabetic patient in a crowded hallway. The patient is pale, sweating, confused, and swinging at responders. What is the FIRST priority?",
    answers: [
      "Ensure scene and crew safety while attempting verbal de-escalation",
      "Immediately force oral glucose into the mouth",
      "Ignore the behavior because it is medical",
      "Have family hold the patient down"
    ],
    correct: 0,
    feedback: "Scene safety comes before treatment. Medical causes should be considered once safe."
  },
  {
    level: 7,
    type: "single",
    question: "An unconscious diabetic patient has cyanosis, shallow breathing, and a glucose of 31 mg/dL. Which treatment priority is MOST correct?",
    answers: [
      "Ventilate with oxygen and manage the airway",
      "Administer oral glucose",
      "Wait for ALS before ventilating",
      "Place glucose under the tongue"
    ],
    correct: 0,
    feedback: "Airway and breathing take priority over glucose correction at the EMT level."
  },
  {
    level: 7,
    type: "single",
    question: "A diabetic patient has vomiting, abdominal pain, fruity breath, deep respirations, and hypotension. Which problem is the EMT MOST concerned about?",
    answers: [
      "Severe metabolic emergency with shock and aspiration risk",
      "Simple low blood sugar",
      "Mild dehydration only",
      "Behavioral emergency"
    ],
    correct: 0,
    feedback: "This presentation strongly suggests severe DKA with life-threatening complications."
  },
  {
    level: 7,
    type: "single",
    question: "A patient is confused after taking insulin and drinking alcohol. He is pale, sweaty, and unable to sit upright without assistance. What is the BEST EMT action?",
    answers: [
      "Assess airway and swallowing before considering oral glucose",
      "Give oral glucose immediately because alcohol lowers sugar",
      "Assume intoxication only",
      "Wait until the patient becomes fully unconscious"
    ],
    correct: 0,
    feedback: "Alcohol and insulin can cause hypoglycemia, but airway safety determines oral glucose use."
  },

  {
    level: 7,
    type: "multi",
    question: "Which findings in a diabetic emergency indicate immediate airway danger? Select all that apply.",
    answers: [
      "Gurgling respirations",
      "Vomiting with altered mental status",
      "Absent gag reflex",
      "Declining level of consciousness",
      "Mild thirst",
      "Normal speech without distress"
    ],
    correct: [0, 1, 2, 3],
    feedback: "These findings suggest the patient may be unable to protect the airway."
  },
  {
    level: 7,
    type: "multi",
    question: "A diabetic patient with suspected DKA is unstable. Which actions are MOST appropriate? Select all that apply.",
    answers: [
      "Support airway and breathing",
      "Treat for shock",
      "Request ALS intercept if available",
      "Transport rapidly",
      "Administer oral glucose",
      "Delay transport for a full medication inventory"
    ],
    correct: [0, 1, 2, 3],
    feedback: "Oral glucose is not appropriate for DKA, especially with vomiting or altered mental status."
  },
  {
    level: 7,
    type: "multi",
    question: "A diabetic patient has low glucose and signs of stroke. Which statements are correct? Select all that apply.",
    answers: [
      "Hypoglycemia can mimic stroke",
      "Stroke and hypoglycemia can occur together",
      "Glucose correction does not eliminate the need for reassessment",
      "Transport decisions should consider time-sensitive stroke care",
      "Low glucose always rules out stroke",
      "Stroke assessment should be skipped once glucose is checked"
    ],
    correct: [0, 1, 2, 3],
    feedback: "Do not rule out stroke only because glucose is abnormal."
  },
  {
    level: 7,
    type: "multi",
    question: "Which factors make refusal of care high risk after a diabetic emergency? Select all that apply.",
    answers: [
      "Persistent confusion",
      "Repeated questioning",
      "Unable to explain consequences",
      "Recent severe hypoglycemia",
      "Clear understanding of risks",
      "Stable mental status with full understanding"
    ],
    correct: [0, 1, 2, 3],
    feedback: "Capacity and recurrence risk are major concerns after hypoglycemia."
  },
  {
    level: 7,
    type: "multi",
    question: "A diabetic dialysis patient is confused, short of breath, bradycardic, and hypoglycemic. Which concerns should the EMT consider? Select all that apply.",
    answers: [
      "Hypoglycemia",
      "Electrolyte disturbance",
      "Airway and breathing compromise",
      "Need for ALS",
      "Isolated anxiety only",
      "No transport needed if sugar improves"
    ],
    correct: [0, 1, 2, 3],
    feedback: "This is a complex patient with multiple possible life threats."
  },
  {
    level: 7,
    type: "multi",
    question: "Which actions are unsafe in an altered diabetic patient? Select all that apply.",
    answers: [
      "Forcing oral glucose",
      "Delaying airway care for a medication list",
      "Ignoring vomiting",
      "Allowing the patient to walk despite instability",
      "Positioning to protect the airway",
      "Suctioning when secretions are present"
    ],
    correct: [0, 1, 2, 3],
    feedback: "Airway safety, fall prevention, and rapid reassessment are essential."
  },
  {
    level: 7,
    type: "multi",
    question: "Which findings support severe shock in a hyperglycemic emergency? Select all that apply.",
    answers: [
      "Hypotension",
      "Tachycardia",
      "Altered mental status",
      "Cool extremities",
      "Normal perfusion",
      "Warm dry skin with normal mentation"
    ],
    correct: [0, 1, 2, 3],
    feedback: "Severe dehydration from hyperglycemia or DKA can cause shock."
  },

  {
    level: 7,
    type: "matching",
    question: "Match the evolving condition with the MOST appropriate EMT priority.",
    leftItems: [
      "Vomiting while altered",
      "Gurgling respirations",
      "Combative hypoglycemic patient",
      "DKA with hypotension"
    ],
    rightItems: [
      "Protect airway from aspiration",
      "Suction and manage airway",
      "Scene safety and de-escalation",
      "Treat shock and transport rapidly"
    ],
    correct: [0, 1, 2, 3],
    feedback: "Level 7 scenarios test changing priorities."
  }
];

let currentLevel = 7;
let questionNumber = 0;
let score = 0;
let maxQuestions = 25;
let currentQuestion;
let usedQuestions = [];

function shuffleArray(array) {
  return array
    .map(value => ({ value, sort: Math.random() }))
    .sort((a, b) => a.sort - b.sort)
    .map(({ value }) => value);
}

function getQuestionByLevel(level) {
  let available = questions.filter(q =>
    q.level === level && !usedQuestions.includes(q.question)
  );

  if (available.length === 0) {
    available = questions.filter(q => !usedQuestions.includes(q.question));
  }

  if (available.length === 0) {
    finishExam();
    return null;
  }

  return available[Math.floor(Math.random() * available.length)];
}

function loadQuestion() {
  if (questionNumber >= maxQuestions) {
    finishExam();
    return;
  }

  currentQuestion = getQuestionByLevel(currentLevel);
  if (!currentQuestion) return;

  usedQuestions.push(currentQuestion.question);

  document.getElementById("status").innerText =
    "Question " + (questionNumber + 1) +
    " of " + maxQuestions +
    " | Current Difficulty Level: " + currentLevel +
    " | Score: " + score;

  document.getElementById("question").innerHTML =
    "<strong>" + currentQuestion.question + "</strong>";

  document.getElementById("answers").innerHTML = "";
  document.getElementById("feedback").style.display = "none";
  document.getElementById("nextBtn").style.display = "none";
  document.getElementById("restartBtn").style.display = "none";
  document.getElementById("submitBtn").style.display = "none";

  if (currentQuestion.type === "single") {
    loadSingleQuestion();
  } else if (currentQuestion.type === "multi") {
    loadMultiQuestion();
  } else if (currentQuestion.type === "matching") {
    loadMatchingQuestion();
  }
}

function loadSingleQuestion() {
  const answersDiv = document.getElementById("answers");

  const shuffledAnswers = shuffleArray(
    currentQuestion.answers.map((answer, index) => ({
      text: answer,
      originalIndex: index
    }))
  );

  currentQuestion.shuffledSingleAnswers = shuffledAnswers;

  shuffledAnswers.forEach((answer, index) => {
    answersDiv.innerHTML += `
      <button onclick="checkSingleAnswer(${index})">
        ${answer.text}
      </button>
    `;
  });
}

function loadMultiQuestion() {
  const answersDiv = document.getElementById("answers");

  const correctAnswers = currentQuestion.correct.map(index => ({
    text: currentQuestion.answers[index],
    isCorrect: true
  }));

  const incorrectAnswers = currentQuestion.answers
    .map((answer, index) => ({
      text: answer,
      isCorrect: false,
      originalIndex: index
    }))
    .filter(answer => !currentQuestion.correct.includes(answer.originalIndex));

  const twoIncorrectAnswers = shuffleArray(incorrectAnswers).slice(0, 2);

  const finalAnswers = shuffleArray([
    ...correctAnswers,
    ...twoIncorrectAnswers
  ]);

  currentQuestion.shuffledAnswers = finalAnswers;

  currentQuestion.shuffledCorrect = finalAnswers
    .map((answer, index) => answer.isCorrect ? index : null)
    .filter(index => index !== null);

  finalAnswers.forEach((answer, index) => {
    answersDiv.innerHTML += `
      <label class="checkbox-answer">
        <input type="checkbox" value="${index}">
        ${answer.text}
      </label>
    `;
  });

  document.getElementById("submitBtn").style.display = "block";
}

function loadMatchingQuestion() {
  const answersDiv = document.getElementById("answers");

  currentQuestion.leftItems.forEach((leftItem, leftIndex) => {
    const shuffledOptions = shuffleArray(
      currentQuestion.rightItems.map((rightItem, rightIndex) => ({
        text: rightItem,
        originalIndex: rightIndex
      }))
    );

    let options = `<option value="">Choose match</option>`;

    shuffledOptions.forEach(option => {
      options += `
        <option value="${option.originalIndex}">
          ${option.text}
        </option>
      `;
    });

    answersDiv.innerHTML += `
      <div class="matching-row">
        <div class="matching-left">${leftItem}</div>
        <select data-left-index="${leftIndex}">
          ${options}
        </select>
      </div>
    `;
  });

  document.getElementById("submitBtn").style.display = "block";
}

function checkSingleAnswer(selected) {
  const feedback = document.getElementById("feedback");
  const buttons = document.querySelectorAll("#answers button");

  buttons.forEach(button => {
    button.disabled = true;
  });

  const selectedOriginalIndex =
    currentQuestion.shuffledSingleAnswers[selected].originalIndex;

  const correctShuffledIndex =
    currentQuestion.shuffledSingleAnswers.findIndex(
      answer => answer.originalIndex === currentQuestion.correct
    );

  if (selectedOriginalIndex === currentQuestion.correct) {
    score++;
    currentLevel++;
    if (currentLevel > 7) currentLevel = 7;

    buttons[selected].style.background = "darkgreen";

    feedback.innerHTML =
      "<strong>Correct.</strong><br>" +
      currentQuestion.feedback +
      "<br><br>Difficulty will remain at Level 7.";
  } else {
    currentLevel--;
    if (currentLevel < 7) currentLevel = 7;

    buttons[selected].style.background = "darkred";
    buttons[correctShuffledIndex].style.background = "darkgreen";

    feedback.innerHTML =
      "<strong>Incorrect.</strong><br>" +
      "Most correct answer: <strong>" +
      currentQuestion.answers[currentQuestion.correct] +
      "</strong><br><br>" +
      currentQuestion.feedback +
      "<br><br>Difficulty will remain at Level 7.";
  }

  feedback.style.display = "block";
  document.getElementById("nextBtn").style.display = "block";
}

function submitAnswer() {
  if (currentQuestion.type === "multi") {
    checkMultiAnswer();
  } else if (currentQuestion.type === "matching") {
    checkMatchingAnswer();
  }
}

function checkMultiAnswer() {
  const checked = Array.from(
    document.querySelectorAll('#answers input[type="checkbox"]:checked')
  ).map(cb => Number(cb.value));

  const correctAnswers = currentQuestion.shuffledCorrect;

  const correct =
    checked.length === correctAnswers.length &&
    checked.every(value => correctAnswers.includes(value));

  const feedback = document.getElementById("feedback");
  const checkboxes = document.querySelectorAll('#answers input[type="checkbox"]');

  checkboxes.forEach(cb => {
    cb.disabled = true;
  });

  if (correct) {
    score++;
    currentLevel++;
    if (currentLevel > 7) currentLevel = 7;

    feedback.innerHTML =
      "<strong>Correct.</strong><br>" +
      currentQuestion.feedback +
      "<br><br>Difficulty will remain at Level 7.";
  } else {
    currentLevel--;
    if (currentLevel < 7) currentLevel = 7;

    const correctText = currentQuestion.shuffledCorrect
      .map(index => currentQuestion.shuffledAnswers[index].text)
      .join(", ");

    feedback.innerHTML =
      "<strong>Incorrect.</strong><br>" +
      "Most correct answers: <strong>" +
      correctText +
      "</strong><br><br>" +
      currentQuestion.feedback +
      "<br><br>Difficulty will remain at Level 7.";
  }

  feedback.style.display = "block";
  document.getElementById("submitBtn").style.display = "none";
  document.getElementById("nextBtn").style.display = "block";
}

function checkMatchingAnswer() {
  const selects = document.querySelectorAll("#answers select");
  const selectedAnswers = Array.from(selects).map(select => Number(select.value));

  const allAnswered = selectedAnswers.every(answer => !Number.isNaN(answer));

  const correct =
    allAnswered &&
    selectedAnswers.length === currentQuestion.correct.length &&
    selectedAnswers.every((value, index) => value === currentQuestion.correct[index]);

  const feedback = document.getElementById("feedback");

  selects.forEach(select => {
    select.disabled = true;
  });

  if (correct) {
    score++;
    currentLevel++;
    if (currentLevel > 7) currentLevel = 7;

    feedback.innerHTML =
      "<strong>Correct.</strong><br>" +
      currentQuestion.feedback +
      "<br><br>Difficulty will remain at Level 7.";
  } else {
    currentLevel--;
    if (currentLevel < 7) currentLevel = 7;

    let correctText = "";

    currentQuestion.leftItems.forEach((item, index) => {
      correctText +=
        item +
        " = " +
        currentQuestion.rightItems[currentQuestion.correct[index]] +
        "<br>";
    });

    feedback.innerHTML =
      "<strong>Incorrect.</strong><br>" +
      "<br><strong>Most correct matches:</strong><br>" +
      correctText +
      "<br>" +
      currentQuestion.feedback +
      "<br><br>Difficulty will remain at Level 7.";
  }

  feedback.style.display = "block";
  document.getElementById("submitBtn").style.display = "none";
  document.getElementById("nextBtn").style.display = "block";
}

function nextQuestion() {
  questionNumber++;
  loadQuestion();
}

function finishExam() {
  document.getElementById("question").innerHTML =
    "<h2>Exam Complete</h2>";

  document.getElementById("answers").innerHTML = "";

  let result = "";

  if (score >= 22) {
    result = "Excellent performance. Student is handling Level 7 critical-thinking endocrine scenarios.";
  } else if (score >= 18) {
    result = "Good performance. Review airway changes, overlapping conditions, refusal capacity, DKA shock, and unsafe distractors.";
  } else if (score >= 14) {
    result = "Borderline performance. Review multi-threat scenarios, airway protection, hypoglycemia vs stroke, DKA, shock, and reassessment.";
  } else {
    result = "Needs remediation. Focus on EMT priorities: scene safety, airway, breathing, circulation, shock, seizure care, glucose safety, and rapid transport.";
  }

  document.getElementById("feedback").style.display = "block";
  document.getElementById("feedback").innerHTML =
    "<strong>Final Score:</strong> " + score + " / " + maxQuestions +
    "<br><br><strong>Final Difficulty Level:</strong> " + currentLevel +
    "<br><br>" + result;

  document.getElementById("status").innerText = "Level 7 Exam Finished";
  document.getElementById("submitBtn").style.display = "none";
  document.getElementById("nextBtn").style.display = "none";
  document.getElementById("restartBtn").style.display = "block";
}

function restartExam() {
  currentLevel = 7;
  questionNumber = 0;
  score = 0;
  usedQuestions = [];
  loadQuestion();
}

loadQuestion();
</script>

</body>
</html>
