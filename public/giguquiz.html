<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Level 11-12 Adaptive EMT GI/GU Emergencies Exam</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #222;
      color: white;
      padding: 20px;
    }

    .container {
      max-width: 900px;
      margin: auto;
      background: #333;
      padding: 25px;
      border-radius: 10px;
    }

    h1, h2 {
      text-align: center;
    }

    .question-box {
      background: #d9d9d9;
      color: black;
      padding: 20px;
      border-radius: 8px;
      margin-top: 20px;
    }

    button {
      display: block;
      width: 100%;
      margin: 8px 0;
      padding: 12px;
      font-size: 16px;
      background: green;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      text-align: left;
    }

    button:hover {
      background: darkgreen;
    }

    #submitBtn, #nextBtn, #restartBtn {
      background: #0066cc;
      text-align: center;
      display: none;
    }

    #feedback {
      margin-top: 15px;
      padding: 15px;
      background: white;
      color: black;
      border-radius: 6px;
      display: none;
    }

    #status {
      text-align: center;
      margin-top: 15px;
      font-size: 18px;
    }

    .checkbox-answer {
      display: block;
      background: #eeeeee;
      color: black;
      padding: 12px;
      margin: 8px 0;
      border-radius: 6px;
      font-size: 16px;
      cursor: pointer;
    }

    .checkbox-answer input {
      margin-right: 10px;
      transform: scale(1.2);
    }

    .matching-row {
      display: flex;
      align-items: center;
      gap: 15px;
      margin: 12px 0;
      background: #eeeeee;
      padding: 12px;
      border-radius: 6px;
    }

    .matching-left {
      flex: 1;
      font-weight: bold;
    }

    .matching-row select {
      flex: 1;
      padding: 10px;
      font-size: 16px;
      border-radius: 6px;
    }
  </style>
</head>

<body>

<div class="container">
  <h1>EMT GI/GU Emergencies Exam</h1>
  <h2>Level 11-12 Advanced Adaptive Exam</h2>

  <div id="status"></div>

  <div class="question-box">
    <div id="question"></div>
    <div id="answers"></div>

    <button id="submitBtn" onclick="submitAnswer()">Submit Answer</button>

    <div id="feedback"></div>

    <button id="nextBtn" onclick="nextQuestion()">Next Question</button>
    <button id="restartBtn" onclick="restartExam()">Restart Exam</button>
  </div>
</div>

<script>
const questions = [
  {
    level: 11,
    type: "single",
    question: "A dialysis patient missed two treatments and has abdominal pain, vomiting, crackles, bradycardia, and worsening confusion. During transport, respirations become shallow. What is the MOST appropriate EMT priority?",
    answers: [
      "Support airway and ventilation while continuing rapid transport and requesting ALS intercept",
      "Focus only on the abdominal pain because this is a GI/GU complaint",
      "Stop transport to obtain a complete dialysis history",
      "Give oral fluids because vomiting suggests dehydration"
    ],
    correct: 0,
    feedback: "This patient may have life-threatening electrolyte imbalance, pulmonary edema, and respiratory failure. Airway and ventilation come first."
  },
  {
    level: 11,
    type: "single",
    question: "A patient with suspected GI bleeding is pale, diaphoretic, confused, and vomiting blood. Your partner wants to place the patient supine, but the patient is actively vomiting. What is the BEST action?",
    answers: [
      "Protect the airway, suction as needed, position to reduce aspiration risk, treat shock, and rapidly transport",
      "Place the patient flat and leave vomit in the mouth until arrival",
      "Delay transport until vomiting stops",
      "Give water to clear blood from the throat"
    ],
    correct: 0,
    feedback: "Airway contamination and shock are immediate life threats."
  },
  {
    level: 11,
    type: "single",
    question: "A woman with possible pregnancy has lower abdominal pain, syncope, shoulder pain, and hypotension. She becomes anxious and refuses care, but cannot explain the risks of refusal. What is the MOST appropriate EMT decision?",
    answers: [
      "Question capacity, follow local protocol, treat for shock, and transport",
      "Accept the refusal because she verbally said no",
      "Ignore the pregnancy concern because she is embarrassed",
      "Wait for her blood pressure to improve before moving"
    ],
    correct: 0,
    feedback: "Shock and altered decision-making raise concern for lack of capacity. Possible ectopic pregnancy is life-threatening."
  },
  {
    level: 11,
    type: "single",
    question: "A patient with a suspected AAA is hypotensive and confused. Family insists he walk to the ambulance because he dislikes stretchers. What is the BEST EMT decision?",
    answers: [
      "Minimize exertion, move safely, treat for shock, and rapidly transport",
      "Allow him to walk because family requested it",
      "Repeatedly palpate the abdomen to confirm the aneurysm",
      "Delay care until ALS arrives"
    ],
    correct: 0,
    feedback: "Possible AAA requires minimal movement, shock care, and rapid transport."
  },
  {
    level: 11,
    type: "multi",
    question: "Which findings suggest a GI/GU patient is unstable even if the blood pressure is not yet low? Select all that apply.",
    answers: [
      "Increasing tachycardia",
      "Cool pale skin",
      "Restlessness or confusion",
      "Near-syncope",
      "Normal mentation",
      "Warm dry skin with stable vitals"
    ],
    correct: [0, 1, 2, 3],
    feedback: "Shock may be compensated before hypotension appears."
  },
  {
    level: 11,
    type: "multi",
    question: "Which actions are appropriate for an unstable GI/GU patient with vomiting, altered mental status, and signs of shock? Select all that apply.",
    answers: [
      "Manage airway risk",
      "Assess breathing adequacy",
      "Treat for shock",
      "Rapidly transport",
      "Give oral fluids",
      "Delay transport for complete history"
    ],
    correct: [0, 1, 2, 3],
    feedback: "Airway, breathing, circulation, and transport are the priorities."
  },
  {
    level: 11,
    type: "matching",
    question: "Match the advanced finding with the most likely hidden life threat.",
    leftItems: [
      "Missed dialysis with bradycardia and weakness",
      "Shoulder pain with possible pregnancy",
      "Vomiting blood with altered mental status",
      "Tearing abdominal pain radiating to the back"
    ],
    rightItems: [
      "Possible potassium disturbance",
      "Possible ectopic pregnancy",
      "GI bleed with airway and shock risk",
      "Possible abdominal aortic aneurysm"
    ],
    correct: [0, 1, 2, 3],
    feedback: "Level 11 questions require recognition of hidden threats before collapse."
  },

  {
    level: 12,
    type: "single",
    question: "You are transporting a dialysis patient who missed treatment. He has abdominal pain, vomiting, crackles, bradycardia, and altered mental status. ALS is unavailable. Halfway to the hospital, he becomes apneic. What is the MOST appropriate EMT action?",
    answers: [
      "Begin ventilations immediately, continue rapid transport, and reassess circulation frequently",
      "Stop and obtain a complete medication list",
      "Give oral glucose because altered mental status is present",
      "Place him upright and wait to see if breathing returns"
    ],
    correct: 0,
    feedback: "Apnea requires immediate ventilatory support. Do not delay transport."
  },
  {
    level: 12,
    type: "single",
    question: "A patient with severe GI bleeding becomes unresponsive, has gurgling respirations, and has weak carotid pulses. What should happen FIRST?",
    answers: [
      "Suction the airway and support ventilations as needed",
      "Ask family about medical history",
      "Apply a blanket only",
      "Wait until arrival at the hospital"
    ],
    correct: 0,
    feedback: "Airway obstruction from blood or vomit is the immediate threat."
  },
  {
    level: 12,
    type: "single",
    question: "A confused patient with suspected internal abdominal bleeding refuses transport. He is pale, diaphoretic, tachycardic, and unable to repeat the risks of refusal. What is the BEST interpretation?",
    answers: [
      "The refusal may not be valid because decision-making capacity is impaired",
      "The refusal is automatically valid because he is awake",
      "Family may sign refusal for him without concern",
      "Transport should be delayed until the patient becomes hypotensive"
    ],
    correct: 0,
    feedback: "Capacity requires understanding, appreciation, reasoning, and communication of a choice."
  },
  {
    level: 12,
    type: "single",
    question: "A patient with suspected AAA becomes more lethargic during movement. Your partner wants to sit the patient upright and continue lifting quickly. What is the BEST response?",
    answers: [
      "Stop unnecessary exertion, reassess ABCs and perfusion, move carefully, and expedite transport",
      "Tell the patient to assist with walking",
      "Repeat abdominal palpation several times",
      "Delay transport until pain improves"
    ],
    correct: 0,
    feedback: "Deterioration during movement suggests worsening perfusion. Minimize exertion and reassess."
  },
  {
    level: 12,
    type: "multi",
    question: "Which findings make a GI/GU call Level 12 difficulty? Select all that apply.",
    answers: [
      "Multiple systems failing at once",
      "Changing condition during transport",
      "Limited resources or no ALS",
      "Legal/capacity conflict with an unstable patient",
      "Stable patient with mild nausea",
      "Simple recall of terminology"
    ],
    correct: [0, 1, 2, 3],
    feedback: "Level 12 requires prioritization, reassessment, ethics, transport decisions, and multi-system thinking."
  },
  {
    level: 12,
    type: "multi",
    question: "A vomiting GI bleed patient becomes unresponsive during transport. Which actions are MOST appropriate? Select all that apply.",
    answers: [
      "Suction airway",
      "Assess breathing",
      "Assist ventilations if inadequate",
      "Continue rapid transport",
      "Give oral water",
      "Delay care for full SAMPLE history"
    ],
    correct: [0, 1, 2, 3],
    feedback: "Airway, breathing, and circulation priorities override history gathering."
  },
  {
    level: 12,
    type: "matching",
    question: "Match the Level 12 complication with the highest EMT priority.",
    leftItems: [
      "Unresponsive GI bleed with gurgling",
      "Dialysis patient becomes apneic",
      "Possible ectopic pregnancy with shock",
      "Suspected AAA with worsening lethargy"
    ],
    rightItems: [
      "Suction and airway protection",
      "Immediate ventilatory support",
      "Treat for internal hemorrhage and rapid transport",
      "Minimize movement and treat shock"
    ],
    correct: [0, 1, 2, 3],
    feedback: "Level 12 questions test the priority that prevents death first."
  }
];

let currentLevel = 11;
let questionNumber = 0;
let score = 0;
let maxQuestions = 25;
let currentQuestion;
let usedQuestions = [];

function shuffleArray(array) {
  return array
    .map(value => ({ value, sort: Math.random() }))
    .sort((a, b) => a.sort - b.sort)
    .map(({ value }) => value);
}

function getQuestionByLevel(level) {
  let available = questions.filter(q =>
    q.level === level && !usedQuestions.includes(q.question)
  );

  if (available.length === 0) {
    available = questions.filter(q => !usedQuestions.includes(q.question));
  }

  if (available.length === 0) {
    usedQuestions = [];
    available = questions.filter(q => q.level === level);
  }

  return available[Math.floor(Math.random() * available.length)];
}

function loadQuestion() {
  if (questionNumber >= maxQuestions) {
    finishExam();
    return;
  }

  currentQuestion = getQuestionByLevel(currentLevel);
  usedQuestions.push(currentQuestion.question);

  document.getElementById("status").innerText =
    "Question " + (questionNumber + 1) +
    " of " + maxQuestions +
    " | Current Difficulty Level: " + currentLevel +
    " | Score: " + score;

  document.getElementById("question").innerHTML =
    "<strong>" + currentQuestion.question + "</strong>";

  document.getElementById("answers").innerHTML = "";
  document.getElementById("feedback").style.display = "none";
  document.getElementById("nextBtn").style.display = "none";
  document.getElementById("restartBtn").style.display = "none";
  document.getElementById("submitBtn").style.display = "none";

  if (currentQuestion.type === "single") {
    loadSingleQuestion();
  } else if (currentQuestion.type === "multi") {
    loadMultiQuestion();
  } else if (currentQuestion.type === "matching") {
    loadMatchingQuestion();
  }
}

function loadSingleQuestion() {
  const answersDiv = document.getElementById("answers");

  const shuffledAnswers = shuffleArray(
    currentQuestion.answers.map((answer, index) => ({
      text: answer,
      originalIndex: index
    }))
  );

  currentQuestion.shuffledSingleAnswers = shuffledAnswers;

  shuffledAnswers.forEach((answer, index) => {
    answersDiv.innerHTML += `
      <button onclick="checkSingleAnswer(${index})">
        ${answer.text}
      </button>
    `;
  });
}

function loadMultiQuestion() {
  const answersDiv = document.getElementById("answers");

  const correctAnswers = currentQuestion.correct.map(index => ({
    text: currentQuestion.answers[index],
    isCorrect: true
  }));

  const incorrectAnswers = currentQuestion.answers
    .map((answer, index) => ({
      text: answer,
      isCorrect: false,
      originalIndex: index
    }))
    .filter(answer => !currentQuestion.correct.includes(answer.originalIndex));

  const twoIncorrectAnswers = shuffleArray(incorrectAnswers).slice(0, 2);

  const finalAnswers = shuffleArray([
    ...correctAnswers,
    ...twoIncorrectAnswers
  ]);

  currentQuestion.shuffledAnswers = finalAnswers;

  currentQuestion.shuffledCorrect = finalAnswers
    .map((answer, index) => answer.isCorrect ? index : null)
    .filter(index => index !== null);

  finalAnswers.forEach((answer, index) => {
    answersDiv.innerHTML += `
      <label class="checkbox-answer">
        <input type="checkbox" value="${index}">
        ${answer.text}
      </label>
    `;
  });

  document.getElementById("submitBtn").style.display = "block";
}

function loadMatchingQuestion() {
  const answersDiv = document.getElementById("answers");

  currentQuestion.leftItems.forEach((leftItem, leftIndex) => {
    const shuffledOptions = shuffleArray(
      currentQuestion.rightItems.map((rightItem, rightIndex) => ({
        text: rightItem,
        originalIndex: rightIndex
      }))
    );

    let options = `<option value="">Choose match</option>`;

    shuffledOptions.forEach(option => {
      options += `
        <option value="${option.originalIndex}">
          ${option.text}
        </option>
      `;
    });

    answersDiv.innerHTML += `
      <div class="matching-row">
        <div class="matching-left">${leftItem}</div>
        <select data-left-index="${leftIndex}">
          ${options}
        </select>
      </div>
    `;
  });

  document.getElementById("submitBtn").style.display = "block";
}

function checkSingleAnswer(selected) {
  const feedback = document.getElementById("feedback");
  const buttons = document.querySelectorAll("#answers button");

  buttons.forEach(button => {
    button.disabled = true;
  });

  const selectedOriginalIndex =
    currentQuestion.shuffledSingleAnswers[selected].originalIndex;

  const correctShuffledIndex =
    currentQuestion.shuffledSingleAnswers.findIndex(
      answer => answer.originalIndex === currentQuestion.correct
    );

  if (selectedOriginalIndex === currentQuestion.correct) {
    score++;
    currentLevel++;
    if (currentLevel > 12) currentLevel = 12;

    buttons[selected].style.background = "darkgreen";

    feedback.innerHTML =
      "<strong>Correct.</strong><br>" +
      currentQuestion.feedback +
      "<br><br>Difficulty will increase if possible.";
  } else {
    currentLevel--;
    if (currentLevel < 11) currentLevel = 11;

    buttons[selected].style.background = "darkred";
    buttons[correctShuffledIndex].style.background = "darkgreen";

    feedback.innerHTML =
      "<strong>Incorrect.</strong><br>" +
      "Most correct answer: <strong>" +
      currentQuestion.answers[currentQuestion.correct] +
      "</strong><br><br>" +
      currentQuestion.feedback +
      "<br><br>Difficulty will decrease if possible.";
  }

  feedback.style.display = "block";
  document.getElementById("nextBtn").style.display = "block";
}

function submitAnswer() {
  if (currentQuestion.type === "multi") {
    checkMultiAnswer();
  } else if (currentQuestion.type === "matching") {
    checkMatchingAnswer();
  }
}

function checkMultiAnswer() {
  const checked = Array.from(
    document.querySelectorAll('#answers input[type="checkbox"]:checked')
  ).map(cb => Number(cb.value));

  const correctAnswers = currentQuestion.shuffledCorrect;

  const correct =
    checked.length === correctAnswers.length &&
    checked.every(value => correctAnswers.includes(value));

  const feedback = document.getElementById("feedback");
  const checkboxes = document.querySelectorAll('#answers input[type="checkbox"]');

  checkboxes.forEach(cb => {
    cb.disabled = true;
  });

  if (correct) {
    score++;
    currentLevel++;
    if (currentLevel > 12) currentLevel = 12;

    feedback.innerHTML =
      "<strong>Correct.</strong><br>" +
      currentQuestion.feedback +
      "<br><br>Difficulty will increase if possible.";
  } else {
    currentLevel--;
    if (currentLevel < 11) currentLevel = 11;

    const correctText = currentQuestion.shuffledCorrect
      .map(index => currentQuestion.shuffledAnswers[index].text)
      .join(", ");

    feedback.innerHTML =
      "<strong>Incorrect.</strong><br>" +
      "Most correct answers: <strong>" +
      correctText +
      "</strong><br><br>" +
      currentQuestion.feedback +
      "<br><br>Difficulty will decrease if possible.";
  }

  feedback.style.display = "block";
  document.getElementById("submitBtn").style.display = "none";
  document.getElementById("nextBtn").style.display = "block";
}

function checkMatchingAnswer() {
  const selects = document.querySelectorAll("#answers select");
  const selectedAnswers = Array.from(selects).map(select => Number(select.value));

  const allAnswered = selectedAnswers.every(answer => !Number.isNaN(answer));

  const correct =
    allAnswered &&
    selectedAnswers.length === currentQuestion.correct.length &&
    selectedAnswers.every((value, index) => value === currentQuestion.correct[index]);

  const feedback = document.getElementById("feedback");

  selects.forEach(select => {
    select.disabled = true;
  });

  if (correct) {
    score++;
    currentLevel++;
    if (currentLevel > 12) currentLevel = 12;

    feedback.innerHTML =
      "<strong>Correct.</strong><br>" +
      currentQuestion.feedback +
      "<br><br>Difficulty will increase if possible.";
  } else {
    currentLevel--;
    if (currentLevel < 11) currentLevel = 11;

    let correctText = "";

    currentQuestion.leftItems.forEach((item, index) => {
      correctText +=
        item +
        " = " +
        currentQuestion.rightItems[currentQuestion.correct[index]] +
        "<br>";
    });

    feedback.innerHTML =
      "<strong>Incorrect.</strong><br>" +
      "<br><strong>Most correct matches:</strong><br>" +
      correctText +
      "<br>" +
      currentQuestion.feedback +
      "<br><br>Difficulty will decrease if possible.";
  }

  feedback.style.display = "block";
  document.getElementById("submitBtn").style.display = "none";
  document.getElementById("nextBtn").style.display = "block";
}

function nextQuestion() {
  questionNumber++;
  loadQuestion();
}

function finishExam() {
  document.getElementById("question").innerHTML =
    "<h2>Exam Complete</h2>";

  document.getElementById("answers").innerHTML = "";

  let result = "";

  if (score >= 22) {
    result = "Excellent performance. Student is handling Level 11-12 advanced EMT GI/GU critical-thinking scenarios.";
  } else if (score >= 18) {
    result = "Good performance. Review dialysis complications, GI bleeding, airway compromise, shock, AAA, pregnancy complications, and refusal capacity.";
  } else if (score >= 14) {
    result = "Borderline performance. Review multi-system patient deterioration, airway priorities, reassessment, and rapid transport decisions.";
  } else {
    result = "Needs remediation. Focus on EMT priorities: scene safety, airway, breathing, circulation, shock, internal bleeding, dialysis emergencies, GI bleeding, and transport decisions.";
  }

  document.getElementById("feedback").style.display = "block";
  document.getElementById("feedback").innerHTML =
    "<strong>Final Score:</strong> " + score + " / " + maxQuestions +
    "<br><br><strong>Final Difficulty Level:</strong> " + currentLevel +
    "<br><br>" + result;

  document.getElementById("status").innerText = "Level 11-12 Exam Finished";
  document.getElementById("submitBtn").style.display = "none";
  document.getElementById("nextBtn").style.display = "none";
  document.getElementById("restartBtn").style.display = "block";
}

function restartExam() {
  currentLevel = 11;
  questionNumber = 0;
  score = 0;
  usedQuestions = [];
  loadQuestion();
}

loadQuestion();
</script>

</body>
</html>
