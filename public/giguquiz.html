<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Level 8-10 Adaptive EMT GI/GU Emergencies Exam</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #222;
      color: white;
      padding: 20px;
    }

    .container {
      max-width: 900px;
      margin: auto;
      background: #333;
      padding: 25px;
      border-radius: 10px;
    }

    h1, h2 {
      text-align: center;
    }

    .question-box {
      background: #d9d9d9;
      color: black;
      padding: 20px;
      border-radius: 8px;
      margin-top: 20px;
    }

    button {
      display: block;
      width: 100%;
      margin: 8px 0;
      padding: 12px;
      font-size: 16px;
      background: green;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      text-align: left;
    }

    button:hover {
      background: darkgreen;
    }

    #submitBtn, #nextBtn, #restartBtn {
      background: #0066cc;
      text-align: center;
      display: none;
    }

    #feedback {
      margin-top: 15px;
      padding: 15px;
      background: white;
      color: black;
      border-radius: 6px;
      display: none;
    }

    #status {
      text-align: center;
      margin-top: 15px;
      font-size: 18px;
    }

    .checkbox-answer {
      display: block;
      background: #eeeeee;
      color: black;
      padding: 12px;
      margin: 8px 0;
      border-radius: 6px;
      font-size: 16px;
      cursor: pointer;
    }

    .checkbox-answer input {
      margin-right: 10px;
      transform: scale(1.2);
    }

    .matching-row {
      display: flex;
      align-items: center;
      gap: 15px;
      margin: 12px 0;
      background: #eeeeee;
      padding: 12px;
      border-radius: 6px;
    }

    .matching-left {
      flex: 1;
      font-weight: bold;
    }

    .matching-row select {
      flex: 1;
      padding: 10px;
      font-size: 16px;
      border-radius: 6px;
    }
  </style>
</head>

<body>

<div class="container">
  <h1>EMT GI/GU Emergencies Exam</h1>

  <div id="status"></div>

  <div class="question-box">
    <div id="question"></div>
    <div id="answers"></div>

    <button id="submitBtn" onclick="submitAnswer()">Submit Answer</button>

    <div id="feedback"></div>

    <button id="nextBtn" onclick="nextQuestion()">Next Question</button>
    <button id="restartBtn" onclick="restartExam()">Restart Exam</button>
  </div>
</div>

<script>
const questions = [
  {
    level: 8,
    type: "single",
    question: "A 72-year-old with liver disease vomits bright red blood. He is confused, pale, and repeatedly trying to lie flat. BP is 84/50, pulse 132, respirations 24. Your partner wants a full SAMPLE history before moving. What is the MOST appropriate EMT decision?",
    answers: [
      "Begin rapid transport while managing airway risk and shock",
      "Complete the full history before transport",
      "Place the patient flat to improve blood pressure",
      "Give small sips of water to reduce throat irritation"
    ],
    correct: 0,
    feedback: "Major GI bleeding with shock and airway risk requires rapid transport and supportive care. History should not delay care."
  },
  {
    level: 8,
    type: "single",
    question: "A dialysis patient missed treatment and has dyspnea, crackles, weakness, and a slow irregular pulse. He denies chest pain. Which finding makes this a high-risk emergency?",
    answers: [
      "Slow irregular pulse with weakness",
      "Missed dialysis appointment alone",
      "No chest pain",
      "Mild ankle swelling"
    ],
    correct: 0,
    feedback: "A slow irregular pulse after missed dialysis may suggest dangerous electrolyte disturbance."
  },
  {
    level: 8,
    type: "single",
    question: "A patient has sudden severe abdominal pain radiating to the back, pale skin, hypotension, and a pulsating abdominal mass. During loading, he asks to stand because lying down worsens pain. What should you do?",
    answers: [
      "Keep movement minimal, treat for shock, and rapidly transport",
      "Allow him to stand briefly if it improves comfort",
      "Palpate the mass again to confirm the finding",
      "Give oral fluids because hypotension suggests dehydration"
    ],
    correct: 0,
    feedback: "This suggests possible AAA. Minimize movement, avoid repeated palpation, treat for shock, and rapidly transport."
  },
  {
    level: 8,
    type: "single",
    question: "A patient with vomiting and diarrhea is dizzy, tachycardic, and confused when sitting upright. Family asks if they should give water before you leave. What is the BEST EMT response?",
    answers: [
      "Do not delay transport; manage perfusion and airway risk",
      "Give large amounts of water immediately",
      "Have the patient walk to improve circulation",
      "Wait until vomiting stops before transporting"
    ],
    correct: 0,
    feedback: "Severe fluid loss can cause hypovolemic shock. Oral fluids are not the priority in an unstable patient."
  },
  {
    level: 8,
    type: "multi",
    question: "Which findings suggest abdominal pain is not a minor GI complaint? Select all that apply.",
    answers: [
      "Syncope or near-syncope",
      "Rigid abdomen",
      "Hypotension",
      "Pain radiating to the shoulder with possible pregnancy",
      "Mild nausea after eating",
      "Normal mentation with normal vital signs"
    ],
    correct: [0, 1, 2, 3],
    feedback: "Syncope, rigidity, hypotension, and shoulder pain with possible pregnancy suggest serious pathology."
  },
  {
    level: 8,
    type: "multi",
    question: "Which actions are unsafe for a patient with possible major GI bleeding? Select all that apply.",
    answers: [
      "Giving food or water",
      "Delaying transport until bleeding stops",
      "Ignoring airway risk from vomiting blood",
      "Having the hypotensive patient walk",
      "Treating for shock",
      "Requesting ALS if available"
    ],
    correct: [0, 1, 2, 3],
    feedback: "Major GI bleeding can threaten both airway and circulation."
  },
  {
    level: 8,
    type: "matching",
    question: "Match the subtle clue with the hidden life threat.",
    leftItems: [
      "Black tarry stool with dizziness",
      "Shoulder pain with possible pregnancy",
      "Missed dialysis with slow irregular pulse",
      "Sudden tearing abdominal pain to back"
    ],
    rightItems: [
      "GI bleeding with hypovolemia",
      "Possible ectopic pregnancy",
      "Possible potassium disturbance",
      "Possible abdominal aortic aneurysm"
    ],
    correct: [0, 1, 2, 3],
    feedback: "Higher-level questions test recognition of hidden life threats before collapse."
  },

  {
    level: 9,
    type: "single",
    question: "You are 40 minutes from the hospital during a storm. ALS is unavailable. A dialysis patient with abdominal pain develops dyspnea, vomiting, bradycardia, and altered mental status during transport. Family demands diversion to a closer urgent care. What is the BEST EMT decision?",
    answers: [
      "Continue to the appropriate emergency department while supporting airway, breathing, and perfusion",
      "Divert to urgent care because family requested it",
      "Stop transport until the patient becomes more alert",
      "Give oral fluids because vomiting suggests dehydration"
    ],
    correct: 0,
    feedback: "This is a high-risk dialysis patient with possible electrolyte disturbance, respiratory compromise, and altered mental status."
  },
  {
    level: 9,
    type: "single",
    question: "A patient with abdominal trauma becomes pale and confused. Pulse rises from 96 to 140, but BP remains 110/70. Your partner says the blood pressure is still normal. What is the MOST accurate interpretation?",
    answers: [
      "The patient may still be developing shock despite a normal blood pressure",
      "Shock is ruled out because blood pressure is normal",
      "The patient is improving because blood pressure is stable",
      "Only pain control is needed"
    ],
    correct: 0,
    feedback: "Tachycardia, pallor, and confusion may show compensated shock before hypotension appears."
  },
  {
    level: 9,
    type: "single",
    question: "A confused patient with severe abdominal pain refuses care. He is pale, weak, and cannot explain the risks of staying home. Police are on scene and family insists he always refuses hospitals. What is the MOST appropriate EMT action?",
    answers: [
      "Question decision-making capacity and follow local protocol for treatment and transport",
      "Accept the refusal because family says this is normal",
      "Leave after obtaining any signature",
      "Ignore the confusion because abdominal pain is not life-threatening"
    ],
    correct: 0,
    feedback: "A refusal is not valid if the patient lacks capacity. Confusion and poor perfusion raise concern."
  },
  {
    level: 9,
    type: "single",
    question: "A woman with possible pregnancy has lower abdominal pain, shoulder pain, dizziness, and signs of shock. She is embarrassed and asks you not to tell your partner about possible pregnancy. What is the BEST EMT action?",
    answers: [
      "Maintain privacy as much as possible while ensuring necessary lifesaving information is used for care",
      "Withhold the information from your partner even if it affects care",
      "Tell everyone on scene immediately",
      "Delay transport until she agrees to discuss details publicly"
    ],
    correct: 0,
    feedback: "Protect privacy, but critical information affecting patient care must be shared appropriately with the care team."
  },
  {
    level: 9,
    type: "multi",
    question: "Which findings suggest compensated shock may be present even before hypotension? Select all that apply.",
    answers: [
      "Increasing tachycardia",
      "Cool pale skin",
      "Restlessness or confusion",
      "Weakness or near-syncope",
      "Strong pulse with normal skin",
      "Improving mental status"
    ],
    correct: [0, 1, 2, 3],
    feedback: "Shock can exist before blood pressure falls. Look at perfusion trends."
  },
  {
    level: 9,
    type: "multi",
    question: "Which factors make a GI/GU refusal high risk? Select all that apply.",
    answers: [
      "Altered mental status",
      "Inability to explain consequences",
      "Shock signs",
      "Possible internal bleeding",
      "Clear understanding of risks",
      "Normal perfusion and normal mentation"
    ],
    correct: [0, 1, 2, 3],
    feedback: "Capacity and hidden life threats are major refusal concerns."
  },
  {
    level: 9,
    type: "matching",
    question: "Match the operational problem with the safest EMT response.",
    leftItems: [
      "ALS unavailable with worsening dialysis patient",
      "Family demands urgent care for unstable patient",
      "Partner wants complete history before transport",
      "Confused patient refuses transport"
    ],
    rightItems: [
      "Continue supportive care and rapid ED transport",
      "Use appropriate destination based on patient condition",
      "Do not delay transport for nonessential history",
      "Question capacity and follow protocol"
    ],
    correct: [0, 1, 2, 3],
    feedback: "Level 9 questions combine clinical care with operational decision-making."
  },

  {
    level: 10,
    type: "single",
    question: "You are the only EMT crew available. A dialysis patient missed two treatments and now has abdominal pain, vomiting, dyspnea, crackles, bradycardia, and worsening confusion. Transport is 45 minutes. During reassessment, respirations become shallow. What is the MOST appropriate priority?",
    answers: [
      "Manage airway and ventilation, continue rapid transport, and request ALS intercept if possible",
      "Stop transport to obtain a complete medication list",
      "Give oral fluids because vomiting is causing dehydration",
      "Focus only on the abdominal pain because GI/GU is the exam topic"
    ],
    correct: 0,
    feedback: "The scenario has GI/GU, respiratory, and electrolyte concerns. Airway and ventilation now take priority."
  },
  {
    level: 10,
    type: "single",
    question: "A patient with suspected AAA is hypotensive and confused. His spouse insists he must walk to the ambulance because he refuses to be carried. He then becomes more lethargic. What is the BEST EMT decision?",
    answers: [
      "Minimize exertion, treat for shock, reassess capacity, and move him safely",
      "Let him walk because refusal must always be honored",
      "Delay care until the spouse agrees",
      "Palpate the abdomen repeatedly to determine if it is truly an aneurysm"
    ],
    correct: 0,
    feedback: "Possible AAA with shock requires minimal movement, safe movement, reassessment of capacity, and rapid transport."
  },
  {
    level: 10,
    type: "single",
    question: "A patient with liver disease is vomiting blood and becoming less responsive. Family is yelling, blood is on the floor, and the patient is sliding from a chair. What should happen FIRST?",
    answers: [
      "Ensure scene safety, prevent patient fall, and immediately manage airway and shock priorities",
      "Ask family for a detailed liver history",
      "Give water to clear the blood taste",
      "Delay action until law enforcement arrives unless violence occurs"
    ],
    correct: 0,
    feedback: "This combines scene control, fall prevention, airway contamination, shock, and rapid transport."
  },
  {
    level: 10,
    type: "single",
    question: "A patient has abdominal pain, syncope, hypotension, and possible pregnancy. During transport she becomes unresponsive and vomits. What is the MOST appropriate EMT action?",
    answers: [
      "Protect the airway, suction as needed, manage shock, and expedite transport",
      "Ask more pregnancy history before airway care",
      "Give oral fluids to improve blood pressure",
      "Place her flat and leave vomit in the mouth until arrival"
    ],
    correct: 0,
    feedback: "Airway contamination and shock are immediate threats. Possible ectopic pregnancy remains a major concern."
  },
  {
    level: 10,
    type: "multi",
    question: "Which elements make a GI/GU scenario Level 10 difficulty? Select all that apply.",
    answers: [
      "Multiple body systems failing at once",
      "Limited resources or delayed ALS",
      "Changing patient condition during transport",
      "Legal or capacity conflict",
      "Single obvious diagnosis with stable vitals",
      "Recall-only terminology question"
    ],
    correct: [0, 1, 2, 3],
    feedback: "Level 10 questions require prioritization under uncertainty, limited resources, and changing conditions."
  },
  {
    level: 10,
    type: "multi",
    question: "A vomiting GI bleed patient becomes unresponsive during transport. Which actions are MOST appropriate? Select all that apply.",
    answers: [
      "Suction the airway",
      "Assess breathing adequacy",
      "Assist ventilations if needed",
      "Continue rapid transport and request ALS if possible",
      "Give oral fluids",
      "Delay care for full history"
    ],
    correct: [0, 1, 2, 3],
    feedback: "Airway, breathing, shock, and transport are the priorities."
  },
  {
    level: 10,
    type: "matching",
    question: "Match the Level 10 complication with the best EMT priority.",
    leftItems: [
      "GI bleed becomes unresponsive with gurgling",
      "Dialysis patient becomes bradycardic and confused",
      "Possible AAA becomes more lethargic",
      "Pregnancy-related abdominal pain with syncope"
    ],
    rightItems: [
      "Suction and airway management",
      "ALS intercept and rapid ED transport",
      "Shock care with minimal exertion",
      "Suspect internal hemorrhage"
    ],
    correct: [0, 1, 2, 3],
    feedback: "Level 10 questions require fast recognition of the priority that prevents death first."
  }
];

let currentLevel = 8;
let questionNumber = 0;
let score = 0;
let maxQuestions = 25;
let currentQuestion;
let usedQuestions = [];

function shuffleArray(array) {
  return array
    .map(value => ({ value, sort: Math.random() }))
    .sort((a, b) => a.sort - b.sort)
    .map(({ value }) => value);
}

function getQuestionByLevel(level) {
  let available = questions.filter(q =>
    q.level === level && !usedQuestions.includes(q.question)
  );

  if (available.length === 0) {
    available = questions.filter(q => !usedQuestions.includes(q.question));
  }

  if (available.length === 0) {
    finishExam();
    return null;
  }

  return available[Math.floor(Math.random() * available.length)];
}

function loadQuestion() {
  if (questionNumber >= maxQuestions) {
    finishExam();
    return;
  }

  currentQuestion = getQuestionByLevel(currentLevel);
  if (!currentQuestion) return;

  usedQuestions.push(currentQuestion.question);

  document.getElementById("status").innerText =
    "Question " + (questionNumber + 1) +
    " of " + maxQuestions +
    " | Current Difficulty Level: " + currentLevel +
    " | Score: " + score;

  document.getElementById("question").innerHTML =
    "<strong>" + currentQuestion.question + "</strong>";

  document.getElementById("answers").innerHTML = "";
  document.getElementById("feedback").style.display = "none";
  document.getElementById("nextBtn").style.display = "none";
  document.getElementById("restartBtn").style.display = "none";
  document.getElementById("submitBtn").style.display = "none";

  if (currentQuestion.type === "single") {
    loadSingleQuestion();
  } else if (currentQuestion.type === "multi") {
    loadMultiQuestion();
  } else if (currentQuestion.type === "matching") {
    loadMatchingQuestion();
  }
}

function loadSingleQuestion() {
  const answersDiv = document.getElementById("answers");

  const shuffledAnswers = shuffleArray(
    currentQuestion.answers.map((answer, index) => ({
      text: answer,
      originalIndex: index
    }))
  );

  currentQuestion.shuffledSingleAnswers = shuffledAnswers;

  shuffledAnswers.forEach((answer, index) => {
    answersDiv.innerHTML += `
      <button onclick="checkSingleAnswer(${index})">
        ${answer.text}
      </button>
    `;
  });
}

function loadMultiQuestion() {
  const answersDiv = document.getElementById("answers");

  const correctAnswers = currentQuestion.correct.map(index => ({
    text: currentQuestion.answers[index],
    isCorrect: true
  }));

  const incorrectAnswers = currentQuestion.answers
    .map((answer, index) => ({
      text: answer,
      isCorrect: false,
      originalIndex: index
    }))
    .filter(answer => !currentQuestion.correct.includes(answer.originalIndex));

  const twoIncorrectAnswers = shuffleArray(incorrectAnswers).slice(0, 2);

  const finalAnswers = shuffleArray([
    ...correctAnswers,
    ...twoIncorrectAnswers
  ]);

  currentQuestion.shuffledAnswers = finalAnswers;

  currentQuestion.shuffledCorrect = finalAnswers
    .map((answer, index) => answer.isCorrect ? index : null)
    .filter(index => index !== null);

  finalAnswers.forEach((answer, index) => {
    answersDiv.innerHTML += `
      <label class="checkbox-answer">
        <input type="checkbox" value="${index}">
        ${answer.text}
      </label>
    `;
  });

  document.getElementById("submitBtn").style.display = "block";
}

function loadMatchingQuestion() {
  const answersDiv = document.getElementById("answers");

  currentQuestion.leftItems.forEach((leftItem, leftIndex) => {
    const shuffledOptions = shuffleArray(
      currentQuestion.rightItems.map((rightItem, rightIndex) => ({
        text: rightItem,
        originalIndex: rightIndex
      }))
    );

    let options = `<option value="">Choose match</option>`;

    shuffledOptions.forEach(option => {
      options += `
        <option value="${option.originalIndex}">
          ${option.text}
        </option>
      `;
    });

    answersDiv.innerHTML += `
      <div class="matching-row">
        <div class="matching-left">${leftItem}</div>
        <select data-left-index="${leftIndex}">
          ${options}
        </select>
      </div>
    `;
  });

  document.getElementById("submitBtn").style.display = "block";
}

function checkSingleAnswer(selected) {
  const feedback = document.getElementById("feedback");
  const buttons = document.querySelectorAll("#answers button");

  buttons.forEach(button => {
    button.disabled = true;
  });

  const selectedOriginalIndex =
    currentQuestion.shuffledSingleAnswers[selected].originalIndex;

  const correctShuffledIndex =
    currentQuestion.shuffledSingleAnswers.findIndex(
      answer => answer.originalIndex === currentQuestion.correct
    );

  if (selectedOriginalIndex === currentQuestion.correct) {
    score++;
    currentLevel++;
    if (currentLevel > 10) currentLevel = 10;

    buttons[selected].style.background = "darkgreen";

    feedback.innerHTML =
      "<strong>Correct.</strong><br>" +
      currentQuestion.feedback +
      "<br><br>Difficulty will increase if possible.";
  } else {
    currentLevel--;
    if (currentLevel < 8) currentLevel = 8;

    buttons[selected].style.background = "darkred";
    buttons[correctShuffledIndex].style.background = "darkgreen";

    feedback.innerHTML =
      "<strong>Incorrect.</strong><br>" +
      "Most correct answer: <strong>" +
      currentQuestion.answers[currentQuestion.correct] +
      "</strong><br><br>" +
      currentQuestion.feedback +
      "<br><br>Difficulty will decrease if possible.";
  }

  feedback.style.display = "block";
  document.getElementById("nextBtn").style.display = "block";
}

function submitAnswer() {
  if (currentQuestion.type === "multi") {
    checkMultiAnswer();
  } else if (currentQuestion.type === "matching") {
    checkMatchingAnswer();
  }
}

function checkMultiAnswer() {
  const checked = Array.from(
    document.querySelectorAll('#answers input[type="checkbox"]:checked')
  ).map(cb => Number(cb.value));

  const correctAnswers = currentQuestion.shuffledCorrect;

  const correct =
    checked.length === correctAnswers.length &&
    checked.every(value => correctAnswers.includes(value));

  const feedback = document.getElementById("feedback");
  const checkboxes = document.querySelectorAll('#answers input[type="checkbox"]');

  checkboxes.forEach(cb => {
    cb.disabled = true;
  });

  if (correct) {
    score++;
    currentLevel++;
    if (currentLevel > 10) currentLevel = 10;

    feedback.innerHTML =
      "<strong>Correct.</strong><br>" +
      currentQuestion.feedback +
      "<br><br>Difficulty will increase if possible.";
  } else {
    currentLevel--;
    if (currentLevel < 8) currentLevel = 8;

    const correctText = currentQuestion.shuffledCorrect
      .map(index => currentQuestion.shuffledAnswers[index].text)
      .join(", ");

    feedback.innerHTML =
      "<strong>Incorrect.</strong><br>" +
      "Most correct answers: <strong>" +
      correctText +
      "</strong><br><br>" +
      currentQuestion.feedback +
      "<br><br>Difficulty will decrease if possible.";
  }

  feedback.style.display = "block";
  document.getElementById("submitBtn").style.display = "none";
  document.getElementById("nextBtn").style.display = "block";
}

function checkMatchingAnswer() {
  const selects = document.querySelectorAll("#answers select");
  const selectedAnswers = Array.from(selects).map(select => Number(select.value));

  const allAnswered = selectedAnswers.every(answer => !Number.isNaN(answer));

  const correct =
    allAnswered &&
    selectedAnswers.length === currentQuestion.correct.length &&
    selectedAnswers.every((value, index) => value === currentQuestion.correct[index]);

  const feedback = document.getElementById("feedback");

  selects.forEach(select => {
    select.disabled = true;
  });

  if (correct) {
    score++;
    currentLevel++;
    if (currentLevel > 10) currentLevel = 10;

    feedback.innerHTML =
      "<strong>Correct.</strong><br>" +
      currentQuestion.feedback +
      "<br><br>Difficulty will increase if possible.";
  } else {
    currentLevel--;
    if (currentLevel < 8) currentLevel = 8;

    let correctText = "";

    currentQuestion.leftItems.forEach((item, index) => {
      correctText +=
        item +
        " = " +
        currentQuestion.rightItems[currentQuestion.correct[index]] +
        "<br>";
    });

    feedback.innerHTML =
      "<strong>Incorrect.</strong><br>" +
      "<br><strong>Most correct matches:</strong><br>" +
      correctText +
      "<br>" +
      currentQuestion.feedback +
      "<br><br>Difficulty will decrease if possible.";
  }

  feedback.style.display = "block";
  document.getElementById("submitBtn").style.display = "none";
  document.getElementById("nextBtn").style.display = "block";
}

function nextQuestion() {
  questionNumber++;
  loadQuestion();
}

function finishExam() {
  document.getElementById("question").innerHTML =
    "<h2>Exam Complete</h2>";

  document.getElementById("answers").innerHTML = "";

  let result = "";

  if (score >= 22) {
    result = "Excellent performance. Student is handling Level 8-10 GI/GU critical-thinking scenarios.";
  } else if (score >= 18) {
    result = "Good performance. Review dialysis complications, GI bleeding, shock trends, capacity, pregnancy complications, AAA, and airway risk.";
  } else if (score >= 14) {
    result = "Borderline performance. Review multi-system GI/GU scenarios, unstable patient priorities, reassessment, and rapid transport decisions.";
  } else {
    result = "Needs remediation. Focus on EMT priorities: scene safety, airway, breathing, circulation, shock, internal bleeding, dialysis emergencies, GI bleeding, and transport decisions.";
  }

  document.getElementById("feedback").style.display = "block";
  document.getElementById("feedback").innerHTML =
    "<strong>Final Score:</strong> " + score + " / " + maxQuestions +
    "<br><br><strong>Final Difficulty Level:</strong> " + currentLevel +
    "<br><br>" + result;

  document.getElementById("status").innerText = "Level 8-10 Exam Finished";
  document.getElementById("submitBtn").style.display = "none";
  document.getElementById("nextBtn").style.display = "none";
  document.getElementById("restartBtn").style.display = "block";
}

function restartExam() {
  currentLevel = 8;
  questionNumber = 0;
  score = 0;
  usedQuestions = [];
  loadQuestion();
}

loadQuestion();
</script>

</body>
</html>
