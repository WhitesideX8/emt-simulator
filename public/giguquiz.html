<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Level 11-12 Adaptive EMT GI/GU Emergencies Exam</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #222;
      color: white;
      padding: 20px;
    }

    .container {
      max-width: 900px;
      margin: auto;
      background: #333;
      padding: 25px;
      border-radius: 10px;
    }

    h1, h2 {
      text-align: center;
    }

    .question-box {
      background: #d9d9d9;
      color: black;
      padding: 20px;
      border-radius: 8px;
      margin-top: 20px;
    }

    button {
      display: block;
      width: 100%;
      margin: 8px 0;
      padding: 12px;
      font-size: 16px;
      background: green;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      text-align: left;
    }

    button:hover {
      background: darkgreen;
    }

    #submitBtn, #nextBtn, #restartBtn {
      background: #0066cc;
      text-align: center;
      display: none;
    }

    #feedback {
      margin-top: 15px;
      padding: 15px;
      background: white;
      color: black;
      border-radius: 6px;
      display: none;
    }

    #status {
      text-align: center;
      margin-top: 15px;
      font-size: 18px;
    }

    .checkbox-answer {
      display: block;
      background: #eeeeee;
      color: black;
      padding: 12px;
      margin: 8px 0;
      border-radius: 6px;
      font-size: 16px;
      cursor: pointer;
    }

    .checkbox-answer input {
      margin-right: 10px;
      transform: scale(1.2);
    }

    .matching-row {
      display: flex;
      align-items: center;
      gap: 15px;
      margin: 12px 0;
      background: #eeeeee;
      padding: 12px;
      border-radius: 6px;
    }

    .matching-left {
      flex: 1;
      font-weight: bold;
    }

    .matching-row select {
      flex: 1;
      padding: 10px;
      font-size: 16px;
      border-radius: 6px;
    }
  </style>
</head>

<body>

<div class="container">
  <h1>EMT GI/GU Emergencies Exam</h1
  <div id="status"></div>
  <div class="question-box">
    <div id="question"></div>
    <div id="answers"></div>

    <button id="submitBtn" onclick="submitAnswer()">Submit Answer</button>

    <div id="feedback"></div>

    <button id="nextBtn" onclick="nextQuestion()">Next Question</button>
    <button id="restartBtn" onclick="restartExam()">Restart Exam</button>
  </div>
</div>

<script>
const questions = [
  {
    level: 11,
    type: "single",
    question: "A 68-year-old dialysis patient missed two treatments. He complains of weakness, nausea, and abdominal discomfort. During transport, he becomes slower to answer questions, his pulse is slow and irregular, and his respirations become shallow. What is the MOST appropriate EMT action?",
    answers: [
      "Support ventilation as needed, continue rapid transport, and request ALS intercept if available",
      "Place him upright, apply oxygen, and reassess after several minutes",
      "Complete a detailed medication history before changing treatment priorities",
      "Focus reassessment on the abdomen because that was the original complaint"
    ],
    correct: 0,
    feedback: "The priority is airway and ventilation. Missed dialysis with bradycardia, weakness, and altered mental status may indicate a life-threatening electrolyte problem."
  },
  {
    level: 11,
    type: "single",
    question: "A 72-year-old with liver disease has vomited dark red blood twice. He is pale, cool, anxious, and increasingly tachycardic, but his blood pressure is still 112/70. Which finding is MOST concerning?",
    answers: [
      "Increasing anxiety, pallor, and tachycardia despite a normal blood pressure",
      "The blood pressure remaining within the normal range",
      "The patient’s ability to answer some questions",
      "The absence of severe abdominal tenderness"
    ],
    correct: 0,
    feedback: "Compensated shock may occur before hypotension. Trends in perfusion and mental status are more important than one normal blood pressure."
  },
  {
    level: 11,
    type: "single",
    question: "A 35-year-old woman has lower abdominal pain, dizziness, shoulder pain, and possible pregnancy. She is embarrassed and asks you not to tell anyone. She becomes pale and nearly faints when standing. What should you do?",
    answers: [
      "Protect privacy as much as possible, share necessary information with the care team, treat for shock, and transport",
      "Withhold the pregnancy information from your partner because the patient requested privacy",
      "Delay transport until she is comfortable discussing the issue in detail",
      "Ask family members to confirm whether pregnancy is possible before treating"
    ],
    correct: 0,
    feedback: "Privacy matters, but critical information affecting care must be shared with the treatment team. Possible ectopic pregnancy with shock is life-threatening."
  },
  {
    level: 11,
    type: "single",
    question: "A 74-year-old suddenly develops tearing abdominal pain radiating to the back. He is pale, weak, and says he feels like he may pass out. Family wants him to walk to the ambulance because the stretcher will not fit easily through the hallway. What is the BEST decision?",
    answers: [
      "Minimize exertion, move him carefully, treat for shock, and rapidly transport",
      "Allow him to walk slowly while monitoring for worsening symptoms",
      "Delay movement until the abdominal pain improves",
      "Recheck the abdomen several times to confirm the suspected problem"
    ],
    correct: 0,
    feedback: "This presentation suggests possible abdominal aortic aneurysm. Avoid unnecessary exertion or repeated palpation."
  },
  {
    level: 11,
    type: "single",
    question: "A patient with vomiting and diarrhea is dizzy, weak, and confused when sitting upright. Family states he has been unable to keep fluids down all day. Which action is MOST appropriate?",
    answers: [
      "Assess airway and perfusion, treat for shock, and transport without delaying for oral fluids",
      "Encourage small sips of water while completing the history",
      "Have the patient stand slowly to determine if dizziness improves",
      "Wait on scene until vomiting has stopped for at least several minutes"
    ],
    correct: 0,
    feedback: "Altered mental status and orthostatic symptoms suggest poor perfusion. Oral fluids should not delay care in an unstable patient."
  },
  {
    level: 11,
    type: "multi",
    question: "Which findings suggest the GI/GU patient may be deteriorating even before severe hypotension appears? Select all that apply.",
    answers: [
      "Increasing tachycardia",
      "Cool, pale, or diaphoretic skin",
      "Restlessness or slower responses",
      "Near-syncope with position change",
      "Normal blood pressure alone",
      "Mild nausea after eating"
    ],
    correct: [0, 1, 2, 3],
    feedback: "Level 11 questions require recognizing compensated shock before the patient fully crashes."
  },
  {
    level: 11,
    type: "multi",
    question: "Which actions are appropriate for an unstable GI/GU patient with vomiting, altered mental status, and signs of poor perfusion? Select all that apply.",
    answers: [
      "Protect the airway from aspiration",
      "Assess breathing adequacy",
      "Treat for shock",
      "Begin rapid transport",
      "Delay movement until the full SAMPLE history is complete",
      "Give oral fluids to correct dehydration"
    ],
    correct: [0, 1, 2, 3],
    feedback: "Airway, breathing, circulation, and transport are the priorities. History should not delay care."
  },
  {
    level: 11,
    type: "matching",
    question: "Match the subtle finding with the most likely hidden life threat.",
    leftItems: [
      "Missed dialysis with slow irregular pulse",
      "Shoulder pain with possible pregnancy",
      "Dark red vomit with worsening confusion",
      "Tearing abdominal pain radiating to the back"
    ],
    rightItems: [
      "Possible potassium disturbance",
      "Possible ectopic pregnancy",
      "GI bleeding with airway and shock risk",
      "Possible abdominal aortic aneurysm"
    ],
    correct: [0, 1, 2, 3],
    feedback: "Advanced questions require identifying the hidden threat from subtle clues."
  },

  {
    level: 12,
    type: "single",
    question: "You are 35 minutes from the hospital with no ALS available. A dialysis patient who missed treatment develops shallow respirations, increasing confusion, crackles, and a slow irregular pulse. Family asks you to divert to a closer urgent care. What is the MOST appropriate action?",
    answers: [
      "Support ventilation as needed and continue to the appropriate emergency department",
      "Divert to urgent care because it is closer and the family requested it",
      "Stop transport until the patient becomes more responsive",
      "Place the patient upright and complete a medication list before deciding"
    ],
    correct: 0,
    feedback: "This patient needs an emergency department. The priority is airway, ventilation, reassessment, and rapid transport."
  },
  {
    level: 12,
    type: "single",
    question: "A patient with repeated hematemesis becomes less responsive during transport. He has gurgling respirations, weak radial pulses, and blood around the mouth. What should happen FIRST?",
    answers: [
      "Suction the airway and support ventilations if breathing is inadequate",
      "Apply oxygen and obtain another full set of vital signs before intervening",
      "Request ALS intercept and continue reassessing the abdomen",
      "Place him supine to improve blood pressure and reassess in two minutes"
    ],
    correct: 0,
    feedback: "Airway contamination is the immediate life threat. Oxygen and ALS may be appropriate, but suction and ventilation come first."
  },
  {
    level: 12,
    type: "single",
    question: "A confused patient with suspected internal abdominal bleeding refuses transport. He is pale, diaphoretic, tachycardic, and cannot explain what may happen if he stays home. What is the BEST interpretation?",
    answers: [
      "The refusal may not be valid because decision-making capacity is impaired",
      "The refusal is valid because the patient is awake and speaking",
      "The family can sign the refusal because they know the patient best",
      "Transport should be delayed until the patient becomes hypotensive"
    ],
    correct: 0,
    feedback: "A patient must have decision-making capacity to refuse. Confusion and poor perfusion raise serious concern."
  },
  {
    level: 12,
    type: "single",
    question: "A 76-year-old with sudden abdominal pain radiating to the back becomes more lethargic while being moved. Your partner says, 'Let’s hurry and have him help us stand.' What is the BEST response?",
    answers: [
      "Stop unnecessary exertion, reassess ABCs and perfusion, move carefully, and expedite transport",
      "Have the patient assist briefly to reduce lifting time",
      "Place the patient upright and reassess the pain level",
      "Repeat abdominal palpation before deciding how to move him"
    ],
    correct: 0,
    feedback: "Worsening lethargy suggests worsening perfusion. Minimize exertion and reassess immediately."
  },
  {
    level: 12,
    type: "single",
    question: "A GI bleed patient is pale and confused. Your partner is focused on obtaining the medication list because the patient may take blood thinners. During this time, the patient vomits and begins coughing weakly. What is the MOST appropriate action?",
    answers: [
      "Interrupt the history, manage the airway, suction as needed, and continue rapid transport",
      "Finish obtaining the medication list because anticoagulants change hospital care",
      "Place the patient flat to improve blood flow to the brain",
      "Ask the family to clear the blood from the patient’s mouth while you reassess vitals"
    ],
    correct: 0,
    feedback: "Medication history is useful, but airway risk and active vomiting take priority."
  },
  {
    level: 12,
    type: "multi",
    question: "Which features make a GI/GU scenario Level 12 difficulty? Select all that apply.",
    answers: [
      "The patient condition changes during transport",
      "More than one body system is involved",
      "There is a legal, ethical, or destination conflict",
      "The correct answer depends on priority rather than diagnosis alone",
      "The patient has stable vital signs and a minor complaint",
      "The question only asks for a definition"
    ],
    correct: [0, 1, 2, 3],
    feedback: "Level 12 questions require prioritization, reassessment, legal judgment, and multi-system thinking."
  },
  {
    level: 12,
    type: "multi",
    question: "A vomiting GI bleed patient becomes less responsive and has gurgling respirations during transport. Which actions are MOST appropriate? Select all that apply.",
    answers: [
      "Suction the airway",
      "Assess breathing adequacy",
      "Assist ventilations if needed",
      "Continue rapid transport",
      "Delay airway care until a complete history is obtained",
      "Give small amounts of water to clear blood from the throat"
    ],
    correct: [0, 1, 2, 3],
    feedback: "Airway, breathing, and transport priorities override history gathering."
  },
  {
    level: 12,
    type: "matching",
    question: "Match the Level 12 scenario with the highest EMT priority.",
    leftItems: [
      "Unresponsive GI bleed with gurgling respirations",
      "Dialysis patient becomes apneic",
      "Possible pregnancy with shoulder pain and shock",
      "Tearing abdominal pain with worsening lethargy"
    ],
    rightItems: [
      "Suction and airway protection",
      "Immediate ventilatory support",
      "Treat for internal hemorrhage and rapid transport",
      "Minimize movement and treat shock"
    ],
    correct: [0, 1, 2, 3],
    feedback: "The correct answer is the priority that prevents death first."
  }
];

let currentLevel = 11;
let questionNumber = 0;
let score = 0;
let maxQuestions = 25;
let currentQuestion;
let usedQuestions = [];

function shuffleArray(array) {
  return array
    .map(value => ({ value, sort: Math.random() }))
    .sort((a, b) => a.sort - b.sort)
    .map(({ value }) => value);
}

function getQuestionByLevel(level) {
  let available = questions.filter(q =>
    q.level === level && !usedQuestions.includes(q.question)
  );

  if (available.length === 0) {
    available = questions.filter(q => !usedQuestions.includes(q.question));
  }

  if (available.length === 0) {
    usedQuestions = [];
    available = questions.filter(q => q.level === level);
  }

  return available[Math.floor(Math.random() * available.length)];
}

function loadQuestion() {
  if (questionNumber >= maxQuestions) {
    finishExam();
    return;
  }

  currentQuestion = getQuestionByLevel(currentLevel);
  usedQuestions.push(currentQuestion.question);

  document.getElementById("status").innerText =
    "Question " + (questionNumber + 1) +
    " of " + maxQuestions +
    " | Current Difficulty Level: " + currentLevel +
    " | Score: " + score;

  document.getElementById("question").innerHTML =
    "<strong>" + currentQuestion.question + "</strong>";

  document.getElementById("answers").innerHTML = "";
  document.getElementById("feedback").style.display = "none";
  document.getElementById("nextBtn").style.display = "none";
  document.getElementById("restartBtn").style.display = "none";
  document.getElementById("submitBtn").style.display = "none";

  if (currentQuestion.type === "single") {
    loadSingleQuestion();
  } else if (currentQuestion.type === "multi") {
    loadMultiQuestion();
  } else if (currentQuestion.type === "matching") {
    loadMatchingQuestion();
  }
}

function loadSingleQuestion() {
  const answersDiv = document.getElementById("answers");

  const shuffledAnswers = shuffleArray(
    currentQuestion.answers.map((answer, index) => ({
      text: answer,
      originalIndex: index
    }))
  );

  currentQuestion.shuffledSingleAnswers = shuffledAnswers;

  shuffledAnswers.forEach((answer, index) => {
    answersDiv.innerHTML += `
      <button onclick="checkSingleAnswer(${index})">
        ${answer.text}
      </button>
    `;
  });
}

function loadMultiQuestion() {
  const answersDiv = document.getElementById("answers");

  const correctAnswers = currentQuestion.correct.map(index => ({
    text: currentQuestion.answers[index],
    isCorrect: true
  }));

  const incorrectAnswers = currentQuestion.answers
    .map((answer, index) => ({
      text: answer,
      isCorrect: false,
      originalIndex: index
    }))
    .filter(answer => !currentQuestion.correct.includes(answer.originalIndex));

  const twoIncorrectAnswers = shuffleArray(incorrectAnswers).slice(0, 2);

  const finalAnswers = shuffleArray([
    ...correctAnswers,
    ...twoIncorrectAnswers
  ]);

  currentQuestion.shuffledAnswers = finalAnswers;

  currentQuestion.shuffledCorrect = finalAnswers
    .map((answer, index) => answer.isCorrect ? index : null)
    .filter(index => index !== null);

  finalAnswers.forEach((answer, index) => {
    answersDiv.innerHTML += `
      <label class="checkbox-answer">
        <input type="checkbox" value="${index}">
        ${answer.text}
      </label>
    `;
  });

  document.getElementById("submitBtn").style.display = "block";
}

function loadMatchingQuestion() {
  const answersDiv = document.getElementById("answers");

  currentQuestion.leftItems.forEach((leftItem, leftIndex) => {
    const shuffledOptions = shuffleArray(
      currentQuestion.rightItems.map((rightItem, rightIndex) => ({
        text: rightItem,
        originalIndex: rightIndex
      }))
    );

    let options = `<option value="">Choose match</option>`;

    shuffledOptions.forEach(option => {
      options += `
        <option value="${option.originalIndex}">
          ${option.text}
        </option>
      `;
    });

    answersDiv.innerHTML += `
      <div class="matching-row">
        <div class="matching-left">${leftItem}</div>
        <select data-left-index="${leftIndex}">
          ${options}
        </select>
      </div>
    `;
  });

  document.getElementById("submitBtn").style.display = "block";
}

function checkSingleAnswer(selected) {
  const feedback = document.getElementById("feedback");
  const buttons = document.querySelectorAll("#answers button");

  buttons.forEach(button => {
    button.disabled = true;
  });

  const selectedOriginalIndex =
    currentQuestion.shuffledSingleAnswers[selected].originalIndex;

  const correctShuffledIndex =
    currentQuestion.shuffledSingleAnswers.findIndex(
      answer => answer.originalIndex === currentQuestion.correct
    );

  if (selectedOriginalIndex === currentQuestion.correct) {
    score++;
    currentLevel++;
    if (currentLevel > 12) currentLevel = 12;

    buttons[selected].style.background = "darkgreen";

    feedback.innerHTML =
      "<strong>Correct.</strong><br>" +
      currentQuestion.feedback +
      "<br><br>Difficulty will increase if possible.";
  } else {
    currentLevel--;
    if (currentLevel < 11) currentLevel = 11;

    buttons[selected].style.background = "darkred";
    buttons[correctShuffledIndex].style.background = "darkgreen";

    feedback.innerHTML =
      "<strong>Incorrect.</strong><br>" +
      "Most correct answer: <strong>" +
      currentQuestion.answers[currentQuestion.correct] +
      "</strong><br><br>" +
      currentQuestion.feedback +
      "<br><br>Difficulty will decrease if possible.";
  }

  feedback.style.display = "block";
  document.getElementById("nextBtn").style.display = "block";
}

function submitAnswer() {
  if (currentQuestion.type === "multi") {
    checkMultiAnswer();
  } else if (currentQuestion.type === "matching") {
    checkMatchingAnswer();
  }
}

function checkMultiAnswer() {
  const checked = Array.from(
    document.querySelectorAll('#answers input[type="checkbox"]:checked')
  ).map(cb => Number(cb.value));

  const correctAnswers = currentQuestion.shuffledCorrect;

  const correct =
    checked.length === correctAnswers.length &&
    checked.every(value => correctAnswers.includes(value));

  const feedback = document.getElementById("feedback");
  const checkboxes = document.querySelectorAll('#answers input[type="checkbox"]');

  checkboxes.forEach(cb => {
    cb.disabled = true;
  });

  if (correct) {
    score++;
    currentLevel++;
    if (currentLevel > 12) currentLevel = 12;

    feedback.innerHTML =
      "<strong>Correct.</strong><br>" +
      currentQuestion.feedback +
      "<br><br>Difficulty will increase if possible.";
  } else {
    currentLevel--;
    if (currentLevel < 11) currentLevel = 11;

    const correctText = currentQuestion.shuffledCorrect
      .map(index => currentQuestion.shuffledAnswers[index].text)
      .join(", ");

    feedback.innerHTML =
      "<strong>Incorrect.</strong><br>" +
      "Most correct answers: <strong>" +
      correctText +
      "</strong><br><br>" +
      currentQuestion.feedback +
      "<br><br>Difficulty will decrease if possible.";
  }

  feedback.style.display = "block";
  document.getElementById("submitBtn").style.display = "none";
  document.getElementById("nextBtn").style.display = "block";
}

function checkMatchingAnswer() {
  const selects = document.querySelectorAll("#answers select");
  const selectedAnswers = Array.from(selects).map(select => Number(select.value));

  const allAnswered = selectedAnswers.every(answer => !Number.isNaN(answer));

  const correct =
    allAnswered &&
    selectedAnswers.length === currentQuestion.correct.length &&
    selectedAnswers.every((value, index) => value === currentQuestion.correct[index]);

  const feedback = document.getElementById("feedback");

  selects.forEach(select => {
    select.disabled = true;
  });

  if (correct) {
    score++;
    currentLevel++;
    if (currentLevel > 12) currentLevel = 12;

    feedback.innerHTML =
      "<strong>Correct.</strong><br>" +
      currentQuestion.feedback +
      "<br><br>Difficulty will increase if possible.";
  } else {
    currentLevel--;
    if (currentLevel < 11) currentLevel = 11;

    let correctText = "";

    currentQuestion.leftItems.forEach((item, index) => {
      correctText +=
        item +
        " = " +
        currentQuestion.rightItems[currentQuestion.correct[index]] +
        "<br>";
    });

    feedback.innerHTML =
      "<strong>Incorrect.</strong><br>" +
      "<br><strong>Most correct matches:</strong><br>" +
      correctText +
      "<br>" +
      currentQuestion.feedback +
      "<br><br>Difficulty will decrease if possible.";
  }

  feedback.style.display = "block";
  document.getElementById("submitBtn").style.display = "none";
  document.getElementById("nextBtn").style.display = "block";
}

function nextQuestion() {
  questionNumber++;
  loadQuestion();
}

function finishExam() {
  document.getElementById("question").innerHTML =
    "<h2>Exam Complete</h2>";

  document.getElementById("answers").innerHTML = "";

  let result = "";

  if (score >= 22) {
    result = "Excellent performance. Student is handling Level 11-12 LC-Ready/NREMT-style GI/GU critical-thinking scenarios.";
  } else if (score >= 18) {
    result = "Good performance. Review airway priority, shock recognition, dialysis complications, GI bleeding, AAA, pregnancy complications, and refusal capacity.";
  } else if (score >= 14) {
    result = "Borderline performance. Review subtle instability, reassessment changes, transport decisions, and most-correct-answer reasoning.";
  } else {
    result = "Needs remediation. Focus on EMT priorities: airway, breathing, circulation, shock, altered mental status, internal bleeding, dialysis emergencies, and rapid transport.";
  }

  document.getElementById("feedback").style.display = "block";
  document.getElementById("feedback").innerHTML =
    "<strong>Final Score:</strong> " + score + " / " + maxQuestions +
    "<br><br><strong>Final Difficulty Level:</strong> " + currentLevel +
    "<br><br>" + result;

  document.getElementById("status").innerText = "Level 11-12 LC-Ready Style Exam Finished";
  document.getElementById("submitBtn").style.display = "none";
  document.getElementById("nextBtn").style.display = "none";
  document.getElementById("restartBtn").style.display = "block";
}

function restartExam() {
  currentLevel = 11;
  questionNumber = 0;
  score = 0;
  usedQuestions = [];
  loadQuestion();
}

loadQuestion();
</script>

</body>
</html>
